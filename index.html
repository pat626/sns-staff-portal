<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ss-black:#0e0e0e;
  --ss-navy:#12161f;
  --ss-gold:#c9a84c;
  --ss-gold-light:#e0c375;
  --ss-gold-dim:#7a6230;
  --ss-cream:#f5f0e8;
  --ss-surface:#1a1e28;
  --ss-surface2:#222736;
  --ss-border:rgba(201,168,76,0.18);
  --ss-border-gold:rgba(201,168,76,0.5);
  --ss-text:#f0ebe0;
  --ss-muted:#8a8270;
}
html,body{min-height:100vh;min-height:-webkit-fill-available;background:var(--ss-navy);color:var(--ss-text);font-family:'Inter',system-ui,sans-serif}
body{padding-bottom:env(safe-area-inset-bottom)}

.topbar{background:var(--ss-black);border-bottom:1px solid var(--ss-border-gold);padding:0 1.5rem;padding-left:max(1.5rem, env(safe-area-inset-left));padding-right:max(1.5rem, env(safe-area-inset-right));display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:50;height:calc(58px + env(safe-area-inset-top));padding-top:env(safe-area-inset-top)}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon svg{width:28px;height:28px;display:block}
.brand-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:500;color:var(--ss-gold);letter-spacing:0.02em;line-height:1.1}
.brand-sub{font-size:9px;color:var(--ss-muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:1px}
.view-toggle{display:flex;gap:2px;background:rgba(255,255,255,0.04);border:1px solid var(--ss-border);border-radius:6px;padding:3px}
.view-btn{font-size:12px;padding:4px 14px;border-radius:4px;border:none;background:transparent;color:var(--ss-muted);cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:0.02em;transition:all 0.15s}
.view-btn.active{background:var(--ss-gold);color:var(--ss-black);font-weight:500}
.topbar-actions{display:flex;gap:6px;align-items:center}

.btn{font-family:'Inter',sans-serif;font-size:12px;padding:6px 14px;border-radius:4px;border:1px solid var(--ss-border);background:transparent;color:var(--ss-text);cursor:pointer;display:inline-flex;align-items:center;gap:5px;letter-spacing:0.02em;transition:all 0.15s}
.btn:hover{border-color:var(--ss-border-gold);color:var(--ss-gold)}
.btn-gold{background:var(--ss-gold);color:var(--ss-black);border-color:var(--ss-gold);font-weight:500}
.btn-gold:hover{background:var(--ss-gold-light);border-color:var(--ss-gold-light);color:var(--ss-black)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-danger{color:#e57373;border-color:rgba(229,115,115,0.3)}
.btn-danger:hover{background:rgba(192,57,43,0.15);border-color:#c0392b;color:#e57373}
.btn-success{color:#66bb8a;border-color:rgba(102,187,138,0.3)}
.btn-success:hover{background:rgba(46,125,82,0.2)}
.btn-clock{background:rgba(46,125,82,0.15);color:#66bb8a;border-color:rgba(102,187,138,0.4);font-weight:500}
.btn-clock:hover{background:rgba(46,125,82,0.25)}
.btn-clockout{background:rgba(192,57,43,0.12);color:#e57373;border-color:rgba(229,115,115,0.35);font-weight:500}
.btn-clockout:hover{background:rgba(192,57,43,0.22)}

.main{padding:1.5rem;padding-bottom:max(1.5rem, env(safe-area-inset-bottom));max-width:980px;margin:0 auto}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.section-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:500;color:var(--ss-gold-light)}
.divider-line{height:1px;background:linear-gradient(90deg,var(--ss-gold-dim),transparent);margin-bottom:1.25rem}

.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.event-card{background:var(--ss-surface);border:1px solid var(--ss-border);border-radius:6px;padding:1.1rem 1.25rem;display:flex;flex-direction:column;gap:9px;transition:border-color 0.15s}
.event-card:hover{border-color:var(--ss-border-gold)}
.event-card.open{border-left:3px solid #2e7d52}
.event-card.closed{border-left:3px solid var(--ss-muted);opacity:0.6}
.event-card.filled{border-left:3px solid var(--ss-gold-dim)}
.event-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;color:var(--ss-cream);line-height:1.3}
.event-meta{display:flex;flex-direction:column;gap:3px}
.event-meta-row{display:flex;align-items:flex-start;gap:6px;font-size:11.5px;color:var(--ss-muted)}
.event-meta-row i{font-size:13px;width:15px;margin-top:1px;flex-shrink:0}
.event-type-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;padding:2px 8px;border-radius:3px;background:rgba(201,168,76,0.1);color:var(--ss-gold);border:1px solid rgba(201,168,76,0.2)}
.card-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.role-pills{display:flex;gap:5px;flex-wrap:wrap}
.role-pill{font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid var(--ss-border);color:var(--ss-muted);display:inline-flex;align-items:center;gap:3px}
.role-pill.has-need{color:var(--ss-gold);border-color:rgba(201,168,76,0.3);background:rgba(201,168,76,0.07)}

.badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:3px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;letter-spacing:0.04em;text-transform:uppercase}
.badge-open{background:rgba(46,125,82,0.15);color:#66bb8a;border:1px solid rgba(102,187,138,0.25)}
.badge-closed{background:rgba(138,130,112,0.1);color:var(--ss-muted);border:1px solid rgba(138,130,112,0.2)}
.badge-filled{background:rgba(201,168,76,0.1);color:var(--ss-gold);border:1px solid rgba(201,168,76,0.25)}
.badge-clocked{background:rgba(230,160,50,0.12);color:#e6a032;border:1px solid rgba(230,160,50,0.3)}
.badge-picked{background:rgba(201,168,76,0.12);color:var(--ss-gold);border:1px solid rgba(201,168,76,0.3)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;backdrop-filter:blur(2px)}
.modal{background:var(--ss-surface);border:1px solid var(--ss-border-gold);border-radius:8px;padding:1.75rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;color:var(--ss-gold-light);margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;gap:8px}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:1rem}
.form-label{font-size:11px;color:var(--ss-muted);font-weight:500;letter-spacing:0.06em;text-transform:uppercase}
input[type=text],input[type=date],input[type=time],input[type=number],input[type=email],input[type=password],textarea,select{
  font-family:'Inter',sans-serif;font-size:13px;padding:8px 11px;
  border:1px solid var(--ss-border);border-radius:4px;
  background:var(--ss-surface2);color:var(--ss-text);width:100%}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ss-gold-dim);box-shadow:0 0 0 2px rgba(201,168,76,0.12)}
select option{background:var(--ss-surface2);color:var(--ss-text)}
textarea{resize:vertical;min-height:64px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--ss-border)}

.bids-list{display:flex;flex-direction:column;gap:8px}
.bid-item{background:var(--ss-surface2);border:1px solid var(--ss-border);border-radius:4px;padding:10px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.bid-item.selected{border-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.06)}
.bid-name{font-size:13px;font-weight:500;color:var(--ss-cream)}
.bid-note{font-size:12px;color:var(--ss-muted);margin-top:3px;font-style:italic}
.bid-meta{font-size:11px;color:var(--ss-muted);margin-top:2px;display:flex;align-items:center;gap:4px}
.bid-role-tag{font-size:10px;font-weight:500;padding:1px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:0.05em}
.role-server{background:rgba(100,160,255,0.12);color:#78b0ff;border:1px solid rgba(100,160,255,0.25)}
.role-bartender{background:rgba(180,100,255,0.12);color:#c87bff;border:1px solid rgba(180,100,255,0.25)}
.role-chef{background:rgba(255,160,50,0.12);color:#ffaa40;border:1px solid rgba(255,160,50,0.25)}

.hours-table{width:100%;border-collapse:collapse;font-size:13px}
.hours-table th{text-align:left;padding:6px 10px;font-size:10px;font-weight:500;color:var(--ss-gold);text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid var(--ss-border-gold)}
.hours-table td{padding:9px 10px;border-bottom:1px solid var(--ss-border);color:var(--ss-text);vertical-align:top}
.hours-table tr:last-child td{border-bottom:none}
.hours-table tr:hover td{background:rgba(201,168,76,0.04)}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat-card{background:var(--ss-surface);border:1px solid var(--ss-border);border-radius:6px;padding:1rem;text-align:center}
.stat-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:500;color:var(--ss-gold-light)}
.stat-label{font-size:11px;color:var(--ss-muted);margin-top:4px;letter-spacing:0.04em;text-transform:uppercase}

.tabs{display:flex;border-bottom:1px solid var(--ss-border);margin-bottom:1.5rem}
.tab{font-size:12px;padding:9px 16px;border:none;background:transparent;color:var(--ss-muted);cursor:pointer;font-family:'Inter',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:0.04em;display:inline-flex;align-items:center;gap:5px}
.tab.active{color:var(--ss-gold);border-bottom-color:var(--ss-gold)}
.tab:hover:not(.active){color:var(--ss-text)}

.filter-bar{display:flex;gap:6px;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap}
.filter-btn{font-size:11px;padding:3px 10px;border-radius:3px;border:1px solid var(--ss-border);background:transparent;color:var(--ss-muted);cursor:pointer;font-family:'Inter',sans-serif}
.filter-btn.active{background:rgba(201,168,76,0.12);color:var(--ss-gold);border-color:var(--ss-border-gold)}
.filter-btn:hover:not(.active){border-color:var(--ss-border-gold);color:var(--ss-text)}

.info-box{background:rgba(201,168,76,0.07);border:1px solid var(--ss-border-gold);border-radius:4px;padding:10px 14px;font-size:12px;color:var(--ss-gold);margin-bottom:1.25rem;display:flex;gap:8px;align-items:flex-start;line-height:1.5}

.login-screen{background:var(--ss-surface);border:1px solid var(--ss-border-gold);border-radius:8px;padding:2.5rem 2rem;max-width:360px;margin:4rem auto;text-align:center}
.login-screen h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--ss-gold-light);margin-bottom:0.4rem}
.login-screen p{font-size:12px;color:var(--ss-muted);margin-bottom:1.75rem}
.login-error{font-size:12px;color:#e57373;margin-bottom:0.75rem;min-height:18px;text-align:left}

.name-prompt{background:var(--ss-surface);border:1px solid var(--ss-border-gold);border-radius:8px;padding:2.5rem 2rem;max-width:380px;margin:3rem auto;text-align:center}
.name-prompt h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--ss-gold-light);margin-bottom:0.5rem}
.name-prompt p{font-size:13px;color:var(--ss-muted);margin-bottom:1.5rem;line-height:1.6}

.my-shift-note{font-size:11px;color:var(--ss-gold);display:flex;align-items:center;gap:4px;margin-top:2px}
.clock-active-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 10px;border-radius:3px;background:rgba(230,160,50,0.12);color:#e6a032;border:1px solid rgba(230,160,50,0.3)}
.gold-dot{width:6px;height:6px;border-radius:50%;background:#e6a032;display:inline-block}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--ss-surface);border:1px solid var(--ss-border-gold);border-radius:4px;padding:10px 18px;font-size:13px;z-index:200;display:flex;align-items:center;gap:8px;animation:fadeup 0.2s ease;color:var(--ss-text);box-shadow:0 4px 20px rgba(0,0,0,0.4)}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.empty{text-align:center;padding:2.5rem;color:var(--ss-muted);font-size:13px}
.empty i{font-size:28px;display:block;margin-bottom:10px;opacity:0.35}
.loading{text-align:center;padding:3rem;color:var(--ss-muted);font-size:13px}
.role-section-title{font-size:11px;font-weight:500;color:var(--ss-muted);text-transform:uppercase;letter-spacing:0.08em;margin:1rem 0 0.5rem;padding-bottom:6px;border-bottom:1px solid var(--ss-border)}
.tc-wrap{max-width:460px;margin:0 auto;padding:1.5rem 0}
.tc-card{background:var(--ss-surface);border:1px solid var(--ss-border-gold);border-radius:8px;padding:2rem;text-align:center}
.tc-brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:1.75rem}
.tc-clock-display{font-size:52px;font-weight:300;color:var(--ss-cream);letter-spacing:0.04em;font-variant-numeric:tabular-nums;margin-bottom:4px}
.tc-date-display{font-size:12px;color:var(--ss-muted);margin-bottom:2rem;letter-spacing:0.03em}
.tc-name-input{width:100%;font-family:'Inter',sans-serif;font-size:14px;padding:11px 14px;border:1px solid var(--ss-border);border-radius:4px;background:var(--ss-surface2);color:var(--ss-text);text-align:center;margin-bottom:1.25rem;letter-spacing:0.02em}
.tc-name-input:focus{outline:none;border-color:var(--ss-gold-dim);box-shadow:0 0 0 2px rgba(201,168,76,0.12)}
.tc-name-input::placeholder{color:var(--ss-muted)}
.tc-name-input:disabled{opacity:0.5}
.tc-status-row{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--ss-muted);margin-bottom:1.25rem;min-height:20px;letter-spacing:0.02em}
.tc-status-row.active{color:#66bb8a}
.tc-status-dot{width:7px;height:7px;border-radius:50%;background:var(--ss-muted);flex-shrink:0}
.tc-status-dot.active{background:#66bb8a}
.tc-btn{width:100%;padding:14px;border-radius:4px;border:none;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;transition:opacity 0.15s;letter-spacing:0.03em}
.tc-btn-in{background:var(--ss-gold);color:var(--ss-black)}
.tc-btn-in:hover:not(:disabled){opacity:0.88}
.tc-btn-in:disabled{opacity:0.35;cursor:default}
.tc-btn-out{background:rgba(192,57,43,0.15);color:#e57373;border:1px solid rgba(229,115,115,0.35)}
.tc-btn-out:hover{opacity:0.85}
.tc-punch-note{font-size:11px;color:var(--ss-muted);margin-top:4px;letter-spacing:0.02em}
.tc-hist-divider{height:1px;background:linear-gradient(90deg,var(--ss-gold-dim),transparent);margin:1.5rem 0}
.tc-hist-title{font-size:10px;font-weight:500;color:var(--ss-gold);text-transform:uppercase;letter-spacing:0.1em;text-align:left;margin-bottom:10px}
.tc-hist-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--ss-border);text-align:left}
.tc-hist-item:last-child{border-bottom:none}
.tc-hi-name{font-size:13px;font-weight:500;color:var(--ss-cream)}
.tc-hi-time{font-size:11px;color:var(--ss-muted);margin-top:2px}
.tc-hi-hrs{font-size:12px;font-weight:500;color:var(--ss-gold-light)}
.tc-hi-active{font-size:10px;padding:2px 8px;border-radius:3px;background:rgba(46,125,82,0.15);color:#66bb8a;border:1px solid rgba(102,187,138,0.25);font-weight:500;letter-spacing:0.04em;text-transform:uppercase}
@media(max-width:600px){
  .form-row,.form-row-3{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
  .events-grid{grid-template-columns:1fr}
}
</style>
</head>

// ── Supabase init ──
const SUPA_URL = 'https://fxiufkfxbtjupmfdtboh.supabase.co';

let state = {

  events:[], bids:[], timeEntries:[], shiftRequests:[], timeclockEntries:[], staffDirectory:[], eventReviews:[], adminShowPast:false, reviewingEventId:null,

// ── Helpers ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtHours(ms){if(!ms||ms<0)return'0h 0m';return Math.floor(ms/3600000)+'h '+Math.floor((ms%3600000)/60000)+'m';}
function fmtDate(d){if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});}catch(e){return d;}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function showToast(msg, ok=true){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div'); t.className='toast';
  t.innerHTML=`<i class="ti ti-${ok?'check':'alert-circle'}" style="color:${ok?'#66bb8a':'#e57373'}"></i>${esc(msg)}`;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 3500);
}

// ── Local storage for staff identity & ejs config ──
function saveUser(){try{localStorage.setItem('ss-user',JSON.stringify({name:state.employeeName,email:state.employeeEmail}));}catch(e){}}
function saveEjs(){try{localStorage.setItem('ss-ejs',JSON.stringify({ejsServiceId:state.ejsServiceId,ejsTemplateId:state.ejsTemplateId,ejsPublicKey:state.ejsPublicKey}));}catch(e){}}
function loadLocal(){
  try{const u=JSON.parse(localStorage.getItem('ss-user')||'{}');state.employeeName=u.name||'';state.employeeEmail=u.email||'';}catch(e){}
  try{
    const c=JSON.parse(localStorage.getItem('ss-ejs')||'{}');
    if(c.ejsServiceId)state.ejsServiceId=c.ejsServiceId;
    if(c.ejsTemplateId)state.ejsTemplateId=c.ejsTemplateId;
    if(c.ejsPublicKey)state.ejsPublicKey=c.ejsPublicKey;
  }catch(e){}
}

// ── Email ──
async function sendEmail(toEmail,toName,subject,body){
  if(!state.ejsPublicKey||!state.ejsServiceId||!state.ejsTemplateId)return false;
  try{emailjs.init(state.ejsPublicKey);await emailjs.send(state.ejsServiceId,state.ejsTemplateId,{to_email:toEmail,to_name:toName,subject,message:body});return true;}
  catch(e){return false;}
}

// ── Supabase data fetchers ──
async function fetchAll(){
  const [evRes, bidRes, teRes, srRes, tcRes, sdRes, erRes] = await Promise.all([
    db.from('events').select('*').order('date', {ascending:true}),
    db.from('bids').select('*'),
    db.from('time_entries').select('*'),
    db.from('shift_requests').select('*').order('created_at', {ascending:false}),
    db.from('timeclock').select('*').order('clocked_in', {ascending:false}),
    db.from('staff_directory').select('*').order('name', {ascending:true}),
    db.from('event_reviews').select('*').order('created_at', {ascending:false})
  ]);
  if(evRes.error) console.error('Events fetch error:', evRes.error);
  if(bidRes.error) console.error('Bids fetch error:', bidRes.error);
  if(teRes.error) console.error('TimeEntries fetch error:', teRes.error);
  if(srRes.error) console.error('ShiftRequests fetch error:', srRes.error);
  if(tcRes.error) console.error('Timeclock fetch error:', tcRes.error);
  if(sdRes.error) console.error('StaffDirectory fetch error:', sdRes.error);
  if(erRes.error) console.error('EventReviews fetch error:', erRes.error);
  state.events = evRes.data || [];
  state.bids = bidRes.data || [];
  state.timeEntries = teRes.data || [];
  state.shiftRequests = srRes.data || [];
  state.timeclockEntries = tcRes.data || [];
  state.staffDirectory = (sdRes.data || []).filter(s=>s.active);
  state.eventReviews = erRes.data || [];
}

// ── Auth ──
async function adminLogin(){
  const email = document.getElementById('al-user').value.trim();
  const pass = document.getElementById('al-pass').value;
  document.getElementById('al-error').textContent = '';
  const {data, error} = await db.auth.signInWithPassword({email, password:pass});
  if(error){document.getElementById('al-error').textContent='Incorrect username or password.';return;}
  state.adminLoggedIn = true;
  state.adminSession = data.session;
  document.getElementById('settings-btn').style.display='';
  await fetchAll();
  render();
}

async function adminLogout(){
  await db.auth.signOut();
  state.adminLoggedIn = false;
  state.adminSession = null;
  document.getElementById('settings-btn').style.display='none';
  render();
}

// ── View ──
function switchView(v){state.view=v;render();}
function setAdminTab(t){state.adminTab=t;render();}
function setFilter(f){state.dateFilter=f;render();}

function render(){
  document.getElementById('btn-admin').classList.toggle('active',state.view==='admin');
  document.getElementById('btn-employee').classList.toggle('active',state.view==='employee');
  document.getElementById('btn-timeclock').classList.toggle('active',state.view==='timeclock');
  if(state.view==='admin') document.getElementById('main-content').innerHTML=renderAdmin();
  else if(state.view==='timeclock') document.getElementById('main-content').innerHTML=renderTimeclock();
  else document.getElementById('main-content').innerHTML=renderEmployee();
  if(state.view==='timeclock') startTimeclockClock();
  attachDelegatedListeners();
}

function attachDelegatedListeners(){
  var mc=document.getElementById('main-content');
  if(!mc)return;
  // Admin logout buttons
  mc.querySelectorAll('.sns-admin-logout').forEach(function(b){b.addEventListener('click',adminLogout);});
  // Review buttons
  mc.querySelectorAll('.sns-write-review').forEach(function(b){
    b.addEventListener('click',function(){state.reviewingEventId=b.dataset.eid;render();});
  });
  mc.querySelectorAll('.sns-del-review').forEach(function(b){
    b.addEventListener('click',function(){deleteReview(b.dataset.rid);});
  });
  mc.querySelectorAll('.sns-reviews-back').forEach(function(b){
    b.addEventListener('click',function(){state.reviewingEventId=null;render();});
  });
  mc.querySelectorAll('.sns-submit-review').forEach(function(b){
    b.addEventListener('click',function(){submitReview(b.dataset.eid,b.dataset.rid);});
  });
  mc.querySelectorAll('.rstar').forEach(function(s){
    s.addEventListener('click',function(){rateReview(s.dataset.field,parseInt(s.dataset.val));});
  });
  mc.querySelectorAll('.sns-toggle-notes').forEach(function(b){
    b.addEventListener('click',function(){toggleReviewNotes(b.dataset.field);});
  });
}

function filteredEvents(evs){
  const today=new Date(); today.setHours(0,0,0,0);
  return evs.filter(e=>{
    if(!e.date)return true;
    const d=new Date(e.date+'T00:00:00');
    if(state.dateFilter==='today')return d.toDateString()===today.toDateString();
    if(state.dateFilter==='week'){const end=new Date(today);end.setDate(end.getDate()+7);return d>=today&&d<=end;}
    if(state.dateFilter==='upcoming')return d>=today;
    if(state.dateFilter==='past')return d<today;
    return true;
  });
}

function filterBar(){
  return`<div class="filter-bar">\n    <i class="ti ti-filter" style="color:var(--ss-muted);font-size:13px"></i>\n    ${[['upcoming','Upcoming'],['today','Today'],['week','This week'],['past','Past'],['all','All']].map(([k,l])=>\n      `<button class="filter-btn ${state.dateFilter===k?'active':''}" onclick="setFilter('${k}')">${l}</button>`).join('')}\n  </div>`;

function statusBadge(e){
  if(e.status==='filled')return`<span class="badge badge-filled"><i class="ti ti-check"></i>Filled</span>`;
  if(e.status==='closed')return`<span class="badge badge-closed">Closed</span>`;
  return`<span class="badge badge-open"><i class="ti ti-circle-dot"></i>Open</span>`;
}

function roleBadge(role){
  const r=(role||'').toLowerCase();
  const cls=r==='server'?'role-server':r==='bartender'?'role-bartender':'role-chef';
  return`<span class="bid-role-tag ${cls}">${esc(role)}</span>`;
}

function rolePills(e){
  const pills=[];
  if(e.servers_needed>0){
    const picked=state.bids.filter(b=>b.event_id===e.id&&b.role==='Server'&&b.selected).length;
    pills.push(`<span class="role-pill has-need"><i class="ti ti-bowl-spoon"></i>Servers ${picked}/${e.servers_needed}</span>`);
  }
  if(e.bartenders_needed>0){
    const picked=state.bids.filter(b=>b.event_id===e.id&&b.role==='Bartender'&&b.selected).length;
    pills.push(`<span class="role-pill has-need"><i class="ti ti-glass"></i>Bartenders ${picked}/${e.bartenders_needed}</span>`);
  }
  if(e.chefs_needed>0){
    const picked=state.bids.filter(b=>b.event_id===e.id&&b.role==='Chef'&&b.selected).length;
    pills.push(`<span class="role-pill has-need"><i class="ti ti-chef-hat"></i>Chefs ${picked}/${e.chefs_needed}</span>`);
  }
  return pills.length?`<div class="role-pills">${pills.join('')}</div>`:'';
}

// ── Hours helpers ──
function getTimeEntry(eventId, name, email){
  const em=(email||state.employeeEmail||'').toLowerCase().trim();
  return state.timeEntries.find(t=>t.event_id===eventId&&(em&&t.staff_email?t.staff_email.toLowerCase().trim()===em:t.staff_name===name));
}
function totalMsForStaff(name, email){
  const em=(email||state.employeeEmail||'').toLowerCase().trim();
  return state.timeEntries.filter(t=>em&&t.staff_email?t.staff_email.toLowerCase().trim()===em:t.staff_name===name).reduce((s,t)=>{
    let ms=t.total_ms||0;
    if(t.clocked_in&&!t.clocked_out)ms+=Date.now()-t.clocked_in;
    return s+ms;
  },0);
}
function allStaffHours(){
  const map={};
  function getKey(email, name){ return (email||'').toLowerCase().trim() || name; }
  // Event-based time entries
  state.timeEntries.forEach(t=>{
    const key=getKey(t.staff_email,t.staff_name);
    if(!map[key])map[key]={name:t.staff_name,email:t.staff_email||'',ms:0,events:0};
    let ms=t.total_ms||0;
    if(t.clocked_in&&!t.clocked_out)ms+=Date.now()-t.clocked_in;
    map[key].ms+=ms;
    map[key].events++;
  });
  // Standalone timeclock entries
  (state.timeclockEntries||[]).forEach(t=>{
    const key=getKey(t.staff_email,t.staff_name);
    if(!map[key])map[key]={name:t.staff_name,email:t.staff_email||'',ms:0,events:0};
    let ms=t.total_ms||0;
    if(t.clocked_in&&!t.clocked_out)ms+=Date.now()-t.clocked_in;
    map[key].ms+=ms;
  });
  return Object.values(map).sort((a,b)=>b.ms-a.ms);
}

function starDisplay(val, max=5){
  if(!val) return '<span style="color:var(--ss-muted);font-size:12px">Not rated</span>';
  let s='';
  for(let i=1;i<=max;i++) s+=`<i class="ti ti-star" aria-hidden="true" style="font-size:14px;color:${i<=val?'var(--ss-gold)':'var(--ss-muted)'}"></i>`;
  return s;
}

      html+='<div class="event-name">'+esc(e.name)+'</div>';
      html+='<div style="font-size:12px;color:var(--ss-muted);margin-top:3px">'+fmtDate(e.date)+'</div></div>';
      html+=review?'<span class="badge badge-filled"><i class="ti ti-check" aria-hidden="true"></i> Reviewed</span>':'<span class="badge badge-closed">No review</span>';
      html+='</div>';
      if(review){
        html+='<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--ss-muted)">';
        html+='<span>Overall: '+(review.overall_rating||'—')+'/5</span>';
        html+='<span>Food: '+(review.food_quality||'—')+'/5</span>';
        html+='<span>Staff: '+(review.staff_performance||'—')+'/5</span>';
        html+='<span>Client: '+(review.client_satisfaction||'—')+'/5</span></div>';
      }
      html+='<div class="card-actions">';
      html+='<button class="btn btn-sm '+(review?'':'btn-gold')+' sns-write-review" data-eid="'+e.id+'">';
      html+='<i class="ti ti-'+(review?'edit':'clipboard-check')+'" aria-hidden="true"></i> '+(review?'Edit review':'Write review')+'</button>';
      if(review){html+='<button class="btn btn-sm btn-danger sns-del-review" data-rid="'+review.id+'"><i class="ti ti-trash" aria-hidden="true"></i></button>';}
      html+='</div></div>';
    });
    html+='</div>';
  }
  return html;
}

function renderReviewForm(ev,existing){

  html+='<div style="font-size:12px;color:var(--ss-muted);margin-bottom:1.25rem">'+(ev?fmtDate(ev.date):'')+(ev&&ev.location?' · '+esc(ev.location):'')+'</div>';
  html+='<div class="divider-line"></div>';
  html+='<div class="form-group"><label class="form-label">Reviewed by</label>';
  html+='<input type="text" id="r-reviewer" value="'+(v.reviewer_name?esc(v.reviewer_name):'Pat')+'" style="max-width:220px"></div>';
  html+='<div id="review-overall-score" style="text-align:center;padding:12px;background:var(--ss-surface2);border:1px solid var(--ss-border);border-radius:4px;margin-bottom:12px">';
