.topbar{background:var(--ss-black);border-bottom:1px solid var(--ss-border-gold);padding:0 1.5rem;padding-left:max(1.5rem,env(safe-area-inset-left));padding-right:max(1.5rem,env(safe-area-inset-right));display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:50;height:calc(58px + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);}

.btn:hover{border-color:var(--ss-border-gold);color:var(--ss-gold);}

.gold-dot{width:6px;height:6px;border-radius:50%;background:#e6a032;display:inline-block;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--ss-surface);border:1px solid var(--ss-border-gold);border-radius:4px;padding:10px 18px;font-size:13px;z-index:200;display:flex;align-items:center;gap:8px;animation:fadeup .2s ease;color:var(--ss-text);box-shadow:0 4px 20px rgba(0,0,0,.4);}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.tc-cat-btn{font-family:'Inter',sans-serif;font-size:12px;padding:8px 14px;border-radius:4px;border:1px solid var(--ss-border);background:transparent;color:var(--ss-muted);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;font-weight:500;}
.tc-cat-btn:hover{border-color:var(--ss-border-gold);color:var(--ss-gold);}

.tc-status{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--ss-muted);margin-bottom:1.25rem;}

.tc-btn-row{display:flex;gap:8px;margin-bottom:8px;}
.tc-btn{flex:1;padding:13px;border-radius:4px;border:none;font-family:"Inter",sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}

.tc-hi-hrs{font-size:12px;font-weight:500;color:var(--ss-gold-light);}
.tc-hi-active{font-size:10px;padding:2px 8px;border-radius:3px;background:rgba(46,125,82,.15);color:#66bb8a;border:1px solid rgba(102,187,138,.25);font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.tc-hi-drop{font-size:10px;padding:2px 8px;border-radius:3px;background:rgba(201,168,76,.1);color:var(--ss-gold);border:1px solid rgba(201,168,76,.25);font-weight:500;text-transform:uppercase;letter-spacing:.04em;}

<script>

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtH(ms){if(!ms||ms<0)return'0h 0m';return Math.floor(ms/3600000)+'h '+Math.floor((ms%3600000)/60000)+'m';}
function fmtDate(d){if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});}catch(e){return d;}}
function fmtTime(t){if(!t)return'';try{var parts=t.split(':');var h=parseInt(parts[0]);var m=parts[1]||'00';var ampm=h>=12?'PM':'AM';h=h%12||12;return h+':'+m+' '+ampm;}catch(e){return t;}}
function pad(n){return String(n).padStart(2,'0');}
function getKey(email,name){return(email||'').toLowerCase().trim()||name;}

function showToast(msg,ok){
  if(ok===undefined)ok=true;
  document.querySelectorAll('.toast').forEach(function(t){t.remove();});
  var t=document.createElement('div');t.className='toast';

}

function filteredEvents(evs){
  var today=new Date();today.setHours(0,0,0,0);
  return evs.filter(function(e){
    if(!e.date)return true;
    var d=new Date(e.date+'T00:00:00');
    if(state.dateFilter==='today')return d.toDateString()===today.toDateString();
    if(state.dateFilter==='week'){var end=new Date(today);end.setDate(end.getDate()+7);return d>=today&&d<=end;}
    if(state.dateFilter==='upcoming')return d>=today;
    if(state.dateFilter==='past')return d<today;
    return true;
  });
}

function totalMsForStaff(name,email){
  var em=(email||state.employeeEmail||'').toLowerCase().trim();
  var ms=0;
  (state.timeclockEntries||[]).forEach(function(t){
    var match=em&&t.staff_email?t.staff_email.toLowerCase().trim()===em:t.staff_name===name;
    if(match)ms+=(t.total_ms||0)+(t.clocked_in&&!t.clocked_out?Date.now()-t.clocked_in:0);
  });
  return ms;
}

function allStaffHours(){
  var map={};
  var today=new Date();today.setHours(0,0,0,0);
  var baseMonday=getWeekStart(today);
  var weekStart=new Date(baseMonday);weekStart.setDate(baseMonday.getDate()+(state.hoursWeekOffset||0)*7);
  var weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+7);
  (state.timeclockEntries||[]).forEach(function(t){
    var k=getKey(t.staff_email,t.staff_name);
    if(!map[k])map[k]={name:t.staff_name,email:t.staff_email||'',ms:0,weekMs:0,shifts:0,weekShifts:0};
    var ms=(t.total_ms||0)+(t.clocked_in&&!t.clocked_out?Date.now()-t.clocked_in:0);
    map[k].ms+=ms;
    map[k].shifts++;
    // Check if this entry falls in current week
    var ev=t.event_id?(state.events||[]).find(function(e){return e.id===t.event_id;}):null;
    var d=ev?new Date(ev.date+'T00:00:00'):new Date(t.clocked_in);
    if(d)d.setHours(0,0,0,0);
    if(d&&d>=weekStart&&d<=weekEnd){map[k].weekMs+=ms;map[k].weekShifts++;}
  });
  return Object.values(map).sort(function(a,b){return b.weekMs-a.weekMs;});
}

function getWeekStart(date){
  var d=new Date(date);var day=d.getDay();var diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);d.setHours(0,0,0,0);return d;
}
function fmtWeekLabel(monday){
  var sunday=new Date(monday);sunday.setDate(sunday.getDate()+6);
  var opts={month:'short',day:'numeric'};
  return monday.toLocaleDateString([],opts)+' - '+sunday.toLocaleDateString([],opts);
}

function renderDashboardSummary(){
  var today=new Date();today.setHours(0,0,0,0);
  var weekStart=getWeekStart(today);
  var weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+7);
  var thisWeekEvents=(state.events||[]).filter(function(e){
    if(!e.date)return false;
    var d=new Date(e.date+'T00:00:00');
    return d>=weekStart&&d<=weekEnd;
  });
  var pendingReqs=(state.shiftRequests||[]).filter(function(r){return r.status==='pending';}).length;
  var activeAnns=(state.announcements||[]).length;
  var needsStaff=thisWeekEvents.filter(function(e){return e.status==='open'||!e.status;}).length;
  var pendingCount=pendingReqs;
  var weekMs=0;
  var activeNow=(state.timeclockEntries||[]).filter(function(t){return t.clocked_in&&!t.clocked_out;}).length;
  // Count all hours from timeclock for this week (Mon-Sun)
  (state.timeclockEntries||[]).forEach(function(t){
    if(!t.clocked_in)return;
    var ev=t.event_id?(state.events||[]).find(function(e){return e.id===t.event_id;}):null;
    var d=ev?new Date(ev.date+'T00:00:00'):new Date(t.clocked_in);
    d.setHours(0,0,0,0);
    if(d>=weekStart&&d<=weekEnd)weekMs+=(t.total_ms||0)+(t.clocked_in&&!t.clocked_out?Date.now()-t.clocked_in:0);
  });
  var h='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem">';
  h+='<div class="stat-card"><div class="stat-val">'+thisWeekEvents.length+'</div><div class="stat-label">Events this week</div></div>';
  h+='<div class="stat-card"><div class="stat-val" style="color:'+(pendingReqs>0?'#e6a032':'var(--ss-gold-light)')+'">'+pendingReqs+'</div><div class="stat-label">Pending requests</div></div>';
  h+='<div class="stat-card"><div class="stat-val" style="color:'+(needsStaff>0?'#e57373':'#66bb8a')+'">'+needsStaff+'</div><div class="stat-label">Needs staff</div></div>';
  h+='<div class="stat-card"><div class="stat-val">'+(activeNow>0?'<span style="color:#e6a032">'+activeNow+' active</span>':fmtH(weekMs))+'</div><div class="stat-label">'+(activeNow>0?'Clocked in now':'Hours this week')+'</div></div>';
  h+='<div style="display:flex;justify-content:flex-end;margin-bottom:.5rem"><button class="btn btn-sm sns-refresh-dashboard" style="font-size:11px;color:var(--ss-muted)"><i class="ti ti-refresh" aria-hidden="true"></i> Refresh</button></div>';
  h+='</div>';
  // Alert for events needing staff this week
  var openThisWeek=thisWeekEvents.filter(function(e){return e.status==='open'||!e.status;});
  if(openThisWeek.length){

  h+='<button class="btn btn-sm sns-sched-next" style="padding:2px 6px;border:none;font-size:13px"'+(isNow?' disabled':'')+'><i class="ti ti-chevron-right" aria-hidden="true"></i></button>';

  h+='<button class="btn btn-gold btn-sm sns-new-sched-entry"><i class="ti ti-plus" aria-hidden="true"></i> Add shift</button>';
  h+='</div></div>';
  // Legend
  h+='<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem">';
  Object.keys(typeColors).forEach(function(t){
    h+='<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--ss-muted)"><div style="width:10px;height:10px;border-radius:2px;background:'+typeColors[t]+'"></div>'+t+'</div>';
  });
  h+='</div>';
  // Day grid
  var days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:1.5rem">';
  for(var di=0;di<7;di++){
    var dayDate=new Date(weekStart);dayDate.setDate(weekStart.getDate()+di);
    var dayDateStr=dayDate.toISOString().split('T')[0];
    var isToday=dayDate.toDateString()===today.toDateString();
    var dayEntries=weekEntries.filter(function(e){return e.date===dayDateStr;});
    h+='<div style="background:var(--ss-surface2);border:1px solid '+(isToday?'var(--ss-border-gold)':'var(--ss-border)')+';border-radius:6px;padding:8px 6px;min-height:110px">';
    h+='<div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--ss-muted);margin-bottom:1px">'+days[di]+'</div>';
    h+='<div style="font-size:16px;font-weight:600;color:'+(isToday?'var(--ss-gold)':'var(--ss-cream)')+';margin-bottom:6px">'+dayDate.getDate()+'</div>';
    dayEntries.forEach(function(e){
      var col=typeColors[e.shift_type]||'#8a8270';
      var bg=typeBg[e.shift_type]||'rgba(138,130,112,.1)';
      h+='<div style="border-radius:3px;padding:4px 5px;margin-bottom:3px;font-size:10px;background:'+bg+';border-left:2px solid '+col+';cursor:pointer" class="sns-sched-entry" data-id="'+e.id+'">';
      h+='<div style="font-weight:500;color:var(--ss-cream);line-height:1.2">'+esc(e.title)+'</div>';
      if(e.start_time)h+='<div style="opacity:.7;font-size:9px;margin-top:1px">'+fmtTime(e.start_time)+(e.end_time?' – '+fmtTime(e.end_time):'')+'</div>';
      if(e.assigned_to)h+='<div style="opacity:.6;font-size:9px;margin-top:1px"><i class="ti ti-user" aria-hidden="true"></i> '+esc(e.assigned_to)+'</div>';
      h+='</div>';
    });
    h+='<button class="btn sns-new-sched-day btn-sm" data-date="'+dayDateStr+'" style="width:100%;margin-top:4px;background:none;border:1px dashed rgba(255,255,255,.08);border-radius:3px;color:var(--ss-muted);font-size:10px;padding:3px">+ Add</button>';
    h+='</div>';
  }
  h+='</div>';
  // List view
  if(!weekEntries.length){
    h+='<div class="empty"><i class="ti ti-calendar-week" aria-hidden="true"></i>No shifts scheduled for this week.</div>';
    return h;
  }
  h+='<div style="font-size:10px;font-weight:500;color:var(--ss-gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem">This week</div>';
  h+='<div class="divider-line" style="margin-bottom:.75rem"></div>';
  weekEntries.forEach(function(e){
    var col=typeColors[e.shift_type]||'#8a8270';
    var d=new Date(e.date+'T00:00:00');
    var dLabel=d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
    h+='<div style="background:var(--ss-surface);border:1px solid var(--ss-border);border-radius:6px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px">';
    h+='<div style="width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;background:'+col+'"></div>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:3px">';
    h+='<div><div style="font-size:13px;font-weight:500;color:var(--ss-cream)">'+esc(e.title)+'</div>';
    h+='<div style="font-size:11px;color:var(--ss-muted)">'+dLabel+(e.start_time?' &middot; '+fmtTime(e.start_time)+(e.end_time?' – '+fmtTime(e.end_time):''):'')+'</div></div>';
    h+='<div style="display:flex;align-items:center;gap:6px">';
    h+='<span style="font-size:9px;font-weight:500;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.05em;background:'+typeBg[e.shift_type]+';color:'+col+'">'+esc(e.shift_type)+'</span>';
    h+='<button class="btn btn-sm sns-edit-sched" data-id="'+e.id+'" style="padding:3px 6px"><i class="ti ti-pencil" aria-hidden="true"></i></button>';
    h+='<button class="btn btn-sm btn-danger sns-del-sched" data-id="'+e.id+'" style="padding:3px 6px"><i class="ti ti-trash" aria-hidden="true"></i></button>';
    h+='</div></div>';
    if(e.assigned_to)h+='<div style="font-size:11px;color:var(--ss-muted);margin-top:4px"><i class="ti ti-user" aria-hidden="true"></i> '+esc(e.assigned_to)+'</div>';
    if(e.notes)h+='<div style="font-size:11px;color:var(--ss-muted);margin-top:6px;font-style:italic;border-top:1px solid var(--ss-border);padding-top:6px;line-height:1.5">'+esc(e.notes)+'</div>';
    h+='</div></div>';
  });
  return h;
}

function openSchedModal(prefillDate,existingEntry){
  var isEdit=!!existingEntry;
  var m=document.createElement('div');m.className='modal-bg';m.id='modal-sched';
  var types=['Event','Admin','Drop & Set','Site Visit'];
  var h='<div class="modal"><div class="modal-title">'+(isEdit?'Edit':'Add')+' Shift <button class="btn btn-sm sns-close-modal" data-modal="modal-sched"><i class="ti ti-x" aria-hidden="true"></i></button></div>';
  h+='<div class="form-group"><label class="form-label">Title</label><input type="text" id="sched-title" value="'+(isEdit?esc(existingEntry.title||''):'')+'" placeholder="e.g. Yale site visit"></div>';
  h+='<div class="form-group"><label class="form-label">Type</label><select id="sched-type">';
  types.forEach(function(t){h+='<option value="'+t+'"'+(isEdit&&existingEntry.shift_type===t?' selected':'')+'>'+t+'</option>';});
  h+='</select></div>';
  h+='<div class="form-row"><div class="form-group"><label class="form-label">Date</label><input type="date" id="sched-date" value="'+(isEdit?esc(existingEntry.date||''):(prefillDate||''))+'"></div><div class="form-group"></div></div>';
  h+='<div class="form-row"><div class="form-group"><label class="form-label">Start time</label><input type="time" id="sched-start" value="'+(isEdit?esc(existingEntry.start_time||''):'')+'" ></div><div class="form-group"><label class="form-label">End time</label><input type="time" id="sched-end" value="'+(isEdit?esc(existingEntry.end_time||''):'')+'" ></div></div>';
  h+='<div class="form-group"><label class="form-label">Assign to <span style="text-transform:none;letter-spacing:0;font-weight:400;color:var(--ss-muted)">(optional)</span></label><select id="sched-assignee"><option value="">— Unassigned —</option>';
  (state.managers||[]).forEach(function(mg){h+='<option value="'+esc(mg.name)+'"'+(isEdit&&existingEntry.assigned_to===mg.name?' selected':'')+'>'+esc(mg.name)+(mg.role?' — '+esc(mg.role):'')+'</option>';});
  h+='</select></div>';
  h+='<div class="form-group"><label class="form-label">Notes <span style="text-transform:none;letter-spacing:0;font-weight:400;color:var(--ss-muted)">(optional)</span></label><textarea id="sched-notes" style="min-height:80px">'+(isEdit?esc(existingEntry.notes||''):'')+'</textarea></div>';
  h+='<div class="modal-actions"><button class="btn sns-close-modal" data-modal="modal-sched">Cancel</button><button class="btn btn-gold sns-do-sched"><i class="ti ti-check" aria-hidden="true"></i> '+(isEdit?'Save':'Add shift')+'</button></div></div>';
  m.innerHTML=h;document.body.appendChild(m);
  m.querySelectorAll('.sns-close-modal').forEach(function(b){b.onclick=function(){closeModal(b.dataset.modal);};});
  m.querySelector('.sns-do-sched').onclick=async function(){
    var title=(document.getElementById('sched-title')||{}).value;if(title)title=title.trim();
    var type=(document.getElementById('sched-type')||{}).value;
    var date=(document.getElementById('sched-date')||{}).value;
    var start=(document.getElementById('sched-start')||{}).value||null;
    var end=(document.getElementById('sched-end')||{}).value||null;
    var notes=(document.getElementById('sched-notes')||{}).value;if(notes)notes=notes.trim()||null;
    if(!title||!date){showToast('Title and date required.',false);return;}
    if(isEdit){
      var assignee=(document.getElementById('sched-assignee')||{}).value||null;
      await db.from('management_schedule').update({title:title,shift_type:type,date:date,start_time:start,end_time:end,notes:notes,assigned_to:assignee}).eq('id',existingEntry.id);
    }else{
      var assignee=(document.getElementById('sched-assignee')||{}).value||null;
      await db.from('management_schedule').insert({title:title,shift_type:type,date:date,start_time:start,end_time:end,notes:notes,assigned_to:assignee});
    }
    closeModal('modal-sched');await fetchAll();render();showToast(isEdit?'Shift updated!':'Shift added!');
  };
}

function renderAdminReviews(){
  if(state.reviewingEventId){
    var ev=state.events.find(function(e){return e.id===state.reviewingEventId;});
    var existing=(state.eventReviews||[]).find(function(r){return r.event_id===state.reviewingEventId;});
    if(ev&&ev.type==='Drop & Set')return renderDropSetReviewForm(ev,existing);
    return renderReviewForm(ev,existing);
  }
  var today=new Date();today.setHours(0,0,0,0);
  var past=state.events.filter(function(e){return e.date&&new Date(e.date+'T00:00:00')<=today;});
  var reviews=state.eventReviews||[];
  var regular=past.filter(function(e){return e.type!=='Drop & Set';});
  var dropsets=past.filter(function(e){return e.type==='Drop & Set';});
  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem"><div class="section-title">Post-event Reviews</div>';
  h+='<button class="btn btn-sm sns-logout"><i class="ti ti-logout" aria-hidden="true"></i> Sign out</button></div><div class="divider-line"></div>';
  if(!past.length)return h+'<div class="empty"><i class="ti ti-clipboard-check" aria-hidden="true"></i>No past events to review yet.</div>';

  function eventCard(e){
    var review=reviews.find(function(r){return r.event_id===e.id;});
    var isDS=e.type==='Drop & Set';
    var ch='<div class="event-card" style="border-left:3px solid '+(review?'var(--ss-gold-dim)':'var(--ss-border)')+'">';
    ch+='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">';
    ch+='<div>'+(e.type?'<span class="event-type-tag" style="margin-bottom:5px;display:inline-flex">'+esc(e.type)+'</span><br>':'')+
       '<div class="event-name">'+esc(e.name)+'</div><div style="font-size:12px;color:var(--ss-muted);margin-top:3px">'+fmtDate(e.date)+'</div></div>';
    ch+=review?'<span class="badge badge-filled"><i class="ti ti-check" aria-hidden="true"></i> Reviewed</span>':'<span class="badge badge-closed">No review</span>';
    ch+='</div>';
    if(review){
      if(isDS){
        ch+='<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--ss-muted)"><span>Rating: '+(review.overall_rating||'&mdash;')+'/5</span></div>';
      } else {
        ch+='<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--ss-muted)"><span>Overall: '+(review.overall_rating||'&mdash;')+'/5</span><span>Food: '+(review.food_quality||'&mdash;')+'/5</span><span>Staff: '+(review.staff_performance||'&mdash;')+'/5</span><span>Client: '+(review.client_satisfaction||'&mdash;')+'/5</span></div>';
      }
    }
    ch+='<div class="card-actions"><button class="btn btn-sm '+(review?'':'btn-gold')+' sns-write-review" data-eid="'+e.id+'"><i class="ti ti-'+(review?'edit':'clipboard-check')+'" aria-hidden="true"></i> '+(review?'Edit review':'Write review')+'</button>';
    if(review)ch+='<button class="btn btn-sm btn-danger sns-del-review" data-rid="'+review.id+'"><i class="ti ti-trash" aria-hidden="true"></i></button>';
    ch+='</div></div>';
    return ch;
  }

  h+='<div style="display:flex;flex-direction:column;gap:10px">';
  if(regular.length){
    h+='<div style="font-size:10px;font-weight:500;color:var(--ss-gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Events</div>';
    regular.forEach(function(e){h+=eventCard(e);});
  }
  if(dropsets.length){
    h+='<div style="font-size:10px;font-weight:500;color:var(--ss-gold);text-transform:uppercase;letter-spacing:.1em;margin:1rem 0 4px">Drop &amp; Sets</div>';
    dropsets.forEach(function(e){h+=eventCard(e);});
  }
  h+='</div>';return h;
}

  h+='<i class="ti ti-check" aria-hidden="true"></i> '+(existing?'Update review':'Submit review')+'</button></div>';
  return h;

function renderReviewForm(ev,existing){
  var v=existing||{};
  var h='<div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap">';
  h+='<button class="btn btn-sm sns-reviews-back"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back</button>';
  h+='<div class="section-title" style="font-size:16px">'+esc(ev?ev.name:'Event')+'</div></div>';
  if(ev)h+='<div style="font-size:12px;color:var(--ss-muted);margin-bottom:1.25rem">'+fmtDate(ev.date)+(ev.location?' &middot; '+esc(ev.location):'')+'</div>';
  h+='<div class="divider-line"></div>';
  h+='<div class="form-group"><label class="form-label">Reviewed by</label><input type="text" id="r-reviewer" value="'+(v.reviewer_name?esc(v.reviewer_name):'Pat')+'" style="max-width:220px"></div>';
  var avg=0;var cnt=0;

  h+='<div style="font-family:\'Playfair Display\',serif;font-size:32px;color:var(--ss-gold-light)" id="r-avg-display">'+(cnt?(avg/cnt).toFixed(1):'&mdash;')+'</div>';

    h+='<div id="rnotes-'+cat.field+'" style="display:none;padding:0 14px 12px"><textarea id="rtxt-'+cat.field+'" placeholder="'+cat.ph+'" style="font-size:12px;min-height:60px">'+esc(v[cat.nk]||'')+'</textarea></div></div>';
  });
  h+='<div class="divider-line"></div>';
  h+='<div class="form-group"><label class="form-label">Issues that arose</label><textarea id="r-issues" placeholder="Describe any problems\u2026">'+esc(v.issues||'')+'</textarea></div>';
  h+='<div class="form-group"><label class="form-label">General notes</label><textarea id="r-notes" placeholder="Overall impressions\u2026">'+esc(v.general_notes||'')+'</textarea></div>';

function renderEmployee(){
  if(!state.employeeName)return renderStaffLogin();

  var myBids=state.bids.filter(function(b){return myEm&&b.staff_email?b.staff_email.toLowerCase().trim()===myEm:b.staff_name===state.employeeName;});
  var myAnns=(state.announcements||[]).filter(function(a){return !a.target_email||(myEm&&a.target_email.toLowerCase()===myEm);});
  var myPickedBids=myBids.filter(function(b){return b.selected;});
  var myPickedIds=myPickedBids.map(function(b){return b.event_id;});
  var myPickedEvents=state.events.filter(function(e){return myPickedIds.indexOf(e.id)>=0;});

  h+='<div style="font-size:11px;color:var(--ss-muted);margin-top:2px">'+esc(state.employeeEmail)+'</div></div>';
  h+='<div style="display:flex;gap:6px;align-items:center">'+(activeClock?'<span class="clock-active-pill"><span class="gold-dot"></span> Clocked in</span>':'');

  var today2=new Date();today2.setHours(0,0,0,0);
  var today3=new Date();today3.setHours(0,0,0,0);
  var upcomingPicked=myPickedEvents.filter(function(e){return!e.date||new Date(e.date+'T00:00:00')>=today3;});
  var pastPicked=myPickedEvents.filter(function(e){return e.date&&new Date(e.date+'T00:00:00')<today3;});
  if(myAnns.length){
    h+='<div style="margin-bottom:1.5rem">';

    h+='<div class="divider-line" style="margin-bottom:.75rem"></div>';
    myAnns.forEach(function(a){

      h+='<div style="font-size:13px;font-weight:500;color:var(--ss-cream);margin-bottom:4px">'+esc(a.title)+'</div>';
      h+='<div style="font-size:12px;color:var(--ss-muted);line-height:1.6;white-space:pre-wrap">'+esc(a.body)+'</div>';
      h+='<div style="font-size:10px;color:var(--ss-muted);margin-top:6px">'+new Date(a.created_at).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'})+'</div>';
      h+='</div>';
    });
    h+='</div>';

  if(myPickedEvents.length){

      if(!logged&&e.type==='Drop & Set'){
        var tcDrop=(state.timeclockEntries||[]).find(function(t){return t.staff_name===state.employeeName&&t.note&&t.note.indexOf(e.name)>=0;});
        if(tcDrop)logged=tcDrop.total_ms||0;
      }
      h+='<div class="event-card '+(isIn?'open':'filled')+'" style="border-left-color:'+(isIn?'#e6a032':'var(--ss-gold-dim)')+'">';
      h+='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">';
      h+='<div>'+(e.type?'<span class="event-type-tag" style="display:inline-flex;margin-bottom:4px">'+esc(e.type)+'</span><br>':'')+

      h+='<div class="card-actions">';

      } else if(isIn)h+='<button class="btn btn-clockout btn-sm sns-clock-out" data-id="'+e.id+'"><i class="ti ti-player-stop" aria-hidden="true"></i> Clock out</button>';
      else h+='<button class="btn btn-clock btn-sm sns-clock-in" data-id="'+e.id+'"><i class="ti ti-player-play" aria-hidden="true"></i> Clock in</button>';
      if(pb&&pb.selected&&!pb.confirmed)h+='<button class="btn btn-gold btn-sm sns-confirm-shift" data-bid="'+pb.id+'"><i class="ti ti-check" aria-hidden="true"></i> Confirm attendance</button>';
      if(pb&&pb.confirmed)h+='<span class="badge badge-filled"><i class="ti ti-check" aria-hidden="true"></i> Confirmed</span>';
      if(e.document_url&&pb&&pb.selected)h+='<a href="'+esc(e.document_url)+'" target="_blank" class="btn btn-sm"><i class="ti ti-file-type-pdf" aria-hidden="true"></i> View document</a>';
      h+='<button class="btn btn-sm sns-change-shift" data-id="'+e.id+'"><i class="ti ti-arrows-exchange" aria-hidden="true"></i> Request change</button>';
      h+='</div></div>';
    });

    if(totalMs)h+='<div style="font-size:12px;color:var(--ss-muted);margin-top:10px;text-align:right">Total hours: <span style="color:var(--ss-gold-light);font-weight:500">'+fmtH(totalMs)+'</span></div>';
    h+='</div>';
  }
  // Past shifts with documents - shown regardless of upcoming shifts
  var pastWithDocs=(pastPicked||[]).filter(function(e){return e.document_url;});
  if(pastWithDocs.length){
    h+='<div style="margin-bottom:1.5rem"><div style="font-size:10px;font-weight:500;color:var(--ss-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem">Past shift documents</div>';
    h+='<div class="divider-line" style="margin-bottom:.5rem"></div>';
    h+='<div style="display:flex;flex-direction:column;gap:6px">';
    pastWithDocs.forEach(function(e){
      h+='<div style="background:var(--ss-surface);border:1px solid var(--ss-border);border-radius:4px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px">';
      h+='<div><div style="font-size:13px;font-weight:500;color:var(--ss-cream)">'+esc(e.name)+'</div><div style="font-size:11px;color:var(--ss-muted);margin-top:2px">'+fmtDate(e.date)+'</div></div>';
      h+='<a href="'+esc(e.document_url)+'" target="_blank" class="btn btn-sm btn-gold"><i class="ti ti-file-type-pdf" aria-hidden="true"></i> View</a>';
      h+='</div>';
    });
    h+='</div></div>';
  }
  h+='<div class="section-header"><div class="section-title">Open Events</div></div><div class="divider-line"></div>'+filterBar();
  var shown=openEvents.filter(function(e){return myPickedIds.indexOf(e.id)<0;});
  if(!shown.length)h+='<div class="empty"><i class="ti ti-calendar-off" aria-hidden="true"></i>No open events match this filter.</div>';
  h+='<div class="events-grid">';
  shown.forEach(function(e){
    var myBid=myBids.find(function(b){return b.event_id===e.id;});
    h+='<div class="event-card open"'+(e.type==='Drop & Set'?' style="border-top:2px solid var(--ss-gold)"':'')+'>'+
       '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">';
    h+='<div>'+(e.type?'<span class="event-type-tag" style="display:inline-flex;margin-bottom:5px">'+esc(e.type)+'</span><br>':'')+
       '<div class="event-name">'+esc(e.name)+'</div></div>';
    h+=statusBadge(e)+'</div>'+eventMetaHTML(e);
    if(e.type==='Drop & Set')h+='<div style="display:inline-flex;align-items:center;gap:5px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);border-radius:3px;padding:3px 10px;font-size:11px;color:var(--ss-gold)"><i class="ti ti-truck-delivery" aria-hidden="true"></i> Drop &amp; Set</div>';
    else h+=rolePills(e);
    if(myBid)h+='<div class="my-shift-note"><i class="ti ti-check" aria-hidden="true"></i>Bid as '+esc(myBid.role||'')+'</div>';
    h+='<div class="card-actions">';
    if(myBid)h+='<button class="btn btn-sm btn-danger sns-withdraw" data-id="'+myBid.id+'"><i class="ti ti-x" aria-hidden="true"></i> Withdraw</button>';
    else h+='<button class="btn btn-gold btn-sm sns-bid" data-id="'+e.id+'"><i class="ti ti-hand-click" aria-hidden="true"></i> Bid for shift</button>';
    h+='</div></div>';
    });
    h+='</div>';
  return h;
}

var tcClockInterval=null;
function startTCClock(){
  if(tcClockInterval)clearInterval(tcClockInterval);
  tcClockInterval=setInterval(function(){updateTCClock();},1000);
  updateTCClock();
}
function updateTCClock(){
  var el=document.getElementById('tc-live-clock');var dl=document.getElementById('tc-live-date');
  if(!el){clearInterval(tcClockInterval);return;}
  var now=new Date();
  el.textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  if(dl)dl.textContent=now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

  }else{

  }

  h+='<div class="tc-divider"></div>';

  h+='<button class="btn btn-sm sns-tc-add" style="font-size:11px"><i class="ti ti-plus" aria-hidden="true"></i> Add entry</button></div>';

    h+='<div style="font-size:13px;color:var(--ss-muted);padding:1rem 0;text-align:center">No punches yet.</div>';

          else h+='<span class="tc-hi-hrs">'+fmtH(ms)+'</span>';
          h+='<button class="btn btn-sm sns-tc-edit" data-id="'+t.id+'"><i class="ti ti-edit" aria-hidden="true"></i></button>';

async function uploadEventPDF(fileInput, eventId){
  var file=fileInput&&fileInput.files&&fileInput.files[0];
  if(!file)return null;
  var ext=file.name.split('.').pop();
  var path='event-'+eventId+'-'+Date.now()+'.'+ext;
  showToast('Uploading document...');
  var res=await db.storage.from('event-documents').upload(path,file,{upsert:true});
  if(res.error){
    console.error('PDF upload error',res.error);
    showToast('Document upload failed: '+(res.error.message||'Storage error'),false);
    return null;
  }
  var urlRes=db.storage.from('event-documents').getPublicUrl(path);
  var url=urlRes.data&&urlRes.data.publicUrl?urlRes.data.publicUrl:null;
  if(!url){showToast('Could not get document URL',false);return null;}
  showToast('Document uploaded!');
  return url;
}

async function postNewEvent(){
  var typeVal=document.getElementById('c-type').value||'';
  var isDS=typeVal==='Drop & Set';
  var date=document.getElementById('c-date').value;
  var name=document.getElementById('c-name').value.trim();
  if(isDS&&!name){var d=date?new Date(date+'T12:00:00').toLocaleDateString([],{month:'short',day:'numeric'}):'';name='Drop & Set'+(d?' — '+d:'');}
  if(!name||!date){showToast('Date is required.',false);return;}
  var payload={name:name,date:date,
    type:document.getElementById('c-type').value||null,
    start_time:document.getElementById('c-start').value||null,
    end_time:document.getElementById('c-end').value||null,
    location:document.getElementById('c-loc').value.trim()||null,
    notes:document.getElementById('c-notes').value.trim()||null,
    guests:document.getElementById('c-guests').value||null,
    servers_needed:parseInt(document.getElementById('c-servers').value)||0,
    bartenders_needed:parseInt(document.getElementById('c-bartenders').value)||0,
    chefs_needed:parseInt(document.getElementById('c-chefs').value)||0,
    status:'open',
    arrival_time:document.getElementById('c-arrival')?document.getElementById('c-arrival').value||null:null,
    address:document.getElementById('c-address')?document.getElementById('c-address').value.trim()||null:null
  };
  var res=await db.from('events').insert(payload).select();
  if(res.error){showToast('Error: '+(res.error.message||'unknown'),false);return;}
  var newEvent=res.data&&res.data[0]?res.data[0]:null;
  if(newEvent){
    var pdfInputC=document.getElementById('c-pdf');
    if(pdfInputC&&pdfInputC.files&&pdfInputC.files[0]){
      var pdfFileC=pdfInputC.files[0];
      var extC=pdfFileC.name.split('.').pop();
      var pathC='event-'+newEvent.id+'-'+Date.now()+'.'+extC;
      showToast('Uploading document...');
      var uploadResC=await db.storage.from('event-documents').upload(pathC,pdfFileC,{upsert:true});
      if(uploadResC.error){
        showToast('Document upload failed: '+(uploadResC.error.message||'Storage error'),false);
      } else {
        var urlResC=db.storage.from('event-documents').getPublicUrl(pathC);
        var pdfUrlC=urlResC.data&&urlResC.data.publicUrl?urlResC.data.publicUrl:null;
        if(pdfUrlC)await db.from('events').update({document_url:pdfUrlC}).eq('id',newEvent.id);
      }
    }
  }
  closeModal('modal-create');await fetchAll();
  if(newEvent)await sendNewEventNotifications(newEvent);
  else showToast('Event posted!');
  render();
}

async function recheckEventStatus(eventId){
  var e=state.events.find(function(ev){return ev.id===eventId;});if(!e)return;
  var sf=state.bids.filter(function(b){return b.event_id===eventId&&b.role==='Server'&&b.selected;}).length;
  var bf=state.bids.filter(function(b){return b.event_id===eventId&&b.role==='Bartender'&&b.selected;}).length;
  var cf=state.bids.filter(function(b){return b.event_id===eventId&&b.role==='Chef'&&b.selected;}).length;
  var allFilled=sf>=(e.servers_needed||0)&&bf>=(e.bartenders_needed||0)&&cf>=(e.chefs_needed||0);
  var total=state.bids.filter(function(b){return b.event_id===eventId&&b.selected;}).length;
  var ns=allFilled&&total>0?'filled':e.status==='filled'?'open':e.status;
  if(ns!==e.status)await db.from('events').update({status:ns}).eq('id',eventId);
}

async function clockIn(eventId){
  var myEm=(state.employeeEmail||'').toLowerCase().trim();
  var existing=state.timeclockEntries.find(function(t){
    if(t.event_id!==eventId)return false;
    var emailMatch=myEm&&t.staff_email&&t.staff_email.toLowerCase().trim()===myEm;
    var nameMatch=t.staff_name===state.employeeName;
    return emailMatch||nameMatch;
  });
  if(existing&&existing.clocked_in&&!existing.clocked_out){showToast('Already clocked in.',false);return;}
  var pb=state.bids.find(function(b){return b.event_id===eventId&&b.staff_name===state.employeeName&&b.selected;});
  var ev=state.events.find(function(e){return e.id===eventId;});
  if(existing){
    await db.from('timeclock').update({clocked_in:Date.now(),clocked_out:null,total_ms:0}).eq('id',existing.id);
  }else{
    await db.from('timeclock').insert({event_id:eventId,staff_name:state.employeeName,staff_email:state.employeeEmail,role:pb?pb.role:null,clocked_in:Date.now(),clocked_out:null,total_ms:0,note:'Event'+(ev?' | '+ev.name:'')});
  }
  await fetchAll();render();showToast('Clocked in!');
}

async function clockOut(eventId){
  var myEm=(state.employeeEmail||'').toLowerCase().trim();
  var myName=state.employeeName;
  var te=state.timeclockEntries.find(function(t){
    if(t.event_id!==eventId)return false;
    if(!t.clocked_in||t.clocked_out)return false;
    var emailMatch=myEm&&t.staff_email&&t.staff_email.toLowerCase().trim()===myEm;
    var nameMatch=t.staff_name===myName;
    return emailMatch||nameMatch;
  });
  if(!te){showToast('Not clocked in.',false);return;}
  var ms=Date.now()-te.clocked_in;
  await db.from('timeclock').update({clocked_out:Date.now(),total_ms:(te.total_ms||0)+ms,clocked_in:null}).eq('id',te.id);
  await fetchAll();render();showToast('Clocked out — '+fmtH(ms)+' logged.');
}

async function resolveRequest(requestId,status){
  var r=(state.shiftRequests||[]).find(function(sr){return sr.id===requestId;});if(!r)return;
  var ev=state.events.find(function(e){return e.id===r.event_id;});
  // Delete resolved requests after 24h — for now remove immediately on deny, keep approved briefly
  if(status==='denied'){
    await db.from('shift_requests').delete().eq('id',requestId);
  } else {
    await db.from('shift_requests').update({status:status}).eq('id',requestId);
  }
  if(status==='approved'){
    if(r.request_type==='giveup'){
      var bid=state.bids.find(function(b){return b.event_id===r.event_id&&b.staff_name===r.requester_name&&b.selected;});
      if(bid){await db.from('bids').update({selected:false}).eq('id',bid.id);if(ev&&ev.status==='filled')await db.from('events').update({status:'open'}).eq('id',r.event_id);}
      if(r.requester_email&&ev)await sendEmail(r.requester_email,r.requester_name,'Shift give-up approved: '+ev.name,'Hi '+r.requester_name+', your give-up request for '+ev.name+' has been approved. — The Shaken & Stirred Team');
      // Repost event to all staff in directory
      if(ev){
        await db.from('events').update({status:'open'}).eq('id',r.event_id);
        var staff=state.staffDirectory||[];
        for(var si=0;si<staff.length;si++){
          var sm=staff[si];
          if(sm.email===r.requester_email)continue;
          var sb='Hi '+sm.name+', a shift has opened up on '+ev.name+' ('+fmtDate(ev.date)+(ev.start_time?' at '+fmtTime(ev.start_time):'')+').'+(ev.location?' Venue: '+ev.location+'.':'')+' Log in to the staff portal to bid. — The Shaken & Stirred Team';
          await sendEmail(sm.email,sm.name,'Shift available: '+ev.name,sb);
        }
        showToast('Give-up approved — event reposted to staff!');
      }
    }else if(r.request_type==='swap'){
      var rb=state.bids.find(function(b){return b.event_id===r.event_id&&b.staff_name===r.requester_name&&b.selected;});
      if(rb)await db.from('bids').update({selected:false}).eq('id',rb.id);

function getPayPeriod(ts){
  var anchor=new Date('2025-07-06T00:00:00').getTime();
  var periodMs=14*24*60*60*1000;
  var diff=ts-anchor;
  var periodNum=Math.floor(diff/periodMs);
  var start=new Date(anchor+periodNum*periodMs);
  var end=new Date(start.getTime()+periodMs-1);
  return {start:start,end:end,num:periodNum};
}
function fmtPayPeriod(pp){
  var opts={month:'short',day:'numeric',year:'numeric'};
  return pp.start.toLocaleDateString([],opts)+' – '+pp.end.toLocaleDateString([],opts);
}

function exportHours(){
  var entries=state.timeclockEntries||[];
  if(!entries.length){showToast('No hours to export.',false);return;}
  var ppMap={};var ppOrder=[];
  entries.forEach(function(t){
    if(!t.clocked_in)return;
    var ms=(t.total_ms||0)+(t.clocked_in&&!t.clocked_out?Date.now()-t.clocked_in:0);
    if(!ms)return;
    var ev=t.event_id?state.events.find(function(e){return e.id===t.event_id;}):null;
    var dateTs=ev&&ev.date?new Date(ev.date+'T12:00:00').getTime():t.clocked_in;
    var pp=getPayPeriod(dateTs);
    var ppKey=pp.num;
    if(!ppMap[ppKey]){ppMap[ppKey]={label:fmtPayPeriod(pp),staff:{},totalMs:0};ppOrder.push(ppKey);}
    var k=getKey(t.staff_email,t.staff_name);
    if(!ppMap[ppKey].staff[k])ppMap[ppKey].staff[k]={name:t.staff_name,email:t.staff_email||'',entries:[],totalMs:0};
    ppMap[ppKey].staff[k].entries.push({entry:t,ms:ms,ev:ev});
    ppMap[ppKey].staff[k].totalMs+=ms;
    ppMap[ppKey].totalMs+=ms;
  });
  ppOrder.sort(function(a,b){return b-a;});
  var lines=[];
  lines.push('SHAKEN & STIRRED EVENTS');
  lines.push('PAYROLL EXPORT');
  lines.push('Generated: '+new Date().toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'}));
  ppOrder.forEach(function(ppKey){
    var pp=ppMap[ppKey];
    lines.push('');
    lines.push('========================================');
    lines.push('PAY PERIOD: '+pp.label);
    lines.push('========================================');
    lines.push('Employee,Email,Type,Event/Note,Role,Date,Hours');
    var staffList=Object.values(pp.staff).sort(function(a,b){return a.name.localeCompare(b.name);});
    staffList.forEach(function(s){
      s.entries.forEach(function(item){
        var t=item.entry;var ev=item.ev;
        var label=ev?ev.name:(t.note&&t.note!=='Event'&&t.note!=='Admin'?t.note.replace(/^Drop[^|]*\| /,''):'');
        var type=t.event_id?'Event':(t.note==='Admin'?'Admin':t.note&&t.note.startsWith('Drop')?'Drop & Set':'General');
        var date=t.clocked_in?new Date(t.clocked_in).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}):'';
        lines.push('"'+s.name+'","'+(s.email||'')+'","'+type+'","'+label+'","'+(t.role||'')+'","'+date+'","'+(item.ms/3600000).toFixed(2)+'"');
      });
      lines.push('"'+s.name+'","","","","","SUBTOTAL","'+(s.totalMs/3600000).toFixed(2)+'"');
      lines.push('');
    });
    lines.push('"","","","","","PAY PERIOD TOTAL","'+(pp.totalMs/3600000).toFixed(2)+'"');
  });
  var csv=lines.join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='sns-payroll-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  showToast('Payroll export downloaded!');
}
function exportWeeklyReport(){
  var hasData=(state.timeclockEntries||[]).length;
  if(!hasData){showToast('No hours to export.',false);return;}
  var weekMap={};
  (state.timeclockEntries||[]).forEach(function(t){
    if(!t.clocked_in)return;
    var ms=(t.total_ms||0)+(t.clocked_in&&!t.clocked_out?Date.now()-t.clocked_in:0);
    if(!ms)return;
    var ev=t.event_id?state.events.find(function(e){return e.id===t.event_id;}):null;
    var dateTs=ev?new Date(ev.date+'T12:00:00').getTime():t.clocked_in;
    var ws=getWeekStart(new Date(dateTs));
    var wk=ws.toISOString().split('T')[0];
    if(!weekMap[wk])weekMap[wk]={label:fmtWeekLabel(ws),staff:{}};
    var k=getKey(t.staff_email,t.staff_name);
    if(!weekMap[wk].staff[k])weekMap[wk].staff[k]={name:t.staff_name,email:t.staff_email||'',roles:{},totalMs:0};
    weekMap[wk].staff[k].totalMs+=ms;
    var role=t.role||(t.note?t.note.split(' | ')[0]:'General');
    weekMap[wk].staff[k].roles[role]=(weekMap[wk].staff[k].roles[role]||0)+ms;
  });
  var weeks=Object.keys(weekMap).sort();
  if(!weeks.length){showToast('No hours data found.',false);return;}
  var overall={};
  Object.values(weekMap).forEach(function(w){Object.values(w.staff).forEach(function(s){var k=s.email||s.name;if(!overall[k])overall[k]={name:s.name,email:s.email,ms:0};overall[k].ms+=s.totalMs;});});
  var csv='SHAKEN & STIRRED EVENTS - WEEKLY HOURS REPORT\nGenerated: '+new Date().toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'})+'\n\n';
  csv+='TOTAL HOURS SUMMARY\nEmployee,Email,Total Hours\n';
  Object.values(overall).sort(function(a,b){return a.name.localeCompare(b.name);}).forEach(function(s){csv+='"'+s.name+'","'+s.email+'",'+(s.ms/3600000).toFixed(2)+'\n';});
  var grand=Object.values(overall).reduce(function(s,r){return s+r.ms;},0);
  csv+=',,Grand Total,'+(grand/3600000).toFixed(2)+'\n\n---\n\n';
  weeks.forEach(function(wk){
    var week=weekMap[wk];
    csv+='Week: '+week.label+'\nEmployee,Email,Role,Hours\n';
    Object.values(week.staff).sort(function(a,b){return a.name.localeCompare(b.name);}).forEach(function(s){
      var roles=Object.keys(s.roles);
      if(roles.length<=1){csv+='"'+s.name+'","'+s.email+'","'+(roles[0]||'')+'",'+(s.totalMs/3600000).toFixed(2)+'\n';}
      else{roles.forEach(function(r){csv+='"'+s.name+'","'+s.email+'","'+r+'",'+(s.roles[r]/3600000).toFixed(2)+'\n';});csv+='"'+s.name+'","'+s.email+'","TOTAL",'+(s.totalMs/3600000).toFixed(2)+'\n';}
    });
    var wt=Object.values(week.staff).reduce(function(s,r){return s+r.totalMs;},0);
    csv+=',,Week Total,'+(wt/3600000).toFixed(2)+'\n\n';
  });
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='sns-weekly-report-'+new Date().toISOString().split('T')[0]+'.csv';a.click();
  showToast('Weekly report downloaded!');
}

function openStaffHoursModal(name){
  // When called from admin, match by name. When called from staff view, also match by email.
  var myEm=(state.employeeEmail||'').toLowerCase().trim();
  var allEntries=(state.timeclockEntries||[]).filter(function(t){
    var nameMatch=t.staff_name===name;
    var emailMatch=myEm&&t.staff_email&&t.staff_email.toLowerCase().trim()===myEm;
    return nameMatch||emailMatch;
  });
  var entries=allEntries.filter(function(t){return t.event_id;});
  var tcEntries=allEntries.filter(function(t){return !t.event_id;});
  var totalMs=totalMsForStaff(name);
  // Calculate this week's hours
  var today=new Date();today.setHours(0,0,0,0);
  var weekStart=getWeekStart(today);
  var weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+7);
  var thisWeekMs=allEntries.reduce(function(sum,t){
    var ev=t.event_id?(state.events||[]).find(function(e){return e.id===t.event_id;}):null;
    var d=ev?new Date(ev.date+'T00:00:00'):new Date(t.clocked_in);
    d.setHours(0,0,0,0);
    if(d>=weekStart&&d<=weekEnd)
      return sum+(t.total_ms||0)+(t.clocked_in&&!t.clocked_out?Date.now()-t.clocked_in:0);
    return sum;
  },0);
  var m=document.createElement('div');
  m.className='modal-bg';
  m.id='modal-staffhours';

  // Build week groups combining both entry types
  var weekGroups={};
  var weekOrder=[];
  function addToWeek(dateTs, entryObj){
    var ws=getWeekStart(new Date(dateTs));
    var wk=ws.toISOString().split('T')[0];
    if(!weekGroups[wk]){weekGroups[wk]={label:fmtWeekLabel(ws),entries:[],totalMs:0};weekOrder.push(wk);}
    var ms=(entryObj.total_ms||0)+((entryObj.clocked_in&&!entryObj.clocked_out)?Date.now()-entryObj.clocked_in:0);
    weekGroups[wk].entries.push({entry:entryObj,ms:ms,type:entryObj.event_id?'event':'clock'});
    weekGroups[wk].totalMs+=ms;
  }
  entries.forEach(function(t){
    var ev=state.events.find(function(e){return e.id===t.event_id;});
    var dateTs=ev?new Date(ev.date+'T12:00:00').getTime():(t.clocked_in||Date.now());
    addToWeek(dateTs,t);
  });
  tcEntries.forEach(function(t){
    addToWeek(t.clocked_in||Date.now(),t);
  });


  // Calculate Admin vs Event breakdown from timeclock entries
  var adminMs=0;var eventMs=0;
  tcEntries.forEach(function(t){
    var ms=(t.total_ms||0)+(t.clocked_in&&!t.clocked_out?Date.now()-t.clocked_in:0);
    if(t.note==='Admin')adminMs+=ms;
    else if(!t.note||t.note==='Event'||t.note.startsWith('Drop'))eventMs+=ms;
  });
  entries.forEach(function(t){
    var ms=(t.total_ms||0)+(t.clocked_in&&!t.clocked_out?Date.now()-t.clocked_in:0);
    eventMs+=ms;
  });

  var h='<div style="display:flex;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap">';
  h+='<div style="flex:1;background:var(--ss-surface2);border:1px solid var(--ss-border);border-radius:4px;padding:8px 12px;text-align:center">';
  h+='<div style="font-size:18px;font-weight:500;color:var(--ss-gold-light)">'+fmtH(thisWeekMs)+'</div>';
  h+='<div style="font-size:10px;color:var(--ss-muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px">This week</div></div>';
  if(eventMs)h+='<div style="flex:1;background:var(--ss-surface2);border:1px solid var(--ss-border);border-radius:4px;padding:8px 12px;text-align:center"><div style="font-size:18px;font-weight:500;color:#66bb8a">'+fmtH(eventMs)+'</div><div style="font-size:10px;color:var(--ss-muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px">Event</div></div>';
  if(adminMs)h+='<div style="flex:1;background:var(--ss-surface2);border:1px solid var(--ss-border);border-radius:4px;padding:8px 12px;text-align:center"><div style="font-size:18px;font-weight:500;color:#96b4ff">'+fmtH(adminMs)+'</div><div style="font-size:10px;color:var(--ss-muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px">Admin</div></div>';
  h+='</div>';

  if(!entries.length&&!tcEntries.length){
    h+='<div class="empty" style="padding:1rem"><i class="ti ti-clock-off" aria-hidden="true"></i>No hours logged yet.</div>';
  } else {
    weekOrder.forEach(function(wk,wi){
      var grp=weekGroups[wk];
      var isFirst=wi===0;
      var toggleId='sh-week-'+wi;
      // Collapsible week header
      h+='<div class="sns-week-toggle" data-target="'+toggleId+'" style="display:flex;align-items:center;justify-content:space-between;padding:9px 10px;margin:6px 0 4px;background:var(--ss-surface2);border:1px solid var(--ss-border);border-radius:4px;cursor:pointer;user-select:none">';
      h+='<div style="display:flex;align-items:center;gap:8px">';
      h+='<i class="ti ti-chevron-'+(isFirst?'down':'right')+'" style="font-size:13px;color:var(--ss-muted)" aria-hidden="true"></i>';
      h+='<span style="font-size:11px;font-weight:500;color:var(--ss-gold);text-transform:uppercase;letter-spacing:.07em">'+grp.label+'</span></div>';
      h+='<span style="font-size:11px;font-weight:500;color:var(--ss-gold-light)">'+fmtH(grp.totalMs)+'</span></div>';
      h+='<div id="'+toggleId+'" style="display:'+(isFirst?'block':'none')+'">';
      // Entries for this week
      h+='<table class="hours-table" style="margin-bottom:4px"><thead><tr><th>Event / Note</th><th>Role</th><th>Date</th><th>Hours</th><th></th></tr></thead><tbody>';
      grp.entries.forEach(function(item,idx2){
        var t=item.entry;
        var ms=item.ms;
        if(item.type==='event'){
          var ev=state.events.find(function(e){return e.id===t.event_id;});
          var isIn=t.clocked_in&&!t.clocked_out;
          var hrs=(ms/3600000).toFixed(2);
          h+='<tr><td style="font-weight:500;color:var(--ss-cream)">'+esc(ev?ev.name:t.event_id)+'</td>';
          h+='<td>'+(t.role?roleBadge(t.role):'')+'</td>';
          h+='<td style="color:var(--ss-muted)">'+(ev?fmtDate(ev.date):'')+'</td>';
          h+='<td>'+(isIn?'<span class="badge badge-clocked">'+fmtH(ms)+'</span>':'<span style="color:var(--ss-gold-light);font-weight:500">'+fmtH(ms)+'</span>')+'</td>';
          h+='<td style="white-space:nowrap"><button class="btn btn-sm sns-sh-edit" data-idx="'+entries.indexOf(t)+'" data-hrs="'+hrs+'" style="margin-right:4px"><i class="ti ti-edit" aria-hidden="true"></i></button>';
          h+='<button class="btn btn-sm btn-danger sns-sh-del" data-idx="'+entries.indexOf(t)+'"><i class="ti ti-trash" aria-hidden="true"></i></button></td></tr>';

  h+='<div class="modal-actions"><button class="btn sns-close-modal" data-modal="modal-drop">Cancel</button><button class="btn btn-gold sns-do-drop"><i class="ti ti-clock-plus" aria-hidden="true"></i> Log 3h drop</button></div></div>';
  m.innerHTML=h;document.body.appendChild(m);
  m.querySelectorAll('.sns-close-modal').forEach(function(b){b.onclick=function(){closeModal(b.dataset.modal);};});
  m.querySelector('.sns-do-drop').onclick=async function(){
    var eventName=(document.getElementById('drop-event')||{}).value;if(eventName)eventName=eventName.trim();
    var date=(document.getElementById('drop-date')||{}).value;
    var notes=(document.getElementById('drop-notes')||{}).value;if(notes)notes=notes.trim();
    if(!date){showToast('Please select a date.',false);return;}
    var threeH=3*60*60*1000;
    var ci=new Date(date+'T12:00:00').getTime();
    var co=ci+threeH;
    var noteStr='Drop \u2014 3h'+(eventName?' | Event: '+eventName:'')+(notes?' | '+notes:'');
    await db.from('timeclock').insert({staff_name:staffName,clocked_in:ci,clocked_out:co,total_ms:threeH,note:noteStr});
    closeModal('modal-drop');await fetchAll();render();showToast(staffName+' \u2014 3h drop logged!');
  };
}

async function init(){
  document.getElementById('main-content').innerHTML='<div class="loading"><i class="ti ti-loader" aria-hidden="true"></i> Connecting\u2026</div>';
  try{
    loadLocal();
    var session=await db.auth.getSession();
    if(session.data&&session.data.session){
      state.adminLoggedIn=true;state.adminSession=session.data.session;
      document.getElementById('settings-btn').style.display='';
    }
    await fetchAll();render();
  }catch(err){
    console.error('Init error',err);
    document.getElementById('main-content').innerHTML='<div class="empty"><i class="ti ti-wifi-off" aria-hidden="true"></i>Could not connect.<br><br><button class="btn btn-gold" onclick="init()">Try again</button></div>';
  }
}

function waitForDeps(cb,attempts){
  if(attempts===undefined)attempts=0;
  if(typeof supabase!=='undefined'&&typeof emailjs!=='undefined'){cb();}
  else if(attempts<50){setTimeout(function(){waitForDeps(cb,attempts+1);},100);}
  else{document.getElementById('main-content').innerHTML='<div class="empty"><i class="ti ti-alert-circle" aria-hidden="true"></i>Failed to load required scripts. Please refresh.</div>';}
}

waitForDeps(init);</script>
</body>
</html>
