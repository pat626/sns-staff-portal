<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaken & Stirred — Staff Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ss-black:#0e0e0e;
  --ss-navy:#12161f;
  --ss-gold:#c9a84c;
  --ss-gold-light:#e0c375;
  --ss-gold-dim:#7a6230;
  --ss-cream:#f5f0e8;
  --ss-surface:#1a1e28;
  --ss-surface2:#222736;
  --ss-border:rgba(201,168,76,0.18);
  --ss-border-gold:rgba(201,168,76,0.5);
  --ss-text:#f0ebe0;
  --ss-muted:#8a8270;
}
html,body{min-height:100vh;background:var(--ss-navy);color:var(--ss-text);font-family:'Inter',system-ui,sans-serif}

.topbar{background:var(--ss-black);border-bottom:1px solid var(--ss-border-gold);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:58px;gap:12px;position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon svg{width:28px;height:28px;display:block}
.brand-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:500;color:var(--ss-gold);letter-spacing:0.02em;line-height:1.1}
.brand-sub{font-size:9px;color:var(--ss-muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:1px}
.view-toggle{display:flex;gap:2px;background:rgba(255,255,255,0.04);border:1px solid var(--ss-border);border-radius:6px;padding:3px}
.view-btn{font-size:12px;padding:4px 14px;border-radius:4px;border:none;background:transparent;color:var(--ss-muted);cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:0.02em;transition:all 0.15s}
.view-btn.active{background:var(--ss-gold);color:var(--ss-black);font-weight:500}
.topbar-actions{display:flex;gap:6px;align-items:center}

.btn{font-family:'Inter',sans-serif;font-size:12px;padding:6px 14px;border-radius:4px;border:1px solid var(--ss-border);background:transparent;color:var(--ss-text);cursor:pointer;display:inline-flex;align-items:center;gap:5px;letter-spacing:0.02em;transition:all 0.15s}
.btn:hover{border-color:var(--ss-border-gold);color:var(--ss-gold)}
.btn-gold{background:var(--ss-gold);color:var(--ss-black);border-color:var(--ss-gold);font-weight:500}
.btn-gold:hover{background:var(--ss-gold-light);border-color:var(--ss-gold-light);color:var(--ss-black)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-danger{color:#e57373;border-color:rgba(229,115,115,0.3)}
.btn-danger:hover{background:rgba(192,57,43,0.15);border-color:#c0392b;color:#e57373}
.btn-success{color:#66bb8a;border-color:rgba(102,187,138,0.3)}
.btn-success:hover{background:rgba(46,125,82,0.2)}
.btn-clock{background:rgba(46,125,82,0.15);color:#66bb8a;border-color:rgba(102,187,138,0.4);font-weight:500}
.btn-clock:hover{background:rgba(46,125,82,0.25)}
.btn-clockout{background:rgba(192,57,43,0.12);color:#e57373;border-color:rgba(229,115,115,0.35);font-weight:500}
.btn-clockout:hover{background:rgba(192,57,43,0.22)}

.main{padding:1.5rem;max-width:980px;margin:0 auto}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.section-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:500;color:var(--ss-gold-light)}
.divider-line{height:1px;background:linear-gradient(90deg,var(--ss-gold-dim),transparent);margin-bottom:1.25rem}

.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.event-card{background:var(--ss-surface);border:1px solid var(--ss-border);border-radius:6px;padding:1.1rem 1.25rem;display:flex;flex-direction:column;gap:9px;transition:border-color 0.15s}
.event-card:hover{border-color:var(--ss-border-gold)}
.event-card.open{border-left:3px solid #2e7d52}
.event-card.closed{border-left:3px solid var(--ss-muted);opacity:0.6}
.event-card.filled{border-left:3px solid var(--ss-gold-dim)}
.event-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;color:var(--ss-cream);line-height:1.3}
.event-meta{display:flex;flex-direction:column;gap:3px}
.event-meta-row{display:flex;align-items:flex-start;gap:6px;font-size:11.5px;color:var(--ss-muted)}
.event-meta-row i{font-size:13px;width:15px;margin-top:1px;flex-shrink:0}
.event-type-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;padding:2px 8px;border-radius:3px;background:rgba(201,168,76,0.1);color:var(--ss-gold);border:1px solid rgba(201,168,76,0.2)}
.card-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.role-pills{display:flex;gap:5px;flex-wrap:wrap}
.role-pill{font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid var(--ss-border);color:var(--ss-muted);display:inline-flex;align-items:center;gap:3px}
.role-pill.has-need{color:var(--ss-gold);border-color:rgba(201,168,76,0.3);background:rgba(201,168,76,0.07)}

.badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:3px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;letter-spacing:0.04em;text-transform:uppercase}
.badge-open{background:rgba(46,125,82,0.15);color:#66bb8a;border:1px solid rgba(102,187,138,0.25)}
.badge-closed{background:rgba(138,130,112,0.1);color:var(--ss-muted);border:1px solid rgba(138,130,112,0.2)}
.badge-filled{background:rgba(201,168,76,0.1);color:var(--ss-gold);border:1px solid rgba(201,168,76,0.25)}
.badge-clocked{background:rgba(230,160,50,0.12);color:#e6a032;border:1px solid rgba(230,160,50,0.3)}
.badge-picked{background:rgba(201,168,76,0.12);color:var(--ss-gold);border:1px solid rgba(201,168,76,0.3)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;backdrop-filter:blur(2px)}
.modal{background:var(--ss-surface);border:1px solid var(--ss-border-gold);border-radius:8px;padding:1.75rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;color:var(--ss-gold-light);margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;gap:8px}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:1rem}
.form-label{font-size:11px;color:var(--ss-muted);font-weight:500;letter-spacing:0.06em;text-transform:uppercase}
input[type=text],input[type=date],input[type=time],input[type=number],input[type=email],input[type=password],textarea,select{
  font-family:'Inter',sans-serif;font-size:13px;padding:8px 11px;
  border:1px solid var(--ss-border);border-radius:4px;
  background:var(--ss-surface2);color:var(--ss-text);width:100%}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ss-gold-dim);box-shadow:0 0 0 2px rgba(201,168,76,0.12)}
select option{background:var(--ss-surface2);color:var(--ss-text)}
textarea{resize:vertical;min-height:64px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--ss-border)}

.bids-list{display:flex;flex-direction:column;gap:8px}
.bid-item{background:var(--ss-surface2);border:1px solid var(--ss-border);border-radius:4px;padding:10px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.bid-item.selected{border-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.06)}
.bid-name{font-size:13px;font-weight:500;color:var(--ss-cream)}
.bid-note{font-size:12px;color:var(--ss-muted);margin-top:3px;font-style:italic}
.bid-meta{font-size:11px;color:var(--ss-muted);margin-top:2px;display:flex;align-items:center;gap:4px}
.bid-role-tag{font-size:10px;font-weight:500;padding:1px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:0.05em}
.role-server{background:rgba(100,160,255,0.12);color:#78b0ff;border:1px solid rgba(100,160,255,0.25)}
.role-bartender{background:rgba(180,100,255,0.12);color:#c87bff;border:1px solid rgba(180,100,255,0.25)}
.role-chef{background:rgba(255,160,50,0.12);color:#ffaa40;border:1px solid rgba(255,160,50,0.25)}

.hours-table{width:100%;border-collapse:collapse;font-size:13px}
.hours-table th{text-align:left;padding:6px 10px;font-size:10px;font-weight:500;color:var(--ss-gold);text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid var(--ss-border-gold)}
.hours-table td{padding:9px 10px;border-bottom:1px solid var(--ss-border);color:var(--ss-text);vertical-align:top}
.hours-table tr:last-child td{border-bottom:none}
.hours-table tr:hover td{background:rgba(201,168,76,0.04)}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat-card{background:var(--ss-surface);border:1px solid var(--ss-border);border-radius:6px;padding:1rem;text-align:center}
.stat-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:500;color:var(--ss-gold-light)}
.stat-label{font-size:11px;color:var(--ss-muted);margin-top:4px;letter-spacing:0.04em;text-transform:uppercase}

.tabs{display:flex;border-bottom:1px solid var(--ss-border);margin-bottom:1.5rem}
.tab{font-size:12px;padding:9px 16px;border:none;background:transparent;color:var(--ss-muted);cursor:pointer;font-family:'Inter',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:0.04em;display:inline-flex;align-items:center;gap:5px}
.tab.active{color:var(--ss-gold);border-bottom-color:var(--ss-gold)}
.tab:hover:not(.active){color:var(--ss-text)}

.filter-bar{display:flex;gap:6px;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap}
.filter-btn{font-size:11px;padding:3px 10px;border-radius:3px;border:1px solid var(--ss-border);background:transparent;color:var(--ss-muted);cursor:pointer;font-family:'Inter',sans-serif}
.filter-btn.active{background:rgba(201,168,76,0.12);color:var(--ss-gold);border-color:var(--ss-border-gold)}
.filter-btn:hover:not(.active){border-color:var(--ss-border-gold);color:var(--ss-text)}

.info-box{background:rgba(201,168,76,0.07);border:1px solid var(--ss-border-gold);border-radius:4px;padding:10px 14px;font-size:12px;color:var(--ss-gold);margin-bottom:1.25rem;display:flex;gap:8px;align-items:flex-start;line-height:1.5}

.login-screen{background:var(--ss-surface);border:1px solid var(--ss-border-gold);border-radius:8px;padding:2.5rem 2rem;max-width:360px;margin:4rem auto;text-align:center}
.login-screen h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--ss-gold-light);margin-bottom:0.4rem}
.login-screen p{font-size:12px;color:var(--ss-muted);margin-bottom:1.75rem}
.login-error{font-size:12px;color:#e57373;margin-bottom:0.75rem;min-height:18px;text-align:left}

.name-prompt{background:var(--ss-surface);border:1px solid var(--ss-border-gold);border-radius:8px;padding:2.5rem 2rem;max-width:380px;margin:3rem auto;text-align:center}
.name-prompt h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--ss-gold-light);margin-bottom:0.5rem}
.name-prompt p{font-size:13px;color:var(--ss-muted);margin-bottom:1.5rem;line-height:1.6}

.my-shift-note{font-size:11px;color:var(--ss-gold);display:flex;align-items:center;gap:4px;margin-top:2px}
.clock-active-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 10px;border-radius:3px;background:rgba(230,160,50,0.12);color:#e6a032;border:1px solid rgba(230,160,50,0.3)}
.gold-dot{width:6px;height:6px;border-radius:50%;background:#e6a032;display:inline-block}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--ss-surface);border:1px solid var(--ss-border-gold);border-radius:4px;padding:10px 18px;font-size:13px;z-index:200;display:flex;align-items:center;gap:8px;animation:fadeup 0.2s ease;color:var(--ss-text);box-shadow:0 4px 20px rgba(0,0,0,0.4)}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.empty{text-align:center;padding:2.5rem;color:var(--ss-muted);font-size:13px}
.empty i{font-size:28px;display:block;margin-bottom:10px;opacity:0.35}
.loading{text-align:center;padding:3rem;color:var(--ss-muted);font-size:13px}
.role-section-title{font-size:11px;font-weight:500;color:var(--ss-muted);text-transform:uppercase;letter-spacing:0.08em;margin:1rem 0 0.5rem;padding-bottom:6px;border-bottom:1px solid var(--ss-border)}
.tc-wrap{max-width:460px;margin:0 auto;padding:1.5rem 0}
.tc-card{background:var(--ss-surface);border:1px solid var(--ss-border-gold);border-radius:8px;padding:2rem;text-align:center}
.tc-brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:1.75rem}
.tc-clock-display{font-size:52px;font-weight:300;color:var(--ss-cream);letter-spacing:0.04em;font-variant-numeric:tabular-nums;margin-bottom:4px}
.tc-date-display{font-size:12px;color:var(--ss-muted);margin-bottom:2rem;letter-spacing:0.03em}
.tc-name-input{width:100%;font-family:'Inter',sans-serif;font-size:14px;padding:11px 14px;border:1px solid var(--ss-border);border-radius:4px;background:var(--ss-surface2);color:var(--ss-text);text-align:center;margin-bottom:1.25rem;letter-spacing:0.02em}
.tc-name-input:focus{outline:none;border-color:var(--ss-gold-dim);box-shadow:0 0 0 2px rgba(201,168,76,0.12)}
.tc-name-input::placeholder{color:var(--ss-muted)}
.tc-name-input:disabled{opacity:0.5}
.tc-status-row{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--ss-muted);margin-bottom:1.25rem;min-height:20px;letter-spacing:0.02em}
.tc-status-row.active{color:#66bb8a}
.tc-status-dot{width:7px;height:7px;border-radius:50%;background:var(--ss-muted);flex-shrink:0}
.tc-status-dot.active{background:#66bb8a}
.tc-btn{width:100%;padding:14px;border-radius:4px;border:none;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;transition:opacity 0.15s;letter-spacing:0.03em}
.tc-btn-in{background:var(--ss-gold);color:var(--ss-black)}
.tc-btn-in:hover:not(:disabled){opacity:0.88}
.tc-btn-in:disabled{opacity:0.35;cursor:default}
.tc-btn-out{background:rgba(192,57,43,0.15);color:#e57373;border:1px solid rgba(229,115,115,0.35)}
.tc-btn-out:hover{opacity:0.85}
.tc-punch-note{font-size:11px;color:var(--ss-muted);margin-top:4px;letter-spacing:0.02em}
.tc-hist-divider{height:1px;background:linear-gradient(90deg,var(--ss-gold-dim),transparent);margin:1.5rem 0}
.tc-hist-title{font-size:10px;font-weight:500;color:var(--ss-gold);text-transform:uppercase;letter-spacing:0.1em;text-align:left;margin-bottom:10px}
.tc-hist-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--ss-border);text-align:left}
.tc-hist-item:last-child{border-bottom:none}
.tc-hi-name{font-size:13px;font-weight:500;color:var(--ss-cream)}
.tc-hi-time{font-size:11px;color:var(--ss-muted);margin-top:2px}
.tc-hi-hrs{font-size:12px;font-weight:500;color:var(--ss-gold-light)}
.tc-hi-active{font-size:10px;padding:2px 8px;border-radius:3px;background:rgba(46,125,82,0.15);color:#66bb8a;border:1px solid rgba(102,187,138,0.25);font-weight:500;letter-spacing:0.04em;text-transform:uppercase}
@media(max-width:600px){
  .form-row,.form-row-3{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
  .events-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M8 3h12l-2 7H10L8 3z" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-linejoin="round"/>
          <path d="M10 10l4 12 4-12" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 3h14" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="14" cy="22" r="1.5" fill="#c9a84c" opacity="0.6"/>
          <path d="M11 17h6" stroke="#c9a84c" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Shaken &amp; Stirred</div>
        <div class="brand-sub">Staff Portal</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-sm" id="settings-btn" onclick="openSettings()" title="Email settings" style="display:none"><i class="ti ti-settings" aria-hidden="true"></i></button>
      <div class="view-toggle">
        <button class="view-btn" id="btn-admin" onclick="switchView('admin')">Admin</button>
        <button class="view-btn" id="btn-employee" onclick="switchView('employee')">Staff</button>
        <button class="view-btn" id="btn-timeclock" onclick="switchView('timeclock')">Time Clock</button>
      </div>
    </div>
  </div>
  <div class="main" id="main-content"><div class="loading"><i class="ti ti-loader" aria-hidden="true"></i> Loading…</div></div>
</div>

<script>
// ── Supabase init ──
const SUPA_URL = 'https://fxiufkfxbtjupmfdtboh.supabase.co';
const SUPA_KEY = 'sb_publishable_1tNLKiuhtbABPtymQkndRg_RzkzqxeU';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

const EVENT_TYPES = ['Corporate','Private Party','Wedding','Cocktail Reception','Clam Bake','Business Breakfast','Boxed Lunch','Wine Dinner','Outdoor Event','Graduation','Other'];
const ROLES = ['Server','Bartender','Chef'];

const ADMIN_EMAIL = 'Pat@forkhospitality.com';

let state = {
  view:'employee', adminLoggedIn:false, adminSession:null,
  employeeName:'', employeeEmail:'',
  events:[], bids:[], timeEntries:[], shiftRequests:[], timeclockEntries:[],
  dateFilter:'upcoming', adminTab:'events',
  ejsServiceId:'service_vcgm7pc', ejsTemplateId:'template_qj4q1fi', ejsPublicKey:'6iPAaWxrM1Qxr5m5-'
};

// ── Helpers ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtHours(ms){if(!ms||ms<0)return'0h 0m';return Math.floor(ms/3600000)+'h '+Math.floor((ms%3600000)/60000)+'m';}
function fmtDate(d){if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});}catch(e){return d;}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function showToast(msg, ok=true){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div'); t.className='toast';
  t.innerHTML=`<i class="ti ti-${ok?'check':'alert-circle'}" style="color:${ok?'#66bb8a':'#e57373'}"></i>${esc(msg)}`;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 3500);
}

// ── Local storage for staff identity & ejs config ──
function saveUser(){try{localStorage.setItem('ss-user',JSON.stringify({name:state.employeeName,email:state.employeeEmail}));}catch(e){}}
function saveEjs(){try{localStorage.setItem('ss-ejs',JSON.stringify({ejsServiceId:state.ejsServiceId,ejsTemplateId:state.ejsTemplateId,ejsPublicKey:state.ejsPublicKey}));}catch(e){}}
function loadLocal(){
  try{const u=JSON.parse(localStorage.getItem('ss-user')||'{}');state.employeeName=u.name||'';state.employeeEmail=u.email||'';}catch(e){}
  try{
    const c=JSON.parse(localStorage.getItem('ss-ejs')||'{}');
    if(c.ejsServiceId)state.ejsServiceId=c.ejsServiceId;
    if(c.ejsTemplateId)state.ejsTemplateId=c.ejsTemplateId;
    if(c.ejsPublicKey)state.ejsPublicKey=c.ejsPublicKey;
  }catch(e){}
}

// ── Email ──
async function sendEmail(toEmail,toName,subject,body){
  if(!state.ejsPublicKey||!state.ejsServiceId||!state.ejsTemplateId)return false;
  try{emailjs.init(state.ejsPublicKey);await emailjs.send(state.ejsServiceId,state.ejsTemplateId,{to_email:toEmail,to_name:toName,subject,message:body});return true;}
  catch(e){return false;}
}

// ── Supabase data fetchers ──
async function fetchAll(){
  const [evRes, bidRes, teRes, srRes, tcRes] = await Promise.all([
    db.from('events').select('*').order('date', {ascending:true}),
    db.from('bids').select('*'),
    db.from('time_entries').select('*'),
    db.from('shift_requests').select('*').order('created_at', {ascending:false}),
    db.from('timeclock').select('*').order('clocked_in', {ascending:false})
  ]);
  if(evRes.error) console.error('Events fetch error:', evRes.error);
  if(bidRes.error) console.error('Bids fetch error:', bidRes.error);
  if(teRes.error) console.error('TimeEntries fetch error:', teRes.error);
  if(srRes.error) console.error('ShiftRequests fetch error:', srRes.error);
  if(tcRes.error) console.error('Timeclock fetch error:', tcRes.error);
  state.events = evRes.data || [];
  state.bids = bidRes.data || [];
  state.timeEntries = teRes.data || [];
  state.shiftRequests = srRes.data || [];
  state.timeclockEntries = tcRes.data || [];
}

// ── Auth ──
async function adminLogin(){
  const email = document.getElementById('al-user').value.trim();
  const pass = document.getElementById('al-pass').value;
  document.getElementById('al-error').textContent = '';
  const {data, error} = await db.auth.signInWithPassword({email, password:pass});
  if(error){document.getElementById('al-error').textContent='Incorrect username or password.';return;}
  state.adminLoggedIn = true;
  state.adminSession = data.session;
  document.getElementById('settings-btn').style.display='';
  await fetchAll();
  render();
}

async function adminLogout(){
  await db.auth.signOut();
  state.adminLoggedIn = false;
  state.adminSession = null;
  document.getElementById('settings-btn').style.display='none';
  render();
}

// ── View ──
function switchView(v){state.view=v;render();}
function setAdminTab(t){state.adminTab=t;render();}
function setFilter(f){state.dateFilter=f;render();}

function render(){
  document.getElementById('btn-admin').classList.toggle('active',state.view==='admin');
  document.getElementById('btn-employee').classList.toggle('active',state.view==='employee');
  document.getElementById('btn-timeclock').classList.toggle('active',state.view==='timeclock');
  if(state.view==='admin') document.getElementById('main-content').innerHTML=renderAdmin();
  else if(state.view==='timeclock') document.getElementById('main-content').innerHTML=renderTimeclock();
  else document.getElementById('main-content').innerHTML=renderEmployee();
  if(state.view==='timeclock') startTimeclockClock();
}

function filteredEvents(evs){
  const today=new Date(); today.setHours(0,0,0,0);
  return evs.filter(e=>{
    if(!e.date)return true;
    const d=new Date(e.date+'T00:00:00');
    if(state.dateFilter==='today')return d.toDateString()===today.toDateString();
    if(state.dateFilter==='week'){const end=new Date(today);end.setDate(end.getDate()+7);return d>=today&&d<=end;}
    if(state.dateFilter==='upcoming')return d>=today;
    if(state.dateFilter==='past')return d<today;
    return true;
  });
}

function filterBar(){
  return`<div class="filter-bar">
    <i class="ti ti-filter" style="color:var(--ss-muted);font-size:13px"></i>
    ${[['upcoming','Upcoming'],['today','Today'],['week','This week'],['past','Past'],['all','All']].map(([k,l])=>
      `<button class="filter-btn ${state.dateFilter===k?'active':''}" onclick="setFilter('${k}')">${l}</button>`).join('')}
  </div>`;
}

function statusBadge(e){
  if(e.status==='filled')return`<span class="badge badge-filled"><i class="ti ti-check"></i>Filled</span>`;
  if(e.status==='closed')return`<span class="badge badge-closed">Closed</span>`;
  return`<span class="badge badge-open"><i class="ti ti-circle-dot"></i>Open</span>`;
}

function roleBadge(role){
  const r=(role||'').toLowerCase();
  const cls=r==='server'?'role-server':r==='bartender'?'role-bartender':'role-chef';
  return`<span class="bid-role-tag ${cls}">${esc(role)}</span>`;
}

function rolePills(e){
  const pills=[];
  if(e.servers_needed>0){
    const picked=state.bids.filter(b=>b.event_id===e.id&&b.role==='Server'&&b.selected).length;
    pills.push(`<span class="role-pill has-need"><i class="ti ti-bowl-spoon"></i>Servers ${picked}/${e.servers_needed}</span>`);
  }
  if(e.bartenders_needed>0){
    const picked=state.bids.filter(b=>b.event_id===e.id&&b.role==='Bartender'&&b.selected).length;
    pills.push(`<span class="role-pill has-need"><i class="ti ti-glass"></i>Bartenders ${picked}/${e.bartenders_needed}</span>`);
  }
  if(e.chefs_needed>0){
    const picked=state.bids.filter(b=>b.event_id===e.id&&b.role==='Chef'&&b.selected).length;
    pills.push(`<span class="role-pill has-need"><i class="ti ti-chef-hat"></i>Chefs ${picked}/${e.chefs_needed}</span>`);
  }
  return pills.length?`<div class="role-pills">${pills.join('')}</div>`:'';
}

// ── Hours helpers ──
function getTimeEntry(eventId, name){return state.timeEntries.find(t=>t.event_id===eventId&&t.staff_name===name);}
function totalMsForStaff(name){
  return state.timeEntries.filter(t=>t.staff_name===name).reduce((s,t)=>{
    let ms=t.total_ms||0;
    if(t.clocked_in&&!t.clocked_out)ms+=Date.now()-t.clocked_in;
    return s+ms;
  },0);
}
function allStaffHours(){
  const map={};
  // Event-based time entries
  state.timeEntries.forEach(t=>{
    if(!map[t.staff_name])map[t.staff_name]={name:t.staff_name,email:t.staff_email||'',ms:0,events:0};
    let ms=t.total_ms||0;
    if(t.clocked_in&&!t.clocked_out)ms+=Date.now()-t.clocked_in;
    map[t.staff_name].ms+=ms;
    map[t.staff_name].events++;
  });
  // Standalone timeclock entries
  (state.timeclockEntries||[]).forEach(t=>{
    if(!map[t.staff_name])map[t.staff_name]={name:t.staff_name,email:'',ms:0,events:0};
    let ms=t.total_ms||0;
    if(t.clocked_in&&!t.clocked_out)ms+=Date.now()-t.clocked_in;
    map[t.staff_name].ms+=ms;
  });
  return Object.values(map).sort((a,b)=>b.ms-a.ms);
}

async function postNewEvent(){
  const name=document.getElementById('c-name').value.trim();
  const date=document.getElementById('c-date').value;
  if(!name||!date){showToast('Name and date are required.',false);return;}
  const payload={
    name, date,
    type:document.getElementById('c-type').value||null,
    start_time:document.getElementById('c-start').value||null,
    end_time:document.getElementById('c-end').value||null,
    location:document.getElementById('c-loc').value.trim()||null,
    notes:document.getElementById('c-notes').value.trim()||null,
    guests:document.getElementById('c-guests').value||null,
    servers_needed:parseInt(document.getElementById('c-servers').value)||0,
    bartenders_needed:parseInt(document.getElementById('c-bartenders').value)||0,
    chefs_needed:parseInt(document.getElementById('c-chefs').value)||0,
    status:'open'
  };
  console.log('Attempting insert with payload:', payload);
  const {data, error}=await db.from('events').insert(payload).select();
  console.log('Insert result:', {data, error});
  if(error){
    const msg = error.message || error.code || JSON.stringify(error);
    showToast('Error: '+msg, false);
    return;
  }
  closeModal('modal-create');
  await fetchAll(); render(); showToast('Event posted!');
}

async function deleteEvent(id){
  if(!confirm('Delete this event and all its data?'))return;
  await db.from('events').delete().eq('id',id);
  await fetchAll(); render();
}

async function toggleStatus(id, current){
  const newStatus=(!current||current==='open')?'closed':'open';
  await db.from('events').update({status:newStatus}).eq('id',id);
  await fetchAll(); render();
}

async function selectBid(bidId, eventId, role, needed){
  const picked=state.bids.filter(b=>b.event_id===eventId&&b.role===role&&b.selected).length;
  if(picked>=needed){if(!confirm(`${needed} ${role}(s) already filled. Pick anyway?`))return;}
  await db.from('bids').update({selected:true}).eq('id',bidId);
  // check if all roles filled → mark event filled
  await fetchAll();
  const e=state.events.find(ev=>ev.id===eventId);
  if(e){
    const serversFilled=state.bids.filter(b=>b.event_id===eventId&&b.role==='Server'&&b.selected).length;
    const bartsFilled=state.bids.filter(b=>b.event_id===eventId&&b.role==='Bartender'&&b.selected).length;
    const chefsFilled=state.bids.filter(b=>b.event_id===eventId&&b.role==='Chef'&&b.selected).length;
    const allFilled=(serversFilled>=(e.servers_needed||0))&&(bartsFilled>=(e.bartenders_needed||0))&&(chefsFilled>=(e.chefs_needed||0));
    if(allFilled){
      await db.from('events').update({status:'filled'}).eq('id',eventId);
      await fetchAll();
      await sendFullyStaffedEmails(eventId);
    }
  }
  const bid=state.bids.find(b=>b.id===bidId);
  await fetchAll(); closeModal('modal-bids'); openBidsModal(eventId); render();
  if(bid&&bid.staff_email){
    const ev=state.events.find(ev=>ev.id===eventId);
    const body=`Hi ${bid.staff_name},\n\nGreat news — you've been selected to work the following event for Shaken & Stirred as a ${bid.role}!\n\n${ev.type?'Event type: '+ev.type+'\n':''}Event: ${ev.name}\nDate: ${ev.date}${ev.start_time?'\nTime: '+ev.start_time+(ev.end_time?' – '+ev.end_time:''):''}\n${ev.location?'Venue: '+ev.location+'\n':''}${ev.guests?'Guest count: ~'+ev.guests+'\n':''}${ev.notes?'\nNotes: '+ev.notes+'\n':''}\nPlease clock in through the staff portal when you arrive.\n\nSee you there!\n— The Shaken & Stirred Team`;
    const sent=await sendEmail(bid.staff_email,bid.staff_name,`You're on the schedule: ${ev.name}`,body);
    showToast(sent?`Confirmation sent to ${bid.staff_name}!`:`${bid.staff_name} selected — email failed (check Settings).`,sent);
  } else showToast(`${bid?bid.staff_name:'Staff'} added to the schedule.`);
}

async function deselectBid(bidId, eventId){
  await db.from('bids').update({selected:false}).eq('id',bidId);
  const e=state.events.find(ev=>ev.id===eventId);
  if(e&&e.status==='filled')await db.from('events').update({status:'open'}).eq('id',eventId);
  await fetchAll(); closeModal('modal-bids'); openBidsModal(eventId); render();
}

async function placeBid(eventId){
  const role=document.getElementById('b-role').value;
  const note=document.getElementById('b-note').value.trim();
  if(!role){showToast('Please select a role.',false);return;}
  const already=state.bids.find(b=>b.event_id===eventId&&b.staff_name===state.employeeName);
  if(already){showToast('You already have a bid on this event.',false);return;}
  const {error}=await db.from('bids').insert({
    event_id:eventId, staff_name:state.employeeName,
    staff_email:state.employeeEmail, role, note, selected:false
  });
  if(error){showToast('Error submitting bid.',false);return;}
  closeModal('modal-bid');

async function clockIn(eventId){

async function clockOut(eventId){

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function fmtWeekLabel(monday) {
  const sunday = new Date(monday);
  sunday.setDate(sunday.getDate() + 6);
  const opts = {month:'short', day:'numeric'};
  return monday.toLocaleDateString([],opts) + ' - ' + sunday.toLocaleDateString([],opts);
}

function exportWeeklyReport(){
  if(!state.timeEntries.length){showToast('No hours to export.',false);return;}
  const weekMap = {};
  state.timeEntries.forEach(t => {
    const ev = state.events.find(e => e.id === t.event_id);
    if(!ev || !ev.date) return;
    const ms = (t.total_ms||0) + (t.clocked_in&&!t.clocked_out ? Date.now()-t.clocked_in : 0);
    if(!ms) return;
    const evDate = new Date(ev.date + 'T12:00:00');
    const weekStart = getWeekStart(evDate);
    const weekKey = weekStart.toISOString().split('T')[0];
    const weekLabel = fmtWeekLabel(weekStart);
    if(!weekMap[weekKey]) weekMap[weekKey] = { label: weekLabel, staff: {} };
    if(!weekMap[weekKey].staff[t.staff_name]) {
      weekMap[weekKey].staff[t.staff_name] = { name:t.staff_name, email:t.staff_email||'', roles:{}, totalMs:0 };
    }
    const staffEntry = weekMap[weekKey].staff[t.staff_name];
    staffEntry.totalMs += ms;
    const role = t.role || 'Unspecified';
    staffEntry.roles[role] = (staffEntry.roles[role] || 0) + ms;
  });
  // Include standalone timeclock entries in weekly report
  (state.timeclockEntries||[]).forEach(t => {
    if(!t.clocked_in) return;
    const ms = (t.total_ms||0) + (t.clocked_in&&!t.clocked_out ? Date.now()-t.clocked_in : 0);
    if(!ms) return;
    const evDate = new Date(t.clocked_in);
    const weekStart = getWeekStart(evDate);
    const weekKey = weekStart.toISOString().split('T')[0];
    const weekLabel = fmtWeekLabel(weekStart);
    if(!weekMap[weekKey]) weekMap[weekKey] = { label: weekLabel, staff: {} };
    if(!weekMap[weekKey].staff[t.staff_name]) {
      weekMap[weekKey].staff[t.staff_name] = { name:t.staff_name, email:'', roles:{}, totalMs:0 };
    }
    const staffEntry = weekMap[weekKey].staff[t.staff_name];
    staffEntry.totalMs += ms;
    staffEntry.roles['Time Clock'] = (staffEntry.roles['Time Clock'] || 0) + ms;
  });
  const sortedWeeks = Object.keys(weekMap).sort();
  if(!sortedWeeks.length){showToast('No hours data found.',false);return;}
  // Build overall totals summary first
  const overallMap = {};
  state.timeEntries.forEach(t => {
    const ms = (t.total_ms||0) + (t.clocked_in&&!t.clocked_out ? Date.now()-t.clocked_in : 0);
    if(!ms) return;
    if(!overallMap[t.staff_name]) overallMap[t.staff_name] = {name:t.staff_name, email:t.staff_email||'', ms:0};
    overallMap[t.staff_name].ms += ms;
  });
  const overallList = Object.values(overallMap).sort((a,b)=>a.name.localeCompare(b.name));

  let csv = 'SHAKEN & STIRRED EVENTS - WEEKLY HOURS REPORT\n';
  csv += 'Generated: '+new Date().toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'})+'\n\n';

  // Summary section
  csv += 'TOTAL HOURS SUMMARY\n';
  csv += 'Employee,Email,Total Hours\n';
  overallList.forEach(s => {
    csv += '"'+s.name+'","'+s.email+'",'+(s.ms/3600000).toFixed(2)+'\n';
  });
  const grandTotalMs = overallList.reduce((sum,s)=>sum+s.ms,0);
  csv += ',Grand Total,'+(grandTotalMs/3600000).toFixed(2)+'\n\n';
  csv += '---\n\n';

  sortedWeeks.forEach(weekKey => {
    const week = weekMap[weekKey];
    csv += 'Week: '+week.label+' (Mon - Sun)\n';
    csv += 'Employee,Email,Role,Hours\n';
    const staffList = Object.values(week.staff).sort((a,b)=>a.name.localeCompare(b.name));
    staffList.forEach(s => {
      const roles = Object.keys(s.roles);
      if(roles.length <= 1) {
        csv += '"'+s.name+'","'+s.email+'","'+(roles[0]||'')+'",'+(s.totalMs/3600000).toFixed(2)+'\n';
      } else {
        roles.forEach(role => {
          csv += '"'+s.name+'","'+s.email+'","'+role+'",'+(s.roles[role]/3600000).toFixed(2)+'\n';
        });
        csv += '"'+s.name+'","'+s.email+'","TOTAL",'+(s.totalMs/3600000).toFixed(2)+'\n';
      }
    });
    const weekTotalMs = Object.values(week.staff).reduce((sum,s)=>sum+s.totalMs,0);
    csv += ',,Week Total,'+(weekTotalMs/3600000).toFixed(2)+'\n\n';
  });
  const today = new Date().toISOString().split('T')[0];
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'sns-weekly-report-'+today+'.csv';
  a.click();
  showToast('Weekly report downloaded!');
}

async function submitShiftRequest(eventId){
  const type=document.getElementById('sr-type').value;
  const reason=(document.getElementById('sr-reason')||{}).value?.trim()||'';
  const swapName=type==='swap'?(document.getElementById('sr-swap-name')||{}).value?.trim():'';
  const swapEmail=type==='swap'?(document.getElementById('sr-swap-email')||{}).value?.trim():'';
  if(type==='swap'&&!swapName){showToast('Please enter the name of who you want to swap with.',false);return;}
  const {error}=await db.from('shift_requests').insert({
    event_id:eventId, requester_name:state.employeeName,
    requester_email:state.employeeEmail, request_type:type,
    swap_with_name:swapName||null, swap_with_email:swapEmail||null,
    reason:reason||null, status:'pending'
  });
  if(error){showToast('Error submitting request.',false);console.error(error);return;}
  closeModal('modal-shift-req');
  await fetchAll(); render(); showToast('Request submitted — waiting for admin approval.');
  // Notify admin
  const ev=state.events.find(e=>e.id===eventId);
  if(ev){
    const body = type==='swap'
      ? 'Shift swap request from '+state.employeeName+' for '+ev.name+' ('+ev.date+'). They want to swap with: '+swapName+(swapEmail?' ('+swapEmail+')':'')+(reason?' Reason: '+reason:'.')+' Log in to the staff portal to approve or deny.'
      : 'Shift give-up request from '+state.employeeName+' for '+ev.name+' ('+ev.date+').'+(reason?' Reason: '+reason:'.')+' Log in to the staff portal to approve or deny.';
    await sendEmail(ADMIN_EMAIL,'Pat',(type==='swap'?'Swap request: ':'Give-up request: ')+ev.name+' — '+state.employeeName, body);
    // Notify swap partner if swap
    if(type==='swap'&&swapEmail){
      const swapBody='Hi '+swapName+', '+state.employeeName+' has requested to swap their shift on '+ev.name+' ('+ev.date+') with you. This swap is pending admin approval. You will be notified once a decision is made. — The Shaken & Stirred Team';
      await sendEmail(swapEmail,swapName,'Shift swap request: '+ev.name,swapBody);
    }
  }
}

async function resolveRequest(requestId, status){
  const r=(state.shiftRequests||[]).find(sr=>sr.id===requestId); if(!r)return;
  const ev=state.events.find(e=>e.id===r.event_id);
  await db.from('shift_requests').update({status}).eq('id',requestId);
  if(status==='approved'){
    if(r.request_type==='giveup'){
      // Deselect the bid and reopen slot
      const bid=state.bids.find(b=>b.event_id===r.event_id&&b.staff_name===r.requester_name&&b.selected);
      if(bid){
        await db.from('bids').update({selected:false}).eq('id',bid.id);
        if(ev&&ev.status==='filled') await db.from('events').update({status:'open'}).eq('id',r.event_id);
      }
      // Notify employee
      if(r.requester_email&&ev){
        await sendEmail(r.requester_email,r.requester_name,'Shift give-up approved: '+ev.name,'Hi '+r.requester_name+', your request to give up your shift on '+ev.name+' ('+ev.date+') has been approved. — The Shaken & Stirred Team');
      }
    } else if(r.request_type==='swap'){
      // Deselect requester, select swap partner if they have a bid, else create one
      const requesterBid=state.bids.find(b=>b.event_id===r.event_id&&b.staff_name===r.requester_name&&b.selected);
      if(requesterBid) await db.from('bids').update({selected:false}).eq('id',requesterBid.id);
      const swapBid=state.bids.find(b=>b.event_id===r.event_id&&b.staff_name===r.swap_with_name);
      if(swapBid){
        await db.from('bids').update({selected:true}).eq('id',swapBid.id);
      } else {
        await db.from('bids').insert({event_id:r.event_id,staff_name:r.swap_with_name,staff_email:r.swap_with_email||'',role:requesterBid?requesterBid.role:'Server',note:'Added via swap',selected:true});
      }
      // Notify both parties
      if(ev){
        if(r.requester_email) await sendEmail(r.requester_email,r.requester_name,'Shift swap approved: '+ev.name,'Hi '+r.requester_name+', your shift swap request for '+ev.name+' ('+ev.date+') has been approved. You have been removed from this shift. — The Shaken & Stirred Team');
        if(r.swap_with_email) await sendEmail(r.swap_with_email,r.swap_with_name,'You have been added to a shift: '+ev.name,'Hi '+r.swap_with_name+', you have been added to '+ev.name+' ('+ev.date+') via a shift swap. — The Shaken & Stirred Team');
      }
    }
  } else {
    // Denied — notify requester
    if(r.requester_email&&ev){
      await sendEmail(r.requester_email,r.requester_name,'Shift request denied: '+ev.name,'Hi '+r.requester_name+', your request for '+ev.name+' was not approved. Please reach out if you have questions. — The Shaken & Stirred Team');
    }
  }
  await fetchAll(); render(); showToast(status==='approved'?'Request approved!':'Request denied.');
}

function totalMsFromTimeclock(name){

    if(t.clocked_in&&!t.clocked_out)ms+=Date.now()-t.clocked_in;

let tcClockInterval=null;
function startTimeclockClock(){

    const el=document.getElementById('tc-live-clock');

    if(!el){clearInterval(tcClockInterval);return;}
    const now=new Date();
    const pad=n=>String(n).padStart(2,'0');
    el.textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
    if(del)del.textContent=now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  },1000);
  // init immediately
  const el=document.getElementById('tc-live-clock');
  const del=document.getElementById('tc-live-date');
  if(el){
    const now=new Date();const pad=n=>String(n).padStart(2,'0');
    el.textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
    if(del)del.textContent=now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  }
}

function renderTimeclock(){
  const recent=(state.timeclockEntries||[]).slice(0,8);
  const activeEntry=recent.find(t=>t.clocked_in&&!t.clocked_out);
  return`<div class="tc-wrap">
    <div class="tc-card">
      <div class="tc-brand">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M8 3h12l-2 7H10L8 3z" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-linejoin="round"/>
          <path d="M10 10l4 12 4-12" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 3h14" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="14" cy="22" r="1.5" fill="#c9a84c" opacity="0.6"/>
          <path d="M11 17h6" stroke="#c9a84c" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
        </svg>
        <div>
          <div class="brand-name" style="font-family:'Playfair Display',serif;font-size:16px;font-weight:500;color:var(--ss-gold);letter-spacing:0.02em;line-height:1.1">Shaken &amp; Stirred</div>
          <div class="brand-sub" style="font-size:9px;color:var(--ss-muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:1px">Time Clock</div>
        </div>
      </div>

      <div class="tc-clock-display" id="tc-live-clock">--:--:--</div>
      <div class="tc-date-display" id="tc-live-date">--</div>

      <input type="text" class="tc-name-input" id="tc-name-field" placeholder="Enter your name" oninput="tcCheckName()" ${activeEntry?'disabled':''}>

      <div class="tc-status-row ${activeEntry?'active':''}" id="tc-status-row">
        <span class="tc-status-dot ${activeEntry?'active':''}" id="tc-status-dot"></span>
        <span id="tc-status-text">${activeEntry?esc(activeEntry.staff_name)+' is currently clocked in':'Enter your name to clock in'}</span>
      </div>

      ${activeEntry
        ?`<button class="tc-btn tc-btn-out" id="tc-btn-out" onclick="tcPunchOut('${activeEntry.id}','${esc(activeEntry.staff_name)}')"><i class="ti ti-player-stop" aria-hidden="true"></i> Clock out — ${esc(activeEntry.staff_name)}</button>`
        :`<button class="tc-btn tc-btn-in" id="tc-btn-in" onclick="tcPunchIn()" disabled><i class="ti ti-player-play" aria-hidden="true"></i> Clock in</button>`}
      <div class="tc-punch-note" id="tc-punch-note">${activeEntry?'Tap Clock out when your shift ends':'Type your name above then tap Clock in'}</div>

      <div class="tc-hist-divider"></div>
      <div class="tc-hist-title">Recent punches</div>
      <div>
        ${recent.length===0?`<div style="font-size:13px;color:var(--ss-muted);padding:1rem 0;text-align:center">No punches yet today.</div>`:''}
        ${recent.map(t=>{
          const isActive=t.clocked_in&&!t.clocked_out;
          const ms=(t.total_ms||0)+(isActive?Date.now()-t.clocked_in:0);
          const inTime=t.clocked_in?new Date(t.clocked_in).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'--';
          const outTime=t.clocked_out?new Date(t.clocked_out).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
          return`<div class="tc-hist-item">
            <div>
              <div class="tc-hi-name">${esc(t.staff_name)}</div>
              <div class="tc-hi-time">${isActive?'Clocked in '+inTime:inTime+' – '+outTime}</div>
            </div>
            ${isActive?`<span class="tc-hi-active">Active</span>`:`<span class="tc-hi-hrs">${fmtHours(ms)}</span>`}
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

function tcCheckName(){
  const name=(document.getElementById('tc-name-field')||{}).value?.trim();
  const btn=document.getElementById('tc-btn-in');
  if(!btn)return;
  if(name){btn.disabled=false;}
  else{btn.disabled=true;}
}

async function tcPunchIn(){
  const name=(document.getElementById('tc-name-field')||{}).value?.trim();
  if(!name){showToast('Please enter your name.',false);return;}
  const {error}=await db.from('timeclock').insert({
    staff_name:name, clocked_in:Date.now(), clocked_out:null, total_ms:0
  });
  if(error){showToast('Error clocking in.',false);console.error(error);return;}
  await fetchAll();render();showToast(name+' clocked in!');
}

async function tcPunchOut(entryId, staffName){
  const entry=(state.timeclockEntries||[]).find(t=>t.id===entryId);
  if(!entry){showToast('Entry not found.',false);return;}
  const ms=Date.now()-entry.clocked_in;
  const {error}=await db.from('timeclock').update({
    clocked_out:Date.now(), total_ms:ms
  }).eq('id',entryId);
  if(error){showToast('Error clocking out.',false);console.error(error);return;}
  await fetchAll();render();showToast(staffName+' clocked out — '+fmtHours(ms)+' logged.');
}

function closeModal(id){const m=document.getElementById(id);if(m)m.remove();}

// ── Init ──
async function init(){
  document.getElementById('main-content').innerHTML='<div class="loading">Connecting to database…</div>';
  try {
    loadLocal();
    // restore admin session if still valid
    const {data:{session}, error:authErr}=await db.auth.getSession();
    if(authErr) console.warn('Auth session error:', authErr);
    if(session){
      state.adminLoggedIn=true;
      state.adminSession=session;
      document.getElementById('settings-btn').style.display='';
    }
    await fetchAll();
    render();
  } catch(err) {
    console.error('Init error:', err);
    document.getElementById('main-content').innerHTML=`<div class="empty"><i class="ti ti-wifi-off"></i>Could not connect to database.<br><br><small style="color:var(--ss-muted)">${err.message||err}</small><br><br><button class="btn btn-gold" onclick="init()">Try again</button></div>`;
  }
}

// Wait for all external scripts to load before init
function waitForDeps(cb, attempts=0) {
  if(typeof supabase !== 'undefined' && typeof emailjs !== 'undefined') {
    cb();
  } else if(attempts < 50) {
    setTimeout(()=>waitForDeps(cb, attempts+1), 100);
  } else {
    document.getElementById('main-content').innerHTML='<div class="empty"><i class="ti ti-alert-circle"></i>Failed to load required scripts.<br><br><small style="color:var(--ss-muted)">Please check your internet connection and refresh.</small><br><br><button class="btn btn-gold" onclick="location.reload()">Refresh</button></div>';
  }
}

waitForDeps(init);
</script>
</body>
</html>
