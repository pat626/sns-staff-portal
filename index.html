  if(v.food_quality){avg+=v.food_quality;cnt++;}
  if(v.staff_performance){avg+=v.staff_performance;cnt++;}
  if(v.client_satisfaction){avg+=v.client_satisfaction;cnt++;}
  html+='<div style="font-family:'Playfair Display',serif;font-size:32px;color:var(--ss-gold-light)" id="r-avg-display">'+(cnt?( avg/cnt).toFixed(1):'—')+'</div>';
  html+='<div style="font-size:11px;color:var(--ss-muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px">Overall score</div></div>';
  var cats=[
    {field:'overall',label:'Overall event',ph:'What made this event stand out, or fall short?'},
    {field:'food_quality',label:'Food quality',ph:'Comments on presentation, taste, temperature, portions…'},
    {field:'staff_performance',label:'Staff performance',ph:'Notes on punctuality, professionalism, teamwork…'},
    {field:'client_satisfaction',label:'Client satisfaction',ph:'How did the client respond? Any feedback they shared?'}
  ];
  cats.forEach(function(cat){
    var ratingVal=v[cat.field]||0;
    html+='<div class="rating-block" style="margin-bottom:10px;background:var(--ss-surface2);border:1px solid var(--ss-border);border-radius:4px;overflow:hidden">';
    html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px">';
    html+='<div style="font-size:13px;color:var(--ss-text)">'+cat.label+'</div>';
    html+='<div style="display:flex;align-items:center;gap:8px"><div class="stars" id="stars-'+cat.field+'">';
    for(var n=1;n<=5;n++){
      html+='<span class="rstar" data-field="'+cat.field+'" data-val="'+n+'" style="font-size:18px;cursor:pointer;color:'+(ratingVal&&n<=ratingVal?'var(--ss-gold)':'var(--ss-muted)')+'"><i class="ti ti-star" aria-hidden="true"></i></span>';
    }
    html+='</div><button class="btn btn-sm sns-toggle-notes" data-field="'+cat.field+'" style="font-size:11px;padding:3px 8px"><i class="ti ti-notes" aria-hidden="true"></i> Notes</button></div></div>';
    html+='<div id="rnotes-'+cat.field+'" style="display:none;padding:0 14px 12px">';
    html+='<textarea id="rtxt-'+cat.field+'" placeholder="'+cat.ph+'" style="font-family:'Inter',sans-serif;font-size:12px;padding:7px 10px;border:1px solid var(--ss-border);border-radius:4px;background:var(--ss-surface);color:var(--ss-text);width:100%;min-height:60px;resize:vertical">'+esc(v[cat.field+'_notes']||'')+'</textarea></div></div>';
  });
  html+='<div class="divider-line"></div>';
  html+='<div style="font-size:10px;font-weight:500;color:var(--ss-gold);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px">Notes</div>';
  html+='<div class="form-group"><label class="form-label">Issues that arose</label>';
  html+='<textarea id="r-issues" placeholder="Describe any problems, delays, or challenges…">'+esc(v.issues||'')+'</textarea></div>';
  html+='<div class="form-group"><label class="form-label">General notes</label>';
  html+='<textarea id="r-notes" placeholder="Overall impressions, things that went well, suggestions for next time…">'+esc(v.general_notes||'')+'</textarea></div>';
  html+='<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--ss-border)">';
  html+='<button class="btn sns-reviews-back">Cancel</button>';
  html+='<button class="btn btn-gold sns-submit-review" data-eid="'+(ev?ev.id:'')+'" data-rid="'+(existing?existing.id:'')+'">';
  html+='<i class="ti ti-check" aria-hidden="true"></i> '+(existing?'Update review':'Submit review')+'</button></div>';
  return html;
}


function openBidModal(eventId){
  const e=state.events.find(ev=>ev.id===eventId); if(!e)return;
  const availableRoles=[];
  if(e.servers_needed>0)availableRoles.push('Server');
  if(e.bartenders_needed>0)availableRoles.push('Bartender');
  if(e.chefs_needed>0)availableRoles.push('Chef');
  const m=document.createElement('div');m.className='modal-bg';m.id='modal-bid';
  m.innerHTML=`<div class="modal">\n    <div class="modal-title"><span>Bid for shift</span><button class="btn btn-sm" onclick="closeModal('modal-bid')"><i class="ti ti-x"></i></button></div>\n    <div style="background:rgba(201,168,76,0.06);border:1px solid var(--ss-border);border-radius:4px;padding:12px 14px;margin-bottom:1.25rem">\n      ${e.type?`<div class="event-type-tag" style="margin-bottom:8px">${esc(e.type)}</div>`:''}\n      <div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--ss-cream);margin-bottom:8px">${esc(e.name)}</div>\n      <div class="event-meta">\n        <div class="event-meta-row"><i class="ti ti-calendar"></i>${fmtDate(e.date)}${e.start_time?' · '+esc(e.start_time)+(e.end_time?'–'+esc(e.end_time):''):''}</div>\n        ${e.location?`<div class="event-meta-row"><i class="ti ti-map-pin"></i>${esc(e.location)}</div>`:''}\n        ${e.notes?`<div class="event-meta-row"><i class="ti ti-notes"></i>${esc(e.notes)}</div>`:''}\n      </div>\n    </div>\n    <div class="form-group"><label class="form-label">I'm bidding as a</label>\n      <select id="b-role">\n        ${availableRoles.length===0?`<option value="">No roles needed</option>`:''}\n        ${availableRoles.map(r=>`<option value="${r}">${r}</option>`).join('')}\n      </select>\n    </div>\n    <div class="form-group"><label class="form-label">Note for admin <span style="text-transform:none;letter-spacing:0;font-weight:400;color:var(--ss-muted)">(optional)</span></label>\n      <textarea id="b-note" placeholder="Experience, availability notes…"></textarea></div>\n    <div class="modal-actions">\n      <button class="btn" onclick="closeModal('modal-bid')">Cancel</button>\n      <button class="btn btn-gold" onclick="placeBid('${eventId}')"><i class="ti ti-hand-click"></i> Submit bid</button>\n    </div>\n  </div>`;
  document.body.appendChild(m);
}

function openEventHoursModal(eventId){
  const e=state.events.find(ev=>ev.id===eventId); if(!e)return;
  const entries=state.timeEntries.filter(t=>t.event_id===eventId);
  const m=document.createElement('div');m.className='modal-bg';m.id='modal-ehours';
  m.innerHTML=`<div class="modal">\n    <div class="modal-title"><span>${esc(e.name)} — Hours</span><button class="btn btn-sm" onclick="closeModal('modal-ehours')"><i class="ti ti-x"></i></button></div>\n    ${entries.length===0?`<div class="empty" style="padding:1rem"><i class="ti ti-clock-off"></i>No one has clocked in yet.</div>`:`
    <table class="hours-table">
      <thead><tr><th>Staff</th><th>Role</th><th>Status</th><th>Hours</th></tr></thead>
      <tbody>${entries.map(t=>{
        const isIn=t.clocked_in&&!t.clocked_out;
        const ms=(t.total_ms||0)+(isIn?Date.now()-t.clocked_in:0);
        return`<tr>\n          <td><div style="font-weight:500;color:var(--ss-cream)">${esc(t.staff_name)}</div></td>\n          <td>${t.role?roleBadge(t.role):''}</td>\n          <td>${isIn?`<span class="badge badge-clocked">Active</span>`:`<span class="badge badge-closed">Done</span>`}</td>\n          <td style="font-weight:500;color:var(--ss-gold-light)">${fmtHours(ms)}</td>\n        </tr>`;
      }).join('')}</tbody>\n    </table>`}\n    <div class="modal-actions"><button class="btn" onclick="closeModal('modal-ehours')">Close</button></div>\n  </div>`;\n  document.body.appendChild(m);\n}\n\nfunction openStaffHoursModal(name){\n  var myEm=(state.employeeEmail||'').toLowerCase().trim();\n  var entries=state.timeEntries.filter(function(t){return myEm&&t.staff_email?t.staff_email.toLowerCase().trim()===myEm:t.staff_name===name;});\n  var tcEntries=(state.timeclockEntries||[]).filter(function(t){return t.staff_name===name;});\n  var totalMs=totalMsForStaff(name);\n  var m=document.createElement('div');\n  m.className='modal-bg';\n  m.id='modal-staffhours';\n\n  var html='<div class="modal">';\n  html+='<div class="modal-title"><span>'+esc(name)+' — Hours</span>';\n  html+='<button class="btn btn-sm sns-close-hrs"><i class="ti ti-x" aria-hidden="true"></i></button></div>';\n  html+='<div style="font-size:12px;color:var(--ss-muted);margin-bottom:1.25rem">Total: <span style="color:var(--ss-gold-light);font-weight:500">'+fmtHours(totalMs)+'</span></div>';\n\n  var hasRows=entries.length>0||tcEntries.length>0;\n  if(!hasRows){\n    html+='<div class="empty" style="padding:1rem"><i class="ti ti-clock-off" aria-hidden="true"></i>No hours logged yet.</div>';\n  } else {\n    html+='<table class="hours-table"><thead><tr><th>Event / Note</th><th>Role</th><th>Date</th><th>Hours</th><th></th></tr></thead><tbody>';\n    for(var i=0;i<entries.length;i++){\n      var t=entries[i];\n      var ev=state.events.find(function(e){return e.id===t.event_id;});\n      var isIn=t.clocked_in&&!t.clocked_out;\n      var ms=(t.total_ms||0)+(isIn?Date.now()-t.clocked_in:0);\n      var hrs=(ms/3600000).toFixed(2);\n      html+='<tr>';\n      html+='<td style="font-weight:500;color:var(--ss-cream)">'+esc(ev?ev.name:t.event_id)+'</td>';\n      html+='<td>'+(t.role?roleBadge(t.role):'')+'</td>';\n      html+='<td style="color:var(--ss-muted)">'+(ev?fmtDate(ev.date):'')+'</td>';\n      if(isIn){html+='<td><span class="badge badge-clocked">'+fmtHours(ms)+'</span></td>';}\n      else{html+='<td><span style="color:var(--ss-gold-light);font-weight:500">'+fmtHours(ms)+'</span></td>';}\n      html+='<td style="white-space:nowrap">';\n      html+='<button class="btn btn-sm sns-edit-hrs" data-id="'+t.id+'" data-name="'+esc(name)+'" data-hrs="'+hrs+'" style="margin-right:4px"><i class="ti ti-edit" aria-hidden="true"></i></button>';\n      html+='<button class="btn btn-sm btn-danger sns-del-hrs" data-id="'+t.id+'" data-name="'+esc(name)+'"><i class="ti ti-trash" aria-hidden="true"></i></button>';\n      html+='</td></tr>';\n    }\n    for(var j=0;j<tcEntries.length;j++){\n      var tc=tcEntries[j];\n      var tcIsIn=tc.clocked_in&&!tc.clocked_out;\n      var tcMs=(tc.total_ms||0)+(tcIsIn?Date.now()-tc.clocked_in:0);\n      var isDrop=tc.note&&tc.note.startsWith('Drop');\n      var inDate=tc.clocked_in?new Date(tc.clocked_in).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}):'';\n      var rawNote=tc.note||'';\n      var displayNote=isDrop?rawNote.replace('Drop — 3h | ','').replace('Drop — 3h','').trim()||'Drop':rawNote||'Time clock';\n      html+='<tr>';\n      html+='<td><div style="font-weight:500;color:var(--ss-cream)">';\n      if(isDrop){html+='<span class="badge badge-picked" style="margin-right:6px;font-size:9px;vertical-align:middle">Drop</span>';}\n      html+=esc(displayNote)+'</div></td>';\n      html+='<td><span style="font-size:11px;color:var(--ss-muted)">Clock</span></td>';\n      html+='<td style="color:var(--ss-muted)">'+inDate+'</td>';\n      if(tcIsIn){html+='<td><span class="badge badge-clocked">'+fmtHours(tcMs)+'</span></td>';}\n      else{html+='<td><span style="color:var(--ss-gold-light);font-weight:500">'+fmtHours(tcMs)+'</span></td>';}\n      html+='<td style="white-space:nowrap">';\n      html+='<button class="btn btn-sm btn-danger sns-del-tc" data-id="'+tc.id+'"><i class="ti ti-trash" aria-hidden="true"></i></button>';\n      html+='</td></tr>';\n    }\n    html+='</tbody></table>';\n  }\n  html+='<div class="modal-actions"><button class="btn" onclick="closeModal('modal-staffhours')">Close</button></div>';\n  html+='</div>';\n  m.innerHTML=html;\n  document.body.appendChild(m);\n  m.querySelectorAll('.sns-close-hrs').forEach(function(btn){\n    btn.addEventListener('click',function(){closeModal('modal-staffhours');});\n  });\n  m.querySelectorAll('.sns-edit-hrs').forEach(function(btn){\n    btn.addEventListener('click',function(){openEditHoursModal(btn.dataset.id,btn.dataset.name,btn.dataset.hrs);});\n  });\n  m.querySelectorAll('.sns-del-hrs').forEach(function(btn){\n    btn.addEventListener('click',function(){deleteHoursEntry(btn.dataset.id,btn.dataset.name);});\n  });\n  m.querySelectorAll('.sns-del-tc').forEach(function(btn){\n    btn.addEventListener('click',function(){deleteTimeclockEntry(btn.dataset.id);});\n  });\n}\n\nfunction openEditHoursModal(entryId, staffName, currentHrs){\n  const t=state.timeEntries.find(te=>te.id===entryId); if(!t)return;\n  const ev=state.events.find(e=>e.id===t.event_id);\n  const m=document.createElement('div');m.className='modal-bg';m.id='modal-edithours';\n  m.innerHTML=`<div class="modal">\n    <div class="modal-title">Edit hours <button class="btn btn-sm" onclick="closeModal('modal-edithours')"><i class="ti ti-x"></i></button></div>\n    <div style="background:rgba(201,168,76,0.06);border:1px solid var(--ss-border);border-radius:4px;padding:10px 14px;margin-bottom:1.25rem;font-size:13px">\n      <div style="font-weight:500;color:var(--ss-cream)">${esc(staffName)}</div>\n      <div style="color:var(--ss-muted);margin-top:2px">${ev?esc(ev.name)+' — '+fmtDate(ev.date):'Unknown event'}</div>\n    </div>\n    <div class="form-row">\n      <div class="form-group"><label class="form-label">Hours worked</label>\n        <input type="number" id="eh-hours" min="0" max="24" step="0.25" value="${Math.floor(currentHrs)}" placeholder="0"></div>\n      <div class="form-group"><label class="form-label">Minutes</label>\n        <input type="number" id="eh-mins" min="0" max="59" step="1" value="${Math.round((currentHrs % 1)*60)}" placeholder="0"></div>\n    </div>\n    <div style="font-size:11px;color:var(--ss-muted);margin-top:-0.5rem;margin-bottom:1rem">Enter the correct hours and minutes worked.</div>\n    <div class="modal-actions">\n      <button class="btn" onclick="closeModal('modal-edithours')">Cancel</button>\n      <button class="btn btn-gold" onclick="saveEditedHours('${entryId}','${esc(staffName)}')"><i class="ti ti-check"></i> Save</button>\n    </div>\n  </div>`;\n  document.body.appendChild(m);\n}\n\nasync function saveEditedHours(entryId, staffName){\n  const hrs=parseFloat(document.getElementById('eh-hours').value)||0;\n  const mins=parseFloat(document.getElementById('eh-mins').value)||0;\n  const totalMs=Math.round((hrs*60+mins)*60000);\n  const {error}=await db.from('time_entries').update({\n    total_ms:totalMs, clocked_in:null, clocked_out:Date.now()\n  }).eq('id',entryId);\n  if(error){showToast('Error saving hours.',false);console.error(error);return;}\n  closeModal('modal-edithours');\n  closeModal('modal-staffhours');\n  await fetchAll(); render();\n  openStaffHoursModal(staffName);\n  showToast('Hours updated!');\n}\n\nasync function deleteHoursEntry(entryId, staffName){\n  if(!confirm('Delete this hours entry? This cannot be undone.'))return;\n  const {error}=await db.from('time_entries').delete().eq('id',entryId);\n  if(error){showToast('Error deleting entry.',false);console.error(error);return;}\n  closeModal('modal-staffhours');\n  await fetchAll(); render();\n  openStaffHoursModal(staffName);\n  showToast('Hours entry deleted.');\n}\n\nfunction openSettings(){\n  const m=document.createElement('div');m.className='modal-bg';m.id='modal-settings';\n  m.innerHTML=`<div class="modal">\n    <div class="modal-title">Email settings <button class="btn btn-sm" onclick="closeModal('modal-settings')"><i class="ti ti-x"></i></button></div>\n    <div class="info-box" style="margin-bottom:1.25rem"><i class="ti ti-info-circle"></i>\n      <div>Set up at <strong>emailjs.com</strong>. Template variables: <code>{{to_email}}</code> <code>{{to_name}}</code> <code>{{subject}}</code> <code>{{message}}</code></div>\n    </div>\n    <div class="form-group"><label class="form-label">Public key</label><input type="text" id="s-pk" value="${esc(state.ejsPublicKey)}" placeholder="user_xxxxxxxxxxxxxx"></div>\n    <div class="form-group"><label class="form-label">Service ID</label><input type="text" id="s-sid" value="${esc(state.ejsServiceId)}" placeholder="service_xxxxxxx"></div>\n    <div class="form-group"><label class="form-label">Template ID</label><input type="text" id="s-tid" value="${esc(state.ejsTemplateId)}" placeholder="template_xxxxxxx"></div>\n    <div class="modal-actions">\n      <button class="btn" onclick="closeModal('modal-settings')">Cancel</button>\n      <button class="btn btn-sm" onclick="testEmail()"><i class="ti ti-send"></i> Test</button>\n      <button class="btn btn-gold" onclick="saveSettings()">Save</button>\n    </div>\n  </div>`;\n  document.body.appendChild(m);\n}\n\n// ── Data actions ──\nasync function postNewEvent(){\n  const name=document.getElementById('c-name').value.trim();\n  const date=document.getElementById('c-date').value;\n  if(!name||!date){showToast('Name and date are required.',false);return;}\n  const payload={\n    name, date,\n    type:document.getElementById('c-type').value||null,\n    start_time:document.getElementById('c-start').value||null,\n    end_time:document.getElementById('c-end').value||null,\n    location:document.getElementById('c-loc').value.trim()||null,\n    notes:document.getElementById('c-notes').value.trim()||null,\n    guests:document.getElementById('c-guests').value||null,\n    servers_needed:parseInt(document.getElementById('c-servers').value)||0,\n    bartenders_needed:parseInt(document.getElementById('c-bartenders').value)||0,\n    chefs_needed:parseInt(document.getElementById('c-chefs').value)||0,\n    status:'open'\n  };\n  console.log('Attempting insert with payload:', payload);\n  const {data, error}=await db.from('events').insert(payload).select();\n  console.log('Insert result:', {data, error});\n  if(error){\n    const msg = error.message || error.code || JSON.stringify(error);\n    showToast('Error: '+msg, false);\n    return;\n  }\n  closeModal('modal-create');\n  await fetchAll();\n  // Send notifications using the returned event ID\n  const newEvent=data&&data[0]?data[0]:null;\n  if(newEvent) await sendNewEventNotifications(newEvent);\n  else showToast('Event posted!');\n  render();\n}\n\nasync function deleteEvent(id){\n  if(!confirm('Delete this event and all its data?'))return;\n  await db.from('events').delete().eq('id',id);\n  await fetchAll(); render();\n}\n\nasync function toggleStatus(id, current){\n  const newStatus=(!current||current==='open')?'closed':'open';\n  await db.from('events').update({status:newStatus}).eq('id',id);\n  await fetchAll(); render();\n}\n\nasync function selectBid(bidId, eventId, role, needed){\n  const picked=state.bids.filter(b=>b.event_id===eventId&&b.role===role&&b.selected).length;\n  if(picked>=needed){if(!confirm(`${needed} ${role}(s) already filled. Pick anyway?`))return;}\n  await db.from('bids').update({selected:true}).eq('id',bidId);\n  // check if all roles filled → mark event filled\n  await fetchAll();\n  const e=state.events.find(ev=>ev.id===eventId);\n  if(e){\n    const serversFilled=state.bids.filter(b=>b.event_id===eventId&&b.role==='Server'&&b.selected).length;\n    const bartsFilled=state.bids.filter(b=>b.event_id===eventId&&b.role==='Bartender'&&b.selected).length;\n    const chefsFilled=state.bids.filter(b=>b.event_id===eventId&&b.role==='Chef'&&b.selected).length;\n    const allFilled=(serversFilled>=(e.servers_needed||0))&&(bartsFilled>=(e.bartenders_needed||0))&&(chefsFilled>=(e.chefs_needed||0));\n    if(allFilled){\n      await db.from('events').update({status:'filled'}).eq('id',eventId);\n      await fetchAll();\n      await sendFullyStaffedEmails(eventId);\n    }\n  }\n  const bid=state.bids.find(b=>b.id===bidId);\n  await fetchAll(); closeModal('modal-bids'); openBidsModal(eventId); render();\n  if(bid&&bid.staff_email){\n    const ev=state.events.find(ev=>ev.id===eventId);\n    const body=`Hi ${bid.staff_name},\n\nGreat news — you've been selected to work the following event for Shaken & Stirred as a ${bid.role}!\n\n${ev.type?'Event type: '+ev.type+'\n':''}Event: ${ev.name}\nDate: ${ev.date}${ev.start_time?'\nTime: '+ev.start_time+(ev.end_time?' – '+ev.end_time:''):''}\n${ev.location?'Venue: '+ev.location+'\n':''}${ev.guests?'Guest count: ~'+ev.guests+'\n':''}${ev.notes?'\nNotes: '+ev.notes+'\n':''}\nPlease clock in through the staff portal when you arrive.\n\nSee you there!\n— The Shaken & Stirred Team`;\n    const sent=await sendEmail(bid.staff_email,bid.staff_name,`You're on the schedule: ${ev.name}`,body);\n    showToast(sent?`Confirmation sent to ${bid.staff_name}!`:`${bid.staff_name} selected — email failed (check Settings).`,sent);\n  } else showToast(`${bid?bid.staff_name:'Staff'} added to the schedule.`);\n}\n\nasync function deselectBid(bidId, eventId){\n  await db.from('bids').update({selected:false}).eq('id',bidId);\n  const e=state.events.find(ev=>ev.id===eventId);\n  if(e&&e.status==='filled')await db.from('events').update({status:'open'}).eq('id',eventId);\n  await fetchAll(); closeModal('modal-bids'); openBidsModal(eventId); render();\n}\n\nasync function placeBid(eventId){\n  const role=document.getElementById('b-role').value;\n  const note=document.getElementById('b-note').value.trim();\n  if(!role){showToast('Please select a role.',false);return;}\n  const already=state.bids.find(b=>b.event_id===eventId&&b.staff_name===state.employeeName);\n  if(already){showToast('You already have a bid on this event.',false);return;}\n  const {error}=await db.from('bids').insert({\n    event_id:eventId, staff_name:state.employeeName,\n    staff_email:state.employeeEmail, role, note, selected:false\n  });\n  if(error){showToast('Error submitting bid.',false);return;}\n  closeModal('modal-bid');\n  await fetchAll(); render(); showToast('Bid submitted!');\n  // Notify admin of new bid\n  const ev=state.events.find(e=>e.id===eventId);\n  console.log('Bid notification — event found:', ev, 'EJS config:', state.ejsServiceId, state.ejsTemplateId, state.ejsPublicKey);\n  if(ev){\n    const adminBody = 'A new bid has been placed on ' + ev.name + '.\n\nStaff: ' + state.employeeName + '\nEmail: ' + (state.employeeEmail||'not provided') + '\nRole: ' + role + (note?'\nNote: '+note:'') + '\nDate: ' + ev.date + (ev.start_time?' at '+ev.start_time:'') + (ev.location?'\nVenue: '+ev.location:'') + '\n\nLog in to the staff portal to review and pick.';\n    console.log('Sending admin notification to:', ADMIN_EMAIL);\n    const sent = await sendEmail(ADMIN_EMAIL,'Pat',`New bid: ${ev.name} — ${state.employeeName} (${role})`,adminBody);\n    console.log('Email send result:', sent);\n  }\n}\n\nasync function withdrawBid(bidId){\n  await db.from('bids').delete().eq('id',bidId);\n  await fetchAll(); render(); showToast('Bid withdrawn.');\n}\n\nasync function clockIn(eventId){\n  const existing=state.timeEntries.find(t=>t.event_id===eventId&&t.staff_name===state.employeeName);\n  if(existing&&existing.clocked_in&&!existing.clocked_out){showToast('Already clocked in.',false);return;}\n  const pickedBid=state.bids.find(b=>b.event_id===eventId&&b.staff_name===state.employeeName&&b.selected);\n  if(existing){\n    await db.from('time_entries').update({clocked_in:Date.now(),clocked_out:null}).eq('id',existing.id);\n  } else {\n    await db.from('time_entries').insert({\n      event_id:eventId, staff_name:state.employeeName,\n      staff_email:state.employeeEmail, role:pickedBid?pickedBid.role:null,\n      clocked_in:Date.now(), clocked_out:null, total_ms:0\n    });\n  }\n  await fetchAll(); render(); showToast('Clocked in — enjoy the event!');\n}\n\nasync function clockOut(eventId){\n  const te=state.timeEntries.find(t=>t.event_id===eventId&&t.staff_name===state.employeeName);\n  if(!te||!te.clocked_in){showToast('Not clocked in.',false);return;}\n  const ms=Date.now()-te.clocked_in;\n  await db.from('time_entries').update({clocked_out:Date.now(),total_ms:(te.total_ms||0)+ms,clocked_in:null}).eq('id',te.id);\n  await fetchAll(); render(); showToast('Clocked out — '+fmtHours(ms)+' logged.');\n}\n\nfunction exportHours(){\n  const rows=allStaffHours();\n  if(!rows.length){showToast('No hours to export.',false);return;}\n  let csv='Employee,Email,Events,Total Hours\n';\n  rows.forEach(r=>{csv+='"'+r.name+'","'+r.email+'",'+r.events+','+(r.ms/3600000).toFixed(2)+'\n';});\n  csv+='\nEvent Breakdown\nEmployee,Event,Role,Date,Hours\n';\n  state.timeEntries.forEach(t=>{\n    const ev=state.events.find(e=>e.id===t.event_id);\n    const ms=(t.total_ms||0)+(t.clocked_in&&!t.clocked_out?Date.now()-t.clocked_in:0);\n    csv+='"'+t.staff_name+'","'+(ev?ev.name:t.event_id)+'","'+(t.role||'')+'","'+(ev?ev.date:'')+'",'+( ms/3600000).toFixed(2)+'\n';\n  });\n  const a=document.createElement('a');\n  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);\n  a.download='sns-hours.csv'; a.click();\n  showToast('Hours exported!');\n}\n\nfunction getWeekStart(date) {\n  const d = new Date(date);\n  const day = d.getDay();\n  const diff = (day === 0 ? -6 : 1 - day);\n  d.setDate(d.getDate() + diff);\n  d.setHours(0,0,0,0);\n  return d;\n}\n\nfunction fmtWeekLabel(monday) {\n  const sunday = new Date(monday);\n  sunday.setDate(sunday.getDate() + 6);\n  const opts = {month:'short', day:'numeric'};\n  return monday.toLocaleDateString([],opts) + ' - ' + sunday.toLocaleDateString([],opts);\n}\n\nfunction exportWeeklyReport(){\n  if(!state.timeEntries.length&&!(state.timeclockEntries||[]).length){showToast('No hours to export.',false);return;}\n  const weekMap = {};\n  state.timeEntries.forEach(t => {\n    const ev = state.events.find(e => e.id === t.event_id);\n    if(!ev || !ev.date) return;\n    const ms = (t.total_ms||0) + (t.clocked_in&&!t.clocked_out ? Date.now()-t.clocked_in : 0);\n    if(!ms) return;\n    const evDate = new Date(ev.date + 'T12:00:00');\n    const weekStart = getWeekStart(evDate);\n    const weekKey = weekStart.toISOString().split('T')[0];\n    const weekLabel = fmtWeekLabel(weekStart);\n    if(!weekMap[weekKey]) weekMap[weekKey] = { label: weekLabel, staff: {} };\n    if(!weekMap[weekKey].staff[t.staff_name]) {\n      weekMap[weekKey].staff[t.staff_name] = { name:t.staff_name, email:t.staff_email||'', roles:{}, totalMs:0 };\n    }\n    const staffEntry = weekMap[weekKey].staff[t.staff_name];\n    staffEntry.totalMs += ms;\n    const role = t.role || 'Unspecified';\n    staffEntry.roles[role] = (staffEntry.roles[role] || 0) + ms;\n  });\n  // Include standalone timeclock entries in weekly report\n  (state.timeclockEntries||[]).forEach(t => {\n    if(!t.clocked_in) return;\n    const ms = (t.total_ms||0) + (t.clocked_in&&!t.clocked_out ? Date.now()-t.clocked_in : 0);\n    if(!ms) return;\n    const evDate = new Date(t.clocked_in);\n    const weekStart = getWeekStart(evDate);\n    const weekKey = weekStart.toISOString().split('T')[0];\n    const weekLabel = fmtWeekLabel(weekStart);\n    if(!weekMap[weekKey]) weekMap[weekKey] = { label: weekLabel, staff: {} };\n    if(!weekMap[weekKey].staff[t.staff_name]) {\n      weekMap[weekKey].staff[t.staff_name] = { name:t.staff_name, email:'', roles:{}, totalMs:0 };\n    }\n    const staffEntry = weekMap[weekKey].staff[t.staff_name];\n    staffEntry.totalMs += ms;\n    staffEntry.roles['Time Clock'] = (staffEntry.roles['Time Clock'] || 0) + ms;\n  });\n  const sortedWeeks = Object.keys(weekMap).sort();\n  if(!sortedWeeks.length){showToast('No hours data found.',false);return;}\n  // Build overall totals summary first\n  const overallMap = {};\n  state.timeEntries.forEach(t => {\n    const ms = (t.total_ms||0) + (t.clocked_in&&!t.clocked_out ? Date.now()-t.clocked_in : 0);\n    if(!ms) return;\n    if(!overallMap[t.staff_name]) overallMap[t.staff_name] = {name:t.staff_name, email:t.staff_email||'', ms:0};\n    overallMap[t.staff_name].ms += ms;\n  });\n  const overallList = Object.values(overallMap).sort((a,b)=>a.name.localeCompare(b.name));\n\n  let csv = 'SHAKEN & STIRRED EVENTS - WEEKLY HOURS REPORT\n';\n  csv += 'Generated: '+new Date().toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'})+'\n\n';\n\n  // Summary section\n  csv += 'TOTAL HOURS SUMMARY\n';\n  csv += 'Employee,Email,Total Hours\n';\n  overallList.forEach(s => {\n    csv += '"'+s.name+'","'+s.email+'",'+(s.ms/3600000).toFixed(2)+'\n';\n  });\n  const grandTotalMs = overallList.reduce((sum,s)=>sum+s.ms,0);\n  csv += ',Grand Total,'+(grandTotalMs/3600000).toFixed(2)+'\n\n';\n  csv += '---\n\n';\n\n  sortedWeeks.forEach(weekKey => {\n    const week = weekMap[weekKey];\n    csv += 'Week: '+week.label+' (Mon - Sun)\n';\n    csv += 'Employee,Email,Role,Hours\n';\n    const staffList = Object.values(week.staff).sort((a,b)=>a.name.localeCompare(b.name));\n    staffList.forEach(s => {\n      const roles = Object.keys(s.roles);\n      if(roles.length <= 1) {\n        csv += '"'+s.name+'","'+s.email+'","'+(roles[0]||'')+'",'+(s.totalMs/3600000).toFixed(2)+'\n';\n      } else {\n        roles.forEach(role => {\n          csv += '"'+s.name+'","'+s.email+'","'+role+'",'+(s.roles[role]/3600000).toFixed(2)+'\n';\n        });\n        csv += '"'+s.name+'","'+s.email+'","TOTAL",'+(s.totalMs/3600000).toFixed(2)+'\n';\n      }\n    });\n    const weekTotalMs = Object.values(week.staff).reduce((sum,s)=>sum+s.totalMs,0);\n    csv += ',,Week Total,'+(weekTotalMs/3600000).toFixed(2)+'\n\n';\n  });\n  const today = new Date().toISOString().split('T')[0];\n  const a = document.createElement('a');\n  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);\n  a.download = 'sns-weekly-report-'+today+'.csv';\n  a.click();\n  showToast('Weekly report downloaded!');\n}\n\nfunction setStaff(){\n  const name=document.getElementById('emp-name').value.trim();\n  const email=document.getElementById('emp-email').value.trim();\n  if(!name){showToast('Please enter your name.',false);return;}\n  if(!email){showToast('Please enter your email address.',false);return;}\n  state.employeeName=name; state.employeeEmail=email.toLowerCase().trim();\n  saveUser(); render();\n}\n\nfunction changeStaff(){state.employeeName='';state.employeeEmail='';render();}\n\nfunction lookupStaffByEmail(){\n  const email=(document.getElementById('emp-email')||{}).value?.trim().toLowerCase();\n  if(!email)return;\n  // Check bids for a matching email to auto-fill name\n  const match=state.bids.find(b=>b.staff_email&&b.staff_email.toLowerCase().trim()===email);\n  if(match){\n    const nameField=document.getElementById('emp-name');\n    if(nameField&&!nameField.value) nameField.value=match.staff_name;\n  }\n  // Also check time entries\n  if(!match){\n    const teMatch=state.timeEntries.find(t=>t.staff_email&&t.staff_email.toLowerCase().trim()===email);\n    if(teMatch){\n      const nameField=document.getElementById('emp-name');\n      if(nameField&&!nameField.value) nameField.value=teMatch.staff_name;\n    }\n  }\n}\n\nasync function testEmail(){\n  const pk=document.getElementById('s-pk').value.trim();\n  const sid=document.getElementById('s-sid').value.trim();\n  const tid=document.getElementById('s-tid').value.trim();\n  if(!pk||!sid||!tid){showToast('Fill in all three fields first.',false);return;}\n  const orig={...state}; state.ejsPublicKey=pk; state.ejsServiceId=sid; state.ejsTemplateId=tid;\n  if(!state.employeeEmail){showToast('Log in as staff first to test.',false);Object.assign(state,orig);return;}\n  showToast('Sending test…');\n  const ok=await sendEmail(state.employeeEmail,state.employeeName,'ShiftBid test — Shaken & Stirred','EmailJS is configured correctly!');\n  Object.assign(state,orig);\n  showToast(ok?'Test email sent!':'Test failed — check your IDs.',ok);\n}\n\nasync function saveSettings(){\n  state.ejsPublicKey=document.getElementById('s-pk').value.trim();\n  state.ejsServiceId=document.getElementById('s-sid').value.trim();\n  state.ejsTemplateId=document.getElementById('s-tid').value.trim();\n  saveEjs(); closeModal('modal-settings'); showToast('Settings saved.');\n}\n\nfunction openShiftRequestModal(eventId){\n  const e=state.events.find(ev=>ev.id===eventId); if(!e)return;\n  const existingRequest=(state.shiftRequests||[]).find(r=>r.event_id===eventId&&r.requester_name===state.employeeName&&r.status==='pending');\n  const m=document.createElement('div');m.className='modal-bg';m.id='modal-shift-req';\n  m.innerHTML=`<div class="modal">\n    <div class="modal-title"><span>Change shift</span><button class="btn btn-sm" onclick="closeModal('modal-shift-req')"><i class="ti ti-x"></i></button></div>\n    ${existingRequest?`<div class="info-box" style="margin-bottom:1rem"><i class="ti ti-info-circle"></i>You already have a pending ${existingRequest.request_type} request for this event. Please wait for admin approval.</div>`:''}\n    <div style="background:rgba(201,168,76,0.06);border:1px solid var(--ss-border);border-radius:4px;padding:12px 14px;margin-bottom:1.25rem">\n      <div style="font-family:'Playfair Display',serif;font-size:15px;color:var(--ss-cream);margin-bottom:4px">${esc(e.name)}</div>\n      <div style="font-size:12px;color:var(--ss-muted)">${fmtDate(e.date)}${e.start_time?' · '+esc(e.start_time):''}</div>\n    </div>\n    ${existingRequest?'':`\n    <div class="form-group"><label class="form-label">What would you like to do?</label>\n      <select id="sr-type" onchange="toggleSwapFields()">\n        <option value="giveup">Give up this shift</option>\n        <option value="swap">Swap with another staff member</option>\n      </select>\n    </div>\n    <div id="swap-fields" style="display:none">\n      <div class="form-group"><label class="form-label">Swap with — their name</label>\n        <input type="text" id="sr-swap-name" placeholder="Staff member's name"></div>\n      <div class="form-group"><label class="form-label">Their email <span style="text-transform:none;letter-spacing:0;font-weight:400;color:var(--ss-muted)">(so they get notified)</span></label>\n        <input type="email" id="sr-swap-email" placeholder="their@email.com"></div>\n    </div>\n    <div class="form-group"><label class="form-label">Reason <span style="text-transform:none;letter-spacing:0;font-weight:400;color:var(--ss-muted)">(optional)</span></label>\n      <textarea id="sr-reason" placeholder="Let the admin know why…"></textarea></div>\n    <div class="modal-actions">\n      <button class="btn" onclick="closeModal('modal-shift-req')">Cancel</button>\n      <button class="btn btn-gold" onclick="submitShiftRequest('${eventId}')"><i class="ti ti-send"></i> Submit request</button>\n    </div>`}\n    ${existingRequest?`<div class="modal-actions"><button class="btn" onclick="closeModal('modal-shift-req')">Close</button></div>`:''}\n  </div>`;\n  document.body.appendChild(m);\n}\n\nfunction toggleSwapFields(){\n  const t=document.getElementById('sr-type');\n  const sf=document.getElementById('swap-fields');\n  if(t&&sf) sf.style.display=t.value==='swap'?'block':'none';\n}\n\nasync function submitShiftRequest(eventId){\n  const type=document.getElementById('sr-type').value;\n  const reason=(document.getElementById('sr-reason')||{}).value?.trim()||'';\n  const swapName=type==='swap'?(document.getElementById('sr-swap-name')||{}).value?.trim():'';\n  const swapEmail=type==='swap'?(document.getElementById('sr-swap-email')||{}).value?.trim():'';\n  if(type==='swap'&&!swapName){showToast('Please enter the name of who you want to swap with.',false);return;}\n  const {error}=await db.from('shift_requests').insert({\n    event_id:eventId, requester_name:state.employeeName,\n    requester_email:state.employeeEmail, request_type:type,\n    swap_with_name:swapName||null, swap_with_email:swapEmail||null,\n    reason:reason||null, status:'pending'\n  });\n  if(error){showToast('Error submitting request.',false);console.error(error);return;}\n  closeModal('modal-shift-req');\n  await fetchAll(); render(); showToast('Request submitted — waiting for admin approval.');\n  // Notify admin\n  const ev=state.events.find(e=>e.id===eventId);\n  if(ev){\n    const body = type==='swap'\n      ? 'Shift swap request from '+state.employeeName+' for '+ev.name+' ('+ev.date+'). They want to swap with: '+swapName+(swapEmail?' ('+swapEmail+')':'')+(reason?' Reason: '+reason:'.')+' Log in to the staff portal to approve or deny.'\n      : 'Shift give-up request from '+state.employeeName+' for '+ev.name+' ('+ev.date+').'+(reason?' Reason: '+reason:'.')+' Log in to the staff portal to approve or deny.';\n    await sendEmail(ADMIN_EMAIL,'Pat',(type==='swap'?'Swap request: ':'Give-up request: ')+ev.name+' — '+state.employeeName, body);\n    // Notify swap partner if swap\n    if(type==='swap'&&swapEmail){\n      const swapBody='Hi '+swapName+', '+state.employeeName+' has requested to swap their shift on '+ev.name+' ('+ev.date+') with you. This swap is pending admin approval. You will be notified once a decision is made. — The Shaken & Stirred Team';\n      await sendEmail(swapEmail,swapName,'Shift swap request: '+ev.name,swapBody);\n    }\n  }\n}\n\nasync function resolveRequest(requestId, status){\n  const r=(state.shiftRequests||[]).find(sr=>sr.id===requestId); if(!r)return;\n  const ev=state.events.find(e=>e.id===r.event_id);\n  await db.from('shift_requests').update({status}).eq('id',requestId);\n  if(status==='approved'){\n    if(r.request_type==='giveup'){\n      // Deselect the bid and reopen slot\n      const bid=state.bids.find(b=>b.event_id===r.event_id&&b.staff_name===r.requester_name&&b.selected);\n      if(bid){\n        await db.from('bids').update({selected:false}).eq('id',bid.id);\n        if(ev&&ev.status==='filled') await db.from('events').update({status:'open'}).eq('id',r.event_id);\n      }\n      // Notify employee\n      if(r.requester_email&&ev){\n        await sendEmail(r.requester_email,r.requester_name,'Shift give-up approved: '+ev.name,'Hi '+r.requester_name+', your request to give up your shift on '+ev.name+' ('+ev.date+') has been approved. — The Shaken & Stirred Team');\n      }\n    } else if(r.request_type==='swap'){\n      // Deselect requester, select swap partner if they have a bid, else create one\n      const requesterBid=state.bids.find(b=>b.event_id===r.event_id&&b.staff_name===r.requester_name&&b.selected);\n      if(requesterBid) await db.from('bids').update({selected:false}).eq('id',requesterBid.id);\n      const swapBid=state.bids.find(b=>b.event_id===r.event_id&&b.staff_name===r.swap_with_name);\n      if(swapBid){\n        await db.from('bids').update({selected:true}).eq('id',swapBid.id);\n      } else {\n        await db.from('bids').insert({event_id:r.event_id,staff_name:r.swap_with_name,staff_email:r.swap_with_email||'',role:requesterBid?requesterBid.role:'Server',note:'Added via swap',selected:true});\n      }\n      // Notify both parties\n      if(ev){\n        if(r.requester_email) await sendEmail(r.requester_email,r.requester_name,'Shift swap approved: '+ev.name,'Hi '+r.requester_name+', your shift swap request for '+ev.name+' ('+ev.date+') has been approved. You have been removed from this shift. — The Shaken & Stirred Team');\n        if(r.swap_with_email) await sendEmail(r.swap_with_email,r.swap_with_name,'You have been added to a shift: '+ev.name,'Hi '+r.swap_with_name+', you have been added to '+ev.name+' ('+ev.date+') via a shift swap. — The Shaken & Stirred Team');\n      }\n    }\n  } else {\n    // Denied — notify requester\n    if(r.requester_email&&ev){\n      await sendEmail(r.requester_email,r.requester_name,'Shift request denied: '+ev.name,'Hi '+r.requester_name+', your request for '+ev.name+' was not approved. Please reach out if you have questions. — The Shaken & Stirred Team');\n    }\n  }\n  await fetchAll(); render(); showToast(status==='approved'?'Request approved!':'Request denied.');\n}\n\nasync function sendFullyStaffedEmails(eventId){\n  const ev=state.events.find(e=>e.id===eventId); if(!ev)return;\n  const bidders=state.bids.filter(b=>b.event_id===eventId&&b.staff_email);\n  const subject='Update: '+ev.name+' is now fully staffed';\n  const body='Hi, just a heads up — '+ev.name+' ('+ev.date+') is now fully staffed. Thank you for your interest! — The Shaken & Stirred Team';\n  for(const b of bidders){\n    await sendEmail(b.staff_email,b.staff_name,subject,body);\n  }\n}\n\nfunction openEditModal(eventId){\n  const e=state.events.find(ev=>ev.id===eventId); if(!e)return;\n  const m=document.createElement('div');m.className='modal-bg';m.id='modal-edit';\n  m.innerHTML=`<div class="modal">\n    <div class="modal-title">Edit event <button class="btn btn-sm" onclick="closeModal('modal-edit')"><i class="ti ti-x"></i></button></div>\n    <div class="form-group"><label class="form-label">Event name</label><input type="text" id="e-name" value="${esc(e.name)}"></div>\n    <div class="form-row">\n      <div class="form-group"><label class="form-label">Event type</label>\n        <select id="e-type"><option value="">— Select —</option>${EVENT_TYPES.map(t=>`<option value="${t}" ${e.type===t?'selected':''}>${t}</option>`).join('')}</select></div>\n      <div class="form-group"><label class="form-label">Guest count</label><input type="number" id="e-guests" min="0" value="${esc(e.guests||'')}"></div>\n    </div>\n    <div class="form-row">\n      <div class="form-group"><label class="form-label">Date</label><input type="date" id="e-date" value="${esc(e.date||'')}"></div>\n      <div class="form-group"><label class="form-label">Start time</label><input type="time" id="e-start" value="${esc(e.start_time||'')}"></div>\n    </div>\n    <div class="form-row">\n      <div class="form-group"><label class="form-label">End time</label><input type="time" id="e-end" value="${esc(e.end_time||'')}"></div>\n      <div class="form-group"><label class="form-label">Venue / location</label><input type="text" id="e-loc" value="${esc(e.location||'')}"></div>\n    </div>\n    <div style="background:rgba(201,168,76,0.06);border:1px solid var(--ss-border);border-radius:4px;padding:12px 14px;margin-bottom:1rem">\n      <div style="font-size:11px;font-weight:500;color:var(--ss-gold);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px">Staff needed</div>\n      <div class="form-row-3">\n        <div class="form-group" style="margin-bottom:0"><label class="form-label"><i class="ti ti-bowl-spoon"></i> Servers</label><input type="number" id="e-servers" min="0" value="${e.servers_needed||0}"></div>\n        <div class="form-group" style="margin-bottom:0"><label class="form-label"><i class="ti ti-glass"></i> Bartenders</label><input type="number" id="e-bartenders" min="0" value="${e.bartenders_needed||0}"></div>\n        <div class="form-group" style="margin-bottom:0"><label class="form-label"><i class="ti ti-chef-hat"></i> Chefs</label><input type="number" id="e-chefs" min="0" value="${e.chefs_needed||0}"></div>\n      </div>\n    </div>\n    <div class="form-group"><label class="form-label">Staff notes</label><textarea id="e-notes">${esc(e.notes||'')}</textarea></div>\n    <div class="modal-actions">\n      <button class="btn" onclick="closeModal('modal-edit')">Cancel</button>\n      <button class="btn btn-gold" onclick="updateEvent('${eventId}')"><i class="ti ti-check"></i> Save changes</button>\n    </div>\n  </div>`;\n  document.body.appendChild(m);\n}\n\nasync function updateEvent(eventId){\n  const name=document.getElementById('e-name').value.trim();\n  const date=document.getElementById('e-date').value;\n  if(!name||!date){showToast('Name and date are required.',false);return;}\n  const {error}=await db.from('events').update({\n    name,date,\n    type:document.getElementById('e-type').value||null,\n    start_time:document.getElementById('e-start').value||null,\n    end_time:document.getElementById('e-end').value||null,\n    location:document.getElementById('e-loc').value.trim()||null,\n    notes:document.getElementById('e-notes').value.trim()||null,\n    guests:document.getElementById('e-guests').value||null,\n    servers_needed:parseInt(document.getElementById('e-servers').value)||0,\n    bartenders_needed:parseInt(document.getElementById('e-bartenders').value)||0,\n    chefs_needed:parseInt(document.getElementById('e-chefs').value)||0,\n  }).eq('id',eventId);\n  if(error){showToast('Error saving changes.',false);console.error(error);return;}\n  closeModal('modal-edit');\n  await fetchAll(); render(); showToast('Event updated!');\n}\n\n// ── Timeclock helpers ──\nfunction totalMsFromTimeclock(name){\n  return (state.timeclockEntries||[]).filter(t=>t.staff_name===name).reduce((s,t)=>{\n    let ms=t.total_ms||0;\n    if(t.clocked_in&&!t.clocked_out)ms+=Date.now()-t.clocked_in;\n    return s+ms;\n  },0);\n}\n\nlet tcClockInterval=null;\nfunction startTimeclockClock(){\n  if(tcClockInterval)clearInterval(tcClockInterval);\n  tcClockInterval=setInterval(()=>{\n    const el=document.getElementById('tc-live-clock');\n    const del=document.getElementById('tc-live-date');\n    if(!el){clearInterval(tcClockInterval);return;}\n    const now=new Date();\n    const pad=n=>String(n).padStart(2,'0');\n    el.textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());\n    if(del)del.textContent=now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric',year:'numeric'});\n  },1000);\n  // init immediately\n  const el=document.getElementById('tc-live-clock');\n  const del=document.getElementById('tc-live-date');\n  if(el){\n    const now=new Date();const pad=n=>String(n).padStart(2,'0');\n    el.textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());\n    if(del)del.textContent=now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric',year:'numeric'});\n  }\n}\n\nfunction renderTimeclock(){\n  const recent=(state.timeclockEntries||[]).slice(0,8);\n  const activeEntry=recent.find(t=>t.clocked_in&&!t.clocked_out);\n  return`<div class="tc-wrap">\n    <div class="tc-card">\n      <div class="tc-brand">\n        <svg width="26" height="26" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">\n          <path d="M8 3h12l-2 7H10L8 3z" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-linejoin="round"/>\n          <path d="M10 10l4 12 4-12" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>\n          <path d="M7 3h14" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round"/>\n          <circle cx="14" cy="22" r="1.5" fill="#c9a84c" opacity="0.6"/>\n          <path d="M11 17h6" stroke="#c9a84c" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>\n        </svg>\n        <div>\n          <div class="brand-name" style="font-family:'Playfair Display',serif;font-size:16px;font-weight:500;color:var(--ss-gold);letter-spacing:0.02em;line-height:1.1">Shaken &amp; Stirred</div>\n          <div class="brand-sub" style="font-size:9px;color:var(--ss-muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:1px">Time Clock</div>\n        </div>\n      </div>\n\n      <div class="tc-clock-display" id="tc-live-clock">--:--:--</div>\n      <div class="tc-date-display" id="tc-live-date">--</div>\n\n      <input type="text" class="tc-name-input" id="tc-name-field" placeholder="Enter your name" oninput="tcCheckName()" ${activeEntry?'disabled':''}>\n\n      <div class="tc-status-row ${activeEntry?'active':''}" id="tc-status-row">\n        <span class="tc-status-dot ${activeEntry?'active':''}" id="tc-status-dot"></span>\n        <span id="tc-status-text">${activeEntry?esc(activeEntry.staff_name)+' is currently clocked in':'Enter your name to clock in'}</span>\n      </div>\n\n      ${activeEntry\n        ?`<button class="tc-btn tc-btn-out" id="tc-btn-out" onclick="tcPunchOut('${activeEntry.id}','${esc(activeEntry.staff_name)}')"><i class="ti ti-player-stop" aria-hidden="true"></i> Clock out — ${esc(activeEntry.staff_name)}</button>`\n        :`<div style="display:flex;gap:8px">\n          <button class="tc-btn tc-btn-in" id="tc-btn-in" onclick="tcPunchIn()" disabled style="flex:1"><i class="ti ti-player-play" aria-hidden="true"></i> Clock in</button>\n          <button class="tc-btn" id="tc-btn-drop" onclick="tcDrop()" disabled style="flex:1;background:rgba(201,168,76,0.12);color:var(--ss-gold);border:1px solid rgba(201,168,76,0.4);font-weight:500"><i class="ti ti-clock-plus" aria-hidden="true"></i> Drop (+3h)</button>\n        </div>`}\n      <div class="tc-punch-note" id="tc-punch-note">${activeEntry?'Tap Clock out when your shift ends':'Type your name above then tap Clock in or Drop'}</div>\n\n      <div class="tc-hist-divider"></div>\n      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">\n        <div class="tc-hist-title" style="margin-bottom:0">Recent punches</div>\n        <button class="btn btn-sm" onclick="openAddTimeclockModal()" style="font-size:11px"><i class="ti ti-plus" aria-hidden="true"></i> Add entry</button>\n      </div>\n      <div>\n        ${recent.length===0?`<div style="font-size:13px;color:var(--ss-muted);padding:1rem 0;text-align:center">No punches yet today.</div>`:''}\n        ${recent.map(t=>{\n          const isActive=t.clocked_in&&!t.clocked_out;\n          const ms=(t.total_ms||0)+(isActive?Date.now()-t.clocked_in:0);\n          const inTime=t.clocked_in?new Date(t.clocked_in).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'--';\n          const outTime=t.clocked_out?new Date(t.clocked_out).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';\n          const inDate=t.clocked_in?new Date(t.clocked_in).toLocaleDateString([],{month:'short',day:'numeric'}):'';\n          return`<div class="tc-hist-item">\n            <div style="flex:1;min-width:0">\n              <div class="tc-hi-name">${esc(t.staff_name)}</div>\n              <div class="tc-hi-time">${inDate} · ${isActive?'Clocked in '+inTime:inTime+' – '+(outTime||'--')}</div>\n            </div>\n            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">\n              ${isActive?`<span class="tc-hi-active">Active</span>`:`<span class="tc-hi-hrs">${fmtHours(ms)}</span>`}\n              <button class="btn btn-sm" onclick="openEditTimeclockModal('${t.id}')" title="Edit"><i class="ti ti-edit" aria-hidden="true"></i></button>\n              <button class="btn btn-sm btn-danger" onclick="deleteTimeclockEntry('${t.id}')" title="Delete"><i class="ti ti-trash" aria-hidden="true"></i></button>\n            </div>\n          </div>`;\n        }).join('')}\n      </div>\n    </div>\n  </div>`;\n}\n\nfunction tcCheckName(){\n  const name=(document.getElementById('tc-name-field')||{}).value?.trim();\n  const btn=document.getElementById('tc-btn-in');\n  const dropBtn=document.getElementById('tc-btn-drop');\n  if(btn){btn.disabled=!name;}\n  if(dropBtn){dropBtn.disabled=!name;}\n}\n\nasync function tcPunchIn(){\n  const name=(document.getElementById('tc-name-field')||{}).value?.trim();\n  if(!name){showToast('Please enter your name.',false);return;}\n  const {error}=await db.from('timeclock').insert({\n    staff_name:name, clocked_in:Date.now(), clocked_out:null, total_ms:0\n  });\n  if(error){showToast('Error clocking in.',false);console.error(error);return;}\n  await fetchAll();render();showToast(name+' clocked in!');\n}\n\nasync function tcPunchOut(entryId, staffName){\n  const entry=(state.timeclockEntries||[]).find(t=>t.id===entryId);\n  if(!entry){showToast('Entry not found.',false);return;}\n  const ms=Date.now()-entry.clocked_in;\n  const {error}=await db.from('timeclock').update({\n    clocked_out:Date.now(), total_ms:ms\n  }).eq('id',entryId);\n  if(error){showToast('Error clocking out.',false);console.error(error);return;}\n  await fetchAll();render();showToast(staffName+' clocked out — '+fmtHours(ms)+' logged.');\n}\n\nfunction openAddTimeclockModal(){\n  const today = new Date().toISOString().split('T')[0];\n  const m=document.createElement('div');m.className='modal-bg';m.id='modal-tc-add';\n  m.innerHTML=`<div class="modal">\n    <div class="modal-title">Add time entry <button class="btn btn-sm" onclick="closeModal('modal-tc-add')"><i class="ti ti-x" aria-hidden="true"></i></button></div>\n    <div class="form-group"><label class="form-label">Staff name</label>\n      <input type="text" id="tca-name" placeholder="Jane Smith"></div>\n    <div class="form-row">\n      <div class="form-group"><label class="form-label">Date</label>\n        <input type="date" id="tca-date" value="${today}"></div>\n      <div class="form-group"></div>\n    </div>\n    <div class="form-row">\n      <div class="form-group"><label class="form-label">Clock in time</label>\n        <input type="time" id="tca-in"></div>\n      <div class="form-group"><label class="form-label">Clock out time</label>\n        <input type="time" id="tca-out"></div>\n    </div>\n    <div class="form-group"><label class="form-label">Note <span style="text-transform:none;letter-spacing:0;font-weight:400;color:var(--ss-muted)">(optional)</span></label>\n      <input type="text" id="tca-note" placeholder="e.g. Forgot to clock in"></div>\n    <div class="modal-actions">\n      <button class="btn" onclick="closeModal('modal-tc-add')">Cancel</button>\n      <button class="btn btn-gold" onclick="saveNewTimeclockEntry()"><i class="ti ti-plus" aria-hidden="true"></i> Add entry</button>\n    </div>\n  </div>`;\n  document.body.appendChild(m);\n}\n\nasync function saveNewTimeclockEntry(){\n  const name=(document.getElementById('tca-name')||{}).value?.trim();\n  const date=(document.getElementById('tca-date')||{}).value;\n  const inTime=(document.getElementById('tca-in')||{}).value;\n  const outTime=(document.getElementById('tca-out')||{}).value;\n  const note=(document.getElementById('tca-note')||{}).value?.trim();\n  if(!name){showToast('Please enter a staff name.',false);return;}\n  if(!date||!inTime){showToast('Date and clock-in time are required.',false);return;}\n  const clockedIn=new Date(date+'T'+inTime).getTime();\n  const clockedOut=outTime?new Date(date+'T'+outTime).getTime():null;\n  if(clockedOut&&clockedOut<=clockedIn){showToast('Clock-out must be after clock-in.',false);return;}\n  const totalMs=clockedOut?(clockedOut-clockedIn):0;\n  const {error}=await db.from('timeclock').insert({\n    staff_name:name, clocked_in:clockedIn,\n    clocked_out:clockedOut||null, total_ms:totalMs,\n    note:note||null\n  });\n  if(error){showToast('Error saving entry.',false);console.error(error);return;}\n  closeModal('modal-tc-add');\n  await fetchAll();render();showToast('Entry added!');\n}\n\nfunction openEditTimeclockModal(entryId){\n  const t=(state.timeclockEntries||[]).find(e=>e.id===entryId);\n  if(!t)return;\n  const toDateStr=ts=>{if(!ts)return'';const d=new Date(ts);return d.toISOString().split('T')[0];};\n  const toTimeStr=ts=>{if(!ts)return'';const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');};\n  const entryDate=toDateStr(t.clocked_in);\n  const m=document.createElement('div');m.className='modal-bg';m.id='modal-tc-edit';\n  m.innerHTML=`<div class="modal">\n    <div class="modal-title">Edit time entry <button class="btn btn-sm" onclick="closeModal('modal-tc-edit')"><i class="ti ti-x" aria-hidden="true"></i></button></div>\n    <div class="form-group"><label class="form-label">Staff name</label>\n      <input type="text" id="tce-name" value="${esc(t.staff_name)}"></div>\n    <div class="form-row">\n      <div class="form-group"><label class="form-label">Date</label>\n        <input type="date" id="tce-date" value="${entryDate}"></div>\n      <div class="form-group"></div>\n    </div>\n    <div class="form-row">\n      <div class="form-group"><label class="form-label">Clock in time</label>\n        <input type="time" id="tce-in" value="${toTimeStr(t.clocked_in)}"></div>\n      <div class="form-group"><label class="form-label">Clock out time</label>\n        <input type="time" id="tce-out" value="${toTimeStr(t.clocked_out)}"></div>\n    </div>\n    <div class="form-group"><label class="form-label">Note <span style="text-transform:none;letter-spacing:0;font-weight:400;color:var(--ss-muted)">(optional)</span></label>\n      <input type="text" id="tce-note" value="${esc(t.note||'')}"></div>\n    <div class="modal-actions">\n      <button class="btn" onclick="closeModal('modal-tc-edit')">Cancel</button>\n      <button class="btn btn-gold" onclick="saveEditedTimeclockEntry('${entryId}')"><i class="ti ti-check" aria-hidden="true"></i> Save</button>\n    </div>\n  </div>`;\n  document.body.appendChild(m);\n}\n\nasync function saveEditedTimeclockEntry(entryId){\n  const name=(document.getElementById('tce-name')||{}).value?.trim();\n  const date=(document.getElementById('tce-date')||{}).value;\n  const inTime=(document.getElementById('tce-in')||{}).value;\n  const outTime=(document.getElementById('tce-out')||{}).value;\n  const note=(document.getElementById('tce-note')||{}).value?.trim();\n  if(!name||!date||!inTime){showToast('Name, date and clock-in time are required.',false);return;}\n  const clockedIn=new Date(date+'T'+inTime).getTime();\n  const clockedOut=outTime?new Date(date+'T'+outTime).getTime():null;\n  if(clockedOut&&clockedOut<=clockedIn){showToast('Clock-out must be after clock-in.',false);return;}\n  const totalMs=clockedOut?(clockedOut-clockedIn):0;\n  const {error}=await db.from('timeclock').update({\n    staff_name:name, clocked_in:clockedIn,\n    clocked_out:clockedOut||null, total_ms:totalMs,\n    note:note||null\n  }).eq('id',entryId);\n  if(error){showToast('Error saving entry.',false);console.error(error);return;}\n  closeModal('modal-tc-edit');\n  await fetchAll();render();showToast('Entry updated!');\n}\n\nfunction tcDrop(){\n  const name=(document.getElementById('tc-name-field')||{}).value?.trim();\n  if(!name){showToast('Please enter your name.',false);return;}\n  openDropModal(name);\n}\n\nfunction openDropModal(staffName){\n  const today=new Date().toISOString().split('T')[0];\n  const m=document.createElement('div');m.className='modal-bg';m.id='modal-drop';\n  m.innerHTML=`<div class="modal">\n    <div class="modal-title">Log drop shift <button class="btn btn-sm" onclick="closeModal('modal-drop')"><i class="ti ti-x" aria-hidden="true"></i></button></div>\n    <div style="background:rgba(201,168,76,0.06);border:1px solid var(--ss-border);border-radius:4px;padding:10px 14px;margin-bottom:1.25rem">\n      <div style="font-size:12px;color:var(--ss-muted);margin-bottom:2px">Staff member</div>\n      <div style="font-size:14px;font-weight:500;color:var(--ss-cream)">${esc(staffName)}</div>\n    </div>\n    <div class="form-group"><label class="form-label">Event name</label>\n      <input type="text" id="drop-event" placeholder="e.g. Smith Wedding, Yale Gala…"></div>\n    <div class="form-group"><label class="form-label">Date of drop</label>\n      <input type="date" id="drop-date" value="${today}"></div>\n    <div class="form-group"><label class="form-label">Notes <span style="text-transform:none;letter-spacing:0;font-weight:400;color:var(--ss-muted)">(optional)</span></label>\n      <textarea id="drop-notes" placeholder="Any additional details…" style="min-height:60px"></textarea></div>\n    <div class="modal-actions">\n      <button class="btn" onclick="closeModal('modal-drop')">Cancel</button>\n      <button class="btn btn-gold" onclick="submitDrop('${esc(staffName)}')"><i class="ti ti-clock-plus" aria-hidden="true"></i> Log 3h drop</button>\n    </div>\n  </div>`;\n  document.body.appendChild(m);\n}\n\nasync function submitDrop(staffName){\n  const eventName=(document.getElementById('drop-event')||{}).value?.trim();\n  const date=(document.getElementById('drop-date')||{}).value;\n  const notes=(document.getElementById('drop-notes')||{}).value?.trim();\n  if(!date){showToast('Please select a date.',false);return;}\n  const threeHoursMs=3*60*60*1000;\n  const clockedIn=new Date(date+'T12:00:00').getTime();\n  const clockedOut=clockedIn+threeHoursMs;\n  const noteStr='Drop — 3h'+(eventName?' | Event: '+eventName:'')+(notes?' | '+notes:'');\n  const {error}=await db.from('timeclock').insert({\n    staff_name:staffName, clocked_in:clockedIn,\n    clocked_out:clockedOut, total_ms:threeHoursMs,\n    note:noteStr\n  });\n  if(error){showToast('Error logging drop.',false);console.error(error);return;}\n  closeModal('modal-drop');\n  await fetchAll();render();showToast(staffName+' — 3h drop logged!');\n}\n\nasync function deleteTimeclockEntry(entryId){\n  if(!confirm('Delete this time entry? This cannot be undone.'))return;\n  const {error}=await db.from('timeclock').delete().eq('id',entryId);\n  if(error){showToast('Error deleting entry.',false);console.error(error);return;}\n  await fetchAll();render();showToast('Entry deleted.');\n}\n\nfunction openAddStaffModal(){\n  const m=document.createElement('div');m.className='modal-bg';m.id='modal-add-staff';\n  m.innerHTML=`<div class="modal">\n    <div class="modal-title">Add staff member <button class="btn btn-sm" onclick="closeModal('modal-add-staff')"><i class="ti ti-x"></i></button></div>\n    <div class="form-group"><label class="form-label">Full name</label>\n      <input type="text" id="sa-name" placeholder="Jane Smith"></div>\n    <div class="form-group"><label class="form-label">Email</label>\n      <input type="email" id="sa-email" placeholder="jane@email.com"></div>\n    <div class="form-group"><label class="form-label">Primary role <span style="text-transform:none;letter-spacing:0;font-weight:400;color:var(--ss-muted)">(optional)</span></label>\n      <select id="sa-role">\n        <option value="">— Select —</option>\n        <option value="Server">Server</option>\n        <option value="Bartender">Bartender</option>\n        <option value="Chef">Chef</option>\n      </select>\n    </div>\n    <div class="modal-actions">\n      <button class="btn" onclick="closeModal('modal-add-staff')">Cancel</button>\n      <button class="btn btn-gold" onclick="saveNewStaff()"><i class="ti ti-plus"></i> Add</button>\n    </div>\n  </div>`;\n  document.body.appendChild(m);\n}\n\nasync function saveNewStaff(){\n  const name=(document.getElementById('sa-name')||{}).value?.trim();\n  const email=(document.getElementById('sa-email')||{}).value?.trim();\n  const role=(document.getElementById('sa-role')||{}).value;\n  if(!name||!email){showToast('Name and email are required.',false);return;}\n  const {error}=await db.from('staff_directory').insert({name,email,role:role||null,active:true});\n  if(error){\n    if(error.code==='23505')showToast('That email is already in the directory.',false);\n    else showToast('Error adding staff.',false);\n    console.error(error);return;\n  }\n  closeModal('modal-add-staff');\n  await fetchAll();render();showToast(name+' added to staff directory!');\n}\n\nfunction openEditStaffModal(staffId){\n  const s=(state.staffDirectory||[]).find(st=>st.id===staffId);if(!s)return;\n  const m=document.createElement('div');m.className='modal-bg';m.id='modal-edit-staff';\n  m.innerHTML=`<div class="modal">\n    <div class="modal-title">Edit staff member <button class="btn btn-sm" onclick="closeModal('modal-edit-staff')"><i class="ti ti-x"></i></button></div>\n    <div class="form-group"><label class="form-label">Full name</label>\n      <input type="text" id="se-name" value="${esc(s.name)}"></div>\n    <div class="form-group"><label class="form-label">Email</label>\n      <input type="email" id="se-email" value="${esc(s.email)}"></div>\n    <div class="form-group"><label class="form-label">Primary role</label>\n      <select id="se-role">\n        <option value="">— Select —</option>\n        <option value="Server" ${s.role==='Server'?'selected':''}>Server</option>\n        <option value="Bartender" ${s.role==='Bartender'?'selected':''}>Bartender</option>\n        <option value="Chef" ${s.role==='Chef'?'selected':''}>Chef</option>\n      </select>\n    </div>\n    <div class="modal-actions">\n      <button class="btn" onclick="closeModal('modal-edit-staff')">Cancel</button>\n      <button class="btn btn-gold" onclick="saveEditedStaff('${staffId}')"><i class="ti ti-check"></i> Save</button>\n    </div>\n  </div>`;\n  document.body.appendChild(m);\n}\n\nasync function saveEditedStaff(staffId){\n  const name=(document.getElementById('se-name')||{}).value?.trim();\n  const email=(document.getElementById('se-email')||{}).value?.trim();\n  const role=(document.getElementById('se-role')||{}).value;\n  if(!name||!email){showToast('Name and email are required.',false);return;}\n  const {error}=await db.from('staff_directory').update({name,email,role:role||null}).eq('id',staffId);\n  if(error){showToast('Error updating staff.',false);console.error(error);return;}\n  closeModal('modal-edit-staff');\n  await fetchAll();render();showToast('Staff member updated!');\n}\n\nasync function removeStaff(staffId,name){\n  if(!confirm('Remove '+name+' from the staff directory? They will no longer receive event notifications.'))return;\n  const {error}=await db.from('staff_directory').update({active:false}).eq('id',staffId);\n  if(error){showToast('Error removing staff.',false);console.error(error);return;}\n  await fetchAll();render();showToast(name+' removed from directory.');\n}\n\nasync function sendNewEventNotifications(ev){\n  const staff=state.staffDirectory||[];\n  if(!staff.length)return;\n  const subject='New event available: '+ev.name;\n  const details=[\n    ev.type?'Type: '+ev.type:'',\n    'Date: '+ev.date+(ev.start_time?' at '+ev.start_time+(ev.end_time?' – '+ev.end_time:''):''),\n    ev.location?'Venue: '+ev.location:'',\n    ev.guests?'Guest count: ~'+ev.guests:'',\n    ev.servers_needed>0?'Servers needed: '+ev.servers_needed:'',\n    ev.bartenders_needed>0?'Bartenders needed: '+ev.bartenders_needed:'',\n    ev.chefs_needed>0?'Chefs needed: '+ev.chefs_needed:'',\n    ev.notes?'Notes: '+ev.notes:'',\n  ].filter(Boolean).join('\n');\n  let sent=0;\n  for(const s of staff){\n    const body='Hi '+s.name+', a new event has been posted on the Shaken & Stirred staff portal and is now open for bidding.\n\n'+details+'\n\nLog in to the staff portal to place your bid.\n\n— The Shaken & Stirred Team';\n        const ok=await sendEmail(s.email,s.name,subject,body);\n    if(ok)sent++;\n  }\n  if(sent>0)showToast('Event posted! Notifications sent to '+sent+' staff member'+(sent!==1?'s':'')+'.', true);\n  else showToast('Event posted — email notifications failed (check Settings).', false);\n}\n\nfunction togglePastEvents(){\n  state.adminShowPast = !state.adminShowPast;\n  render();\n}\n\nasync function clearPastEvents(){\n  const today=new Date(); today.setHours(0,0,0,0);\n  const pastEvents=state.events.filter(e=>e.date&&new Date(e.date+'T00:00:00')<today);\n  if(!pastEvents.length){showToast('No past events to clear.',false);return;}\n  if(!confirm('Delete all '+pastEvents.length+' past event(s)? Their bids and hours will also be deleted. This cannot be undone.'))return;\n  const ids=pastEvents.map(e=>e.id);\n  const {error}=await db.from('events').delete().in('id',ids);\n  if(error){showToast('Error deleting past events.',false);console.error(error);return;}\n  state.adminShowPast=false;\n  await fetchAll(); render(); showToast(pastEvents.length+' past event'+(pastEvents.length!==1?'s':'')+' deleted.');\n}\n\n// ── Review helpers ──\nconst reviewRatings={overall:0,food_quality:0,staff_performance:0,client_satisfaction:0};\n\nfunction rateReview(field, val){\n  reviewRatings[field]=val;\n  const starsEl=document.getElementById('stars-'+field);\n  if(starsEl) starsEl.querySelectorAll('.rstar').forEach(s=>{\n    s.style.color=parseInt(s.dataset.val)<=val?'var(--ss-gold)':'var(--ss-muted)';\n  });\n  updateReviewAvg();\n  // auto-open notes\n  const notesEl=document.getElementById('rnotes-'+field);\n  if(notesEl&&notesEl.style.display==='none') toggleReviewNotes(field);\n}\n\nfunction toggleReviewNotes(field){\n  const el=document.getElementById('rnotes-'+field);\n  if(!el) return;\n  const isOpen=el.style.display!=='none';\n  el.style.display=isOpen?'none':'block';\n  if(!isOpen) setTimeout(()=>{const ta=el.querySelector('textarea');if(ta)ta.focus();},50);\n}\n\nfunction updateReviewAvg(){\n  const vals=Object.values(reviewRatings).filter(v=>v>0);\n  const el=document.getElementById('r-avg-display');\n  if(!el) return;\n  el.textContent=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):'—';\n}\n\nasync function submitReview(eventId, existingId){\n  const reviewer=(document.getElementById('r-reviewer')||{}).value?.trim()||'Admin';\n  const overall=reviewRatings.overall||parseInt((document.querySelector('[data-field="overall"].rstar[style*="gold"]')||{}).dataset?.val||0);\n  const foodQ=reviewRatings.food_quality||0;\n  const staffP=reviewRatings.staff_performance||0;\n  const clientS=reviewRatings.client_satisfaction||0;\n  const overallNotes=(document.getElementById('rtxt-overall')||{}).value?.trim()||'';\n  const foodNotes=(document.getElementById('rtxt-food_quality')||{}).value?.trim()||'';\n  const staffNotes=(document.getElementById('rtxt-staff_performance')||{}).value?.trim()||'';\n  const clientNotes=(document.getElementById('rtxt-client_satisfaction')||{}).value?.trim()||'';\n  const issues=(document.getElementById('r-issues')||{}).value?.trim()||'';\n  const notes=(document.getElementById('r-notes')||{}).value?.trim()||'';\n\n  const payload={\n    event_id:eventId, reviewer_name:reviewer,\n    overall_rating:overall||null, food_quality:foodQ||null,\n    staff_performance:staffP||null, client_satisfaction:clientS||null,\n    overall_notes:overallNotes||null, food_notes:foodNotes||null,\n    staff_notes:staffNotes||null, client_notes:clientNotes||null,\n    issues:issues||null, general_notes:notes||null\n  };\n\n  let error;\n  if(existingId){\n    ({error}=await db.from('event_reviews').update(payload).eq('id',existingId));\n  } else {\n    ({error}=await db.from('event_reviews').insert(payload));\n  }\n  if(error){showToast('Error saving review.',false);console.error(error);return;}\n\n  await fetchAll();\n  // Send email to review list\n  const ev=state.events.find(e=>e.id===eventId);\n  if(ev) await sendReviewEmails(ev, payload, reviewer);\n\n  state.reviewingEventId=null;\n  render();\n  showToast('Review '+(existingId?'updated':'submitted')+'!');\n}\n\nasync function sendReviewEmails(ev, r, reviewer){\n  function ratingLine(label,rating,notes){var s=rating?rating+'/5':'Not rated';return label+': '+s+(notes?'\nNotes: '+notes:'');}\n  var body='Post-event review submitted for '+ev.name+' ('+ev.date+') by '+reviewer+'.\n\nRATINGS\n'+ratingLine('Overall',r.overall_rating,r.overall_notes)+'\n'+ratingLine('Food quality',r.food_quality,r.food_notes)+'\n'+ratingLine('Staff performance',r.staff_performance,r.staff_notes)+'\n'+ratingLine('Client satisfaction',r.client_satisfaction,r.client_notes)+(r.issues?'\n\nISSUES\n'+r.issues:'')+(r.general_notes?'\n\nGENERAL NOTES\n'+r.general_notes:'');\n  var subject='Post-event review: '+ev.name+' ('+ev.date+')';\n  for(var ri=0;ri<REVIEW_EMAILS.length;ri++){await sendEmail(REVIEW_EMAILS[ri].email,REVIEW_EMAILS[ri].name,subject,body);}\n}\n\nasync function deleteReview(reviewId){\n  if(!confirm('Delete this review? This cannot be undone.')) return;\n  const {error}=await db.from('event_reviews').delete().eq('id',reviewId);\n  if(error){showToast('Error deleting review.',false);return;}\n  await fetchAll(); render(); showToast('Review deleted.');\n}\n\nfunction openEditBidRoleModal(bidId, staffName, currentRole, eventId){\n  const ev=state.events.find(e=>e.id===eventId);\n  const availableRoles=[];\n  if(ev){\n    if(ev.servers_needed>0)availableRoles.push('Server');\n    if(ev.bartenders_needed>0)availableRoles.push('Bartender');\n    if(ev.chefs_needed>0)availableRoles.push('Chef');\n  }\n  if(!availableRoles.includes('Server'))availableRoles.push('Server');\n  if(!availableRoles.includes('Bartender'))availableRoles.push('Bartender');\n  if(!availableRoles.includes('Chef'))availableRoles.push('Chef');\n\n  const m=document.createElement('div');m.className='modal-bg';m.id='modal-edit-bid-role';\n  m.innerHTML=`<div class="modal">\n    <div class="modal-title">Change role <button class="btn btn-sm" onclick="closeModal('modal-edit-bid-role')"><i class="ti ti-x" aria-hidden="true"></i></button></div>\n    <div style="background:rgba(201,168,76,0.06);border:1px solid var(--ss-border);border-radius:4px;padding:10px 14px;margin-bottom:1.25rem">\n      <div style="font-size:13px;font-weight:500;color:var(--ss-cream)">${esc(staffName)}</div>\n      <div style="font-size:11px;color:var(--ss-muted);margin-top:2px">${ev?esc(ev.name):''}</div>\n    </div>\n    <div class="form-group">\n      <label class="form-label">Role</label>\n      <select id="ebr-role">\n        ${availableRoles.map(r=>`<option value="${r}" ${r===currentRole?'selected':''}>${r}</option>`).join('')}\n      </select>\n    </div>\n    <div class="modal-actions">\n      <button class="btn" onclick="closeModal('modal-edit-bid-role')">Cancel</button>\n      <button class="btn btn-gold" onclick="saveEditedBidRole('${bidId}','${eventId}')"><i class="ti ti-check" aria-hidden="true"></i> Save</button>\n    </div>\n  </div>`;\n  document.body.appendChild(m);\n}\n\nasync function saveEditedBidRole(bidId, eventId){\n  const role=(document.getElementById('ebr-role')||{}).value;\n  if(!role){showToast('Please select a role.',false);return;}\n  const {error}=await db.from('bids').update({role}).eq('id',bidId);\n  if(error){showToast('Error updating role.',false);console.error(error);return;}\n  closeModal('modal-edit-bid-role');\n  await fetchAll();\n  await recheckEventStatus(eventId);\n  await fetchAll();\n  closeModal('modal-bids');\n  openBidsModal(eventId);\n  render();\n  showToast('Role updated!');\n}\n\nasync function manualRecheckStatus(eventId){\n  await fetchAll();\n  await recheckEventStatus(eventId);\n  await fetchAll();\n  render();\n  showToast('Status updated!');\n}\n\nasync function recheckEventStatus(eventId){\n  const e=state.events.find(ev=>ev.id===eventId); if(!e) return;\n  const serversFilled=state.bids.filter(b=>b.event_id===eventId&&b.role==='Server'&&b.selected).length;\n  const bartsFilled=state.bids.filter(b=>b.event_id===eventId&&b.role==='Bartender'&&b.selected).length;\n  const chefsFilled=state.bids.filter(b=>b.event_id===eventId&&b.role==='Chef'&&b.selected).length;\n  const allFilled=(serversFilled>=(e.servers_needed||0))&&(bartsFilled>=(e.bartenders_needed||0))&&(chefsFilled>=(e.chefs_needed||0));\n  const totalSelected=state.bids.filter(b=>b.event_id===eventId&&b.selected).length;\n  let newStatus=e.status;\n  if(allFilled&&totalSelected>0) newStatus='filled';\n  else if(e.status==='filled') newStatus='open';\n  if(newStatus!==e.status){\n    await db.from('events').update({status:newStatus}).eq('id',eventId);\n  }\n}\n\nasync function resendEventNotification(eventId){\n  const ev=state.events.find(e=>e.id===eventId); if(!ev)return;\n  const staff=state.staffDirectory||[];\n  if(!staff.length){showToast('No staff in directory to notify.',false);return;}\n  if(!confirm('Resend event notification to all '+staff.length+' staff member'+(staff.length!==1?'s':'')+' for "'+ev.name+'"?'))return;\n  await sendNewEventNotifications(ev);\n}\n\nfunction closeModal(id){const m=document.getElementById(id);if(m)m.remove();}\n\n// ── Init ──\nasync function init(){\n  document.getElementById('main-content').innerHTML='<div class="loading">Connecting to database…</div>';\n  try {\n    loadLocal();\n    // restore admin session if still valid\n    const {data:{session}, error:authErr}=await db.auth.getSession();\n    if(authErr) console.warn('Auth session error:', authErr);\n    if(session){\n      state.adminLoggedIn=true;\n      state.adminSession=session;\n      document.getElementById('settings-btn').style.display='';\n    }\n    await fetchAll();\n    render();\n  } catch(err) {\n    console.error('Init error:', err);\n    document.getElementById('main-content').innerHTML=`<div class="empty"><i class="ti ti-wifi-off"></i>Could not connect to database.<br><br><small style="color:var(--ss-muted)">${err.message||err}</small><br><br><button class="btn btn-gold" onclick="init()">Try again</button></div>`;\n  }\n}\n\n// Wait for all external scripts to load before init\nfunction waitForDeps(cb, attempts=0) {\n  if(typeof supabase !== 'undefined' && typeof emailjs !== 'undefined') {\n    cb();\n  } else if(attempts < 50) {\n    setTimeout(()=>waitForDeps(cb, attempts+1), 100);\n  } else {\n    document.getElementById('main-content').innerHTML='<div class="empty"><i class="ti ti-alert-circle"></i>Failed to load required scripts.<br><br><small style="color:var(--ss-muted)">Please check your internet connection and refresh.</small><br><br><button class="btn btn-gold" onclick="location.reload()">Refresh</button></div>';\n  }\n}\n\nwaitForDeps(init);
</script>
